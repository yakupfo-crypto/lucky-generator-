<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 200px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:active { transform: scale(0.98); }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        
        .col-mac { width: auto; }
        .col-skor { width: 1px; white-space: nowrap; text-align: center; padding-left: 15px; padding-right: 15px; } 
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Önce takım listesini, altına da skor listesini yapıştırabilirsiniz..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th class="col-mac">MAÇ</th>
                <th class="col-skor">MS</th>
                <th class="col-skor">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    const scoreRegex = /\d+-\d+/g; // Sadece skorları bulur (1-2 gibi)
    
    // Tüm metindeki skorları sırayla bir diziye topla
    let allScores = input.match(scoreRegex) || [];
    
    // Skor olmayan satırları (Takım isimlerini) ayıkla
    let teamNames = lines.filter(line => !line.match(scoreRegex) && line.length > 2);

    tbody.innerHTML = '';
    const fragment = document.createDocumentFragment();

    // Takım isimleri üzerinden döngü kur
    teamNames.forEach((team, index) => {
        // Her takım için 2 skor çek: index*2 MS'yi, (index*2)+1 İY'yi temsil eder
        let ms = allScores[index * 2] || "-";
        let iy = allScores[(index * 2) + 1] || "-";

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${team}</td>
            <td class="col-skor"><span class="skor-kutusu">${ms}</span></td>
            <td class="col-skor" style="color:#888;">${iy}</td>
        `;
        fragment.appendChild(tr);
    });

    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            text += `${cells[0].innerText.trim()}\t${cells[1].innerText.trim()}\t${cells[2].innerText.trim()}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => alert("Liste başarıyla kopyalandı!"));
    } else {
        alert("Kopyalanacak veri bulunamadı.");
    }
}
</script>

</body>
</html>
