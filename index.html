<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --text: #333;
            --border: #e1e4e8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h2 { text-align: center; color: var(--primary); }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }

        .match-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 40px 1fr 100px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent);
        }

        .match-no {
            font-weight: bold;
            color: #888;
            font-size: 0.9em;
        }

        .match-details {
            display: flex;
            flex-direction: column;
        }

        .teams {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .league {
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        .results {
            text-align: right;
        }

        .score {
            display: block;
            font-weight: bold;
            font-size: 16px;
            color: #e74c3c;
        }

        .half-time {
            font-size: 12px;
            color: #95a5a6;
        }

        @media (max-width: 480px) {
            .match-card {
                grid-template-columns: 30px 1fr 80px;
                padding: 10px;
            }
            .teams { font-size: 13px; }
            .score { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 Maç Sonuç Eşleştirici</h2>
    
    <div class="input-section">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">Eşleştir ve Listele</button>
    </div>

    <div id="matchList"></div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultText = document.getElementById('resultInput').value;
    const listContainer = document.getElementById('matchList');
    listContainer.innerHTML = '';

    // Fikstür Parçalama
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let matches = [];

    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes('-')) {
            let team1 = fixtureLines[i-1] || "Bilinmiyor";
            let team2 = fixtureLines[i+1] || "Bilinmiyor";
            matches.push({
                team1: team1,
                team2: team2,
                score: "- / -",
                iy: "İY: -",
                fullName: team1 + " - " + team2
            });
        }
    }

    // Sonuç Parçalama ve Eşleştirme
    const resultLines = resultText.split('\n').map(l => l.trim()).filter(l => l !== "");
    
    matches.forEach(match => {
        for (let j = 0; j < resultLines.length; j++) {
            if (resultLines[j] === match.team1 && resultLines[j+2] === match.team2) {
                match.score = resultLines[j+1]; // Skor
                // İY bulma (bir sonraki satırlarda "İ.Y" arama)
                if (resultLines[j+3] && resultLines[j+3].includes("İ.Y")) {
                    match.iy = resultLines[j+3];
                }
            }
        }
    });

    // En alttaki maç 1 olacak şekilde ters çevir ve numaralandır
    const reversedMatches = matches.reverse();

    reversedMatches.forEach((m, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-no">#${index + 1}</div>
            <div class="match-details">
                <div class="teams">${m.team1} vs ${m.team2}</div>
                <div class="league">Maç Bilgisi</div>
            </div>
            <div class="results">
                <span class="score">${m.score}</span>
                <span class="half-time">${m.iy}</span>
            </div>
        `;
        listContainer.appendChild(card);
    });
}
</script>

</body>
</html>
