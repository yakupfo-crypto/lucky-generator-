<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:hover { background: #00e676; }
        .btn-kopyala { background: #03a9f4; color: white; }
        .btn-kopyala:hover { background: #29b6f6; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    
    // Performans için fragment kullanımı
    const fragment = document.createDocumentFragment();
    tbody.innerHTML = '';

    lines.forEach((line) => {
        // Skoru yakala (0-0, 1-2, E-E vb.)
        const scoreRegex = /(\d+-\d+|E-E)/g;
        const matches = line.match(scoreRegex);

        if (matches) {
            let msScore = matches[0];
            let iyScore = matches.length > 1 ? matches[1] : "-";

            // Takım isimlerini temizle (Skorları, saatleri ve MS yazılarını at)
            let cleanLine = line
                .replace(scoreRegex, '|')
                .replace(/\d{2}:\d{2}/g, '')
                .replace(/MS/g, '')
                .replace(/İY/g, '')
                .replace(/[☆✩✰]/g, '')
                .trim();

            // Takımları ayır
            let teams = cleanLine.split('|').map(t => t.trim()).filter(t => t.length > 1);
            let fullMatchName = teams.join(' - ');

            // Eğer takım ismi düzgün oluşmadıysa satırı atlama, en azından skoru göster
            if (!fullMatchName && teams.length === 0) return;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${fullMatchName || "Bilinmeyen Maç"}</td>
                <td style="text-align:center"><span class="skor-kutusu">${msScore}</span></td>
                <td style="text-align:center; color:#888;">${iyScore}</td>
            `;
            fragment.appendChild(tr);
        }
    });

    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let kopyalanacakMetin = "";
    
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            const mac = cells[0].innerText;
            const ms = cells[1].innerText;
            const iy = cells[2].innerText;
            kopyalanacakMetin += `${mac}\t${ms}\t${iy}\n`;
        }
    });

    if (!kopyalanacakMetin) {
        alert("Kopyalanacak veri bulunamadı.");
        return;
    }

    navigator.clipboard.writeText(kopyalanacakMetin.trim()).then(() => {
        alert("Liste başarıyla kopyalandı!");
    });
}
</script>

</body>
</html>
