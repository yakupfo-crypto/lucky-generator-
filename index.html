<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Editor Pro - Canlı Fikstür Eşleyici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: var(--primary); }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .result-container {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background-color: #f1f5f9;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .no-col { width: 40px; font-weight: bold; color: #64748b; }
        .match-col { min-width: 180px; }
        .score-col { font-weight: 700; color: #059669; white-space: nowrap; }
        .iy-col { color: #64748b; font-size: 11px; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            td, th { padding: 8px 5px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Score Editor Pro</h2>
    
    <div class="input-group">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processData()">VERİLERİ EŞLEŞTİR VE SIRALA</button>
    </div>

    <div class="result-container" id="outputSection" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Karşılaşma</th>
                    <th>MS</th>
                    <th>İY</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    
    // 1. Fikstürü Parse Et (Takımları bul)
    // Satır bazlı arama yapıyoruz, "-" karakteri içeren satırlar genelde maçtır
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matches = [];

    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i] === "-") {
            let home = fixtureLines[i-1];
            let away = fixtureLines[i+1];
            if (home && away) {
                matches.push({ home, away, full: `${home} - ${away}`, ms: "-", iy: "-" });
            }
        }
    }

    // 2. Sonuçları Parse Et ve Eşleştir
    // Sonuçlar kısmında her takımı ve altındaki skoru yakalayan bir mantık
    matches.forEach(match => {
        const resultLines = resultsText.split('\n').map(l => l.trim());
        for (let i = 0; i < resultLines.length; i++) {
            // Takım ismi sonuçlarda geçiyor mu kontrol et
            if (resultLines[i].includes(match.home)) {
                // Skoru bulmak için yakındaki satırlara bak
                for (let j = i; j < i + 10 && j < resultLines.length; j++) {
                    // Skor formatı "2 - 1" veya "0 - 0" gibi
                    if (/\d+\s*-\s*\d+/.test(resultLines[j])) {
                        if (resultLines[j].includes("İ.Y")) {
                            match.iy = resultLines[j].replace("İ.Y", "").trim();
                        } else {
                            match.ms = resultLines[j].trim();
                        }
                    }
                    if (match.ms !== "-" && match.iy !== "-") break;
                }
            }
        }
    });

    // 3. Numaralandırma (En alttan yukarıya 1'den başla)
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = "";
    const total = matches.length;

    matches.forEach((m, index) => {
        const row = document.createElement('tr');
        // Numara: toplam - index (Böylece en alttaki 1 olur)
        const rowNo = total - index;
        
        row.innerHTML = `
            <td class="no-col">${rowNo}</td>
            <td class="match-col">${m.full}</td>
            <td class="score-col">${m.ms}</td>
            <td class="iy-col">${m.iy}</td>
        `;
        tbody.appendChild(row);
    });

    document.getElementById('outputSection').style.display = 'block';
}
</script>

</body>
</html>
