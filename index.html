<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Skor Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            resize: vertical;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 30px;
        }

        button:hover {
            opacity: 0.9;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        th {
            background-color: #f1f5f9;
            padding: 15px;
            text-align: left;
            font-size: 14px;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .match-row:hover {
            background-color: #f8fafc;
        }

        .no-cell { font-weight: bold; color: #64748b; width: 40px; }
        .score-cell { font-weight: 800; color: #ef4444; white-space: nowrap; }
        .iy-cell { font-size: 12px; color: #64748b; }
        .team-cell { font-weight: 500; }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            th:nth-child(4), td:nth-child(4) { display: none; } /* Lig sütununu mobilde gizle */
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚽ Skor Eşleştirici</h1>
        <p>Fikstür ve sonuçları yapıştırın, anında eşleştirin.</p>
    </header>

    <div class="input-section">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Maç listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">LİSTEYİ HAZIRLA VE EŞLEŞTİR</button>

    <table class="results-table" id="outputTable" style="display: none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Maç</th>
                <th>Sonuç</th>
                <th>İ.Y.</th>
                <th>Lig/Kategori</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const tableBody = document.getElementById('tableBody');
    const outputTable = document.getElementById('outputTable');
    
    if (!fixtureText || !resultsText) {
        alert("Lütfen her iki alanı da doldurun.");
        return;
    }

    // 1. Sonuçları Parçala ve Objeye Aktar
    const resultsMap = {};
    const resultBlocks = resultsText.split(/(?=Bitti|90'|81'|25'|PENMS|UZMS|ERT)/);

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (lines.length >= 3) {
            // Takım isimlerini temizle ve anahtar oluştur
            const team1 = lines[1];
            const score = lines[2];
            const team2 = lines[3];
            const iy = lines.find(l => l.includes("İ.Y")) || "-";
            
            const key = (team1 + team2).replace(/\s+/g, '').toLowerCase();
            resultsMap[key] = { score, iy };
        }
    });

    // 2. Fikstürü Parçala
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    const matches = [];
    let currentLeague = "";

    for (let i = 0; i < fixtureLines.length; i++) {
        const line = fixtureLines[i];
        
        // Eğer satırda "-" varsa bu bir maç satırı olabilir (Örn: "Takım A - Takım B")
        if (line === "-") {
            const team1 = fixtureLines[i-1];
            const team2 = fixtureLines[i+1];
            const league = fixtureLines[i-3] || "Genel"; 
            
            matches.push({ team1, team2, league });
        }
    }

    // 3. Eşleştir ve Tabloyu Oluştur (En alttan 1 numara başlayacak şekilde ters çevir)
    tableBody.innerHTML = "";
    const reversedMatches = matches.reverse();

    reversedMatches.forEach((match, index) => {
        const searchKey = (match.team1 + match.team2).replace(/\s+/g, '').toLowerCase();
        const result = resultsMap[searchKey] || { score: "Eşleşmedi", iy: "-" };

        const row = `
            <tr class="match-row">
                <td class="no-cell">${index + 1}</td>
                <td class="team-cell">${match.team1} vs ${match.team2}</td>
                <td class="score-cell">${result.score}</td>
                <td class="iy-cell">${result.iy}</td>
                <td style="color: #64748b; font-size: 12px;">${match.league}</td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });

    outputTable.style.display = "table";
}
</script>

</body>
</html>
