<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; }
        .btn-islem { background: #00c853; color: black; }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th>MAÇ BİLGİSİ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    // Boş olmayan tüm satırları alıyoruz
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    tbody.innerHTML = '';

    lines.forEach(line => {
        // Skoru bul (Örn: 2-1 veya E-E)
        let scores = line.match(/\d+-\d+|E-E/g) || [];
        let msScore = scores[0] || "-";
        let iyScore = scores[1] || "-";

        // Satırdaki skorları ve zamanları (00:00) temizleyerek sadece takım isimlerini bırak
        let cleanText = line
            .replace(/\d+-\d+/g, '') // Skorları sil
            .replace(/E-E/g, '')     // E-E ifadesini sil
            .replace(/\d{2}:\d{2}/g, '') // Saatleri sil
            .replace(/[☆✩✰]/g, '')   // Yıldızları sil
            .replace(/\s+/g, ' ')    // Fazla boşlukları temizle
            .trim();

        // Eğer satırda hiçbir şey kalmadıysa (sadece skordan oluşuyorsa) orijinal satırı göster
        if(cleanText === "" || cleanText === "-") {
            cleanText = line;
        }

        tbody.innerHTML += `
            <tr>
                <td>${cleanText}</td>
                <td style="text-align:center"><span class="skor-kutusu">${msScore}</span></td>
                <td style="text-align:center; color:#888;">${iyScore}</td>
            </tr>`;
    });
}

function tabloyuKopyala() {
    const tbody = document.getElementById('sonucAlani');
    const rows = tbody.querySelectorAll('tr');
    let kopyalanacakMetin = "";

    rows.forEach(row => {
        let mac = row.cells[0].innerText;
        let ms = row.cells[1].innerText;
        let iy = row.cells[2].innerText;
        kopyalanacakMetin += `${mac}\t${ms}\t${iy}\n`;
    });

    if (kopyalanacakMetin.trim() === "") {
        alert("Kopyalanacak veri bulunamadı."); return;
    }

    navigator.clipboard.writeText(kopyalanacakMetin.trim()).then(() => {
        alert("Liste kopyalandı!");
    }).catch(err => {
        console.error('Hata:', err);
    });
}
</script>

</body>
</html>
