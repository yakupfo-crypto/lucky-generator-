<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: var(--primary); }
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 12px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #1d4ed8; }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        th { background-color: #f1f5f9; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        tr:last-child td { border-bottom: none; }
        .score-cell { font-weight: bold; color: #dc2626; text-align: center; }
        .iy-cell { color: #64748b; font-size: 11px; text-align: center; }
        .num-cell { font-weight: bold; color: var(--primary); width: 30px; }
        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            td, th { padding: 8px; font-size: 12px; }
            .iy-cell { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Sonuç Eşleştirici</h2>
    
    <div class="input-section">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür metnini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuç metnini buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">VERİLERİ EŞLEŞTİR VE SIRALA</button>

    <table class="results-table" id="outputTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Maç</th>
                <th>MS</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    
    // Fikstür Parçalama (Satır satır analiz)
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let fixtures = [];
    
    for(let i=0; i < fixtureLines.length; i++) {
        if(fixtureLines[i].includes('-')) {
            let teams = fixtureLines[i].split('-');
            fixtures.push({
                home: teams[0].trim(),
                away: teams[1].trim(),
                original: fixtureLines[i]
            });
        }
    }

    // Sonuç Parçalama
    const resultsBlocks = resultsText.split('Bitti').filter(b => b.trim().length > 0);
    let resultsMap = {};

    resultsText.split(/(?=Bitti|90'|81'|25'|PENMS|UZMS|ERT)/).forEach(block => {
        let lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let score = "";
        let iy = "";
        let homeTeam = "";
        let awayTeam = "";

        // Skor ve İY bulma (Örn: 2 - 1 ve İ.Y 0 - 0)
        lines.forEach((line, index) => {
            if(line.includes('-') && /\d/.test(line) && !line.includes('İ.Y')) {
                score = line;
                homeTeam = lines[index-1];
                awayTeam = lines[index+1];
            }
            if(line.includes('İ.Y')) {
                iy = line.replace('İ.Y', '').trim();
            }
        });

        if(homeTeam && awayTeam) {
            let key = (homeTeam + awayTeam).replace(/\s/g, '').toLowerCase();
            resultsMap[key] = { score, iy };
        }
    });

    // Eşleştirme ve Tabloya Basma
    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = "";

    // En alttan numaralandırma (fixtures dizisini ters çevirip işliyoruz)
    const reversedFixtures = [...fixtures].reverse();

    reversedFixtures.forEach((match, index) => {
        let matchKey = (match.home + match.away).replace(/\s/g, '').toLowerCase();
        let found = resultsMap[matchKey] || { score: "-", iy: "-" };

        let row = `<tr>
            <td class="num-cell">${index + 1}</td>
            <td>${match.home} - ${match.away}</td>
            <td class="score-cell">${found.score}</td>
            <td class="iy-cell">${found.iy}</td>
        </tr>`;
        
        // Yukarı doğru dediğin için başa ekliyoruz (prepend)
        resultBody.insertAdjacentHTML('afterbegin', row);
    });
}
</script>

</body>
</html>
