<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Skor Eşleştirici v3</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #222; color: #00ff00; border: 1px solid #444; border-radius: 5px; padding: 10px; margin-bottom: 10px; }
        button { background: #e91e63; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #252525; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #333; }
        .score { color: #ffeb3b; font-weight: bold; text-align: center; }
        .iy { color: #aaa; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

    <h2>Hızlı Skor Eşleştirici</h2>
    <textarea id="rawInput" placeholder="Buraya veriyi yapıştırın..."></textarea>
    <button onclick="parseAndMatch()">EŞLEŞTİR VE SIRALA</button>

    <table id="resultTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Maç İsmi</th>
                <th>MS Score</th>
                <th>İY Score</th>
            </tr>
        </thead>
        <tbody id="output"></tbody>
    </table>

<script>
function parseAndMatch() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const results = [];
    
    // Veriyi tarayarak maç isimlerini ve skorları yakala
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('-') && i > 0 && i < lines.length - 1) {
            let home = lines[i-1];
            let away = lines[i+1];
            let score = lines[i];
            
            // Eğer bu bir maç bloğuysa (altında İ.Y varsa)
            if (score.includes('-') && lines[i+2] && lines[i+2].includes('İ.Y')) {
                results.push({
                    match: home + " - " + away,
                    ms: score,
                    iy: lines[i+2].replace('İ.Y', '').trim()
                });
            }
        }
    }

    // Alttan üste doğru numaralandırarak yazdır
    const tbody = document.getElementById('output');
    tbody.innerHTML = '';
    results.reverse().forEach((res, index) => {
        let row = `<tr>
            <td>${index + 1}</td>
            <td>${res.match}</td>
            <td class="score">${res.ms}</td>
            <td class="iy">${res.iy}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
</script>
</body>
</html>
