<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Sonuç Eşleştirici</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --success: #22c55e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { text-align: center; color: var(--accent); margin-bottom: 20px; }
        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: var(--card);
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            color: var(--bg);
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #resultList {
            margin-top: 30px;
            display: flex;
            flex-direction: column-reverse; /* En alttaki 1 numara olacak şekilde sıralar */
        }
        .match-card {
            background: var(--card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.5s ease;
        }
        .num {
            font-weight: bold;
            color: var(--accent);
            min-width: 40px;
        }
        .content {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .teams { flex: 1; min-width: 200px; font-weight: 500; }
        .score-box {
            background: #0f172a;
            padding: 5px 12px;
            border-radius: 6px;
            text-align: center;
            min-width: 120px;
        }
        .ms { color: var(--success); font-weight: bold; font-size: 1.2rem; }
        .iy { color: #94a3b8; font-size: 0.85rem; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            .match-card { flex-direction: column; text-align: center; }
            .content { flex-direction: column; gap: 10px; }
            .score-box { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fikstür & Sonuç Analizörü</h1>
    
    <div class="input-area">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştır..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştır..."></textarea>
    </div>
    
    <button onclick="processMatches()">VERİLERİ EŞLEŞTİR VE SIRALA</button>

    <div id="resultList"></div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const resultList = document.getElementById('resultList');
    resultList.innerHTML = '';

    // Maçları ayıklamak için regex (Takım - Takım formatı)
    const fixtureLines = fixtureText.split('\n').filter(line => line.includes('-') && !line.includes(':'));
    const resultsData = resultsText.split('Bitti').join('|||').split('90\'').join('|||').split('|||');

    let matches = [];

    fixtureLines.forEach(line => {
        const parts = line.split('-').map(s => s.trim());
        if (parts.length === 2) {
            const team1 = parts[0];
            const team2 = parts[1];
            
            // Sonuçlar içinde bu takımları ara
            let score = "Oynanmadı";
            let iy = "";

            resultsData.forEach(res => {
                if (res.includes(team1) && res.includes(team2)) {
                    // Skor bulma (Örn: 2 - 1)
                    const scoreMatch = res.match(/(\d+)\s*-\s*(\d+)/);
                    if (scoreMatch) score = scoreMatch[1] + " - " + scoreMatch[2];
                    
                    // İ.Y bulma
                    const iyMatch = res.match(/İ\.Y\s*(\d+\s*-\s*\d+)/);
                    if (iyMatch) iy = "İY: " + iyMatch[1];
                }
            });

            matches.push({ teams: team1 + " vs " + team2, ms: score, iy: iy });
        }
    });

    // En alttan numaralandırma (1'den başlayarak)
    // Listeyi ters çevirip yazdırıyoruz ki DOM içinde en alttaki 1 olsun
    matches.reverse().forEach((match, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="num">${index + 1}</div>
            <div class="content">
                <div class="teams">${match.teams}</div>
                <div class="score-box">
                    <span class="ms">${match.ms}</span>
                    <span class="iy">${match.iy}</span>
                </div>
            </div>
        `;
        resultList.appendChild(card);
    });
}
</script>

</body>
</html>
