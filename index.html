<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        button { width: 100%; background: #00c853; color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .lig-baslik { background: #d32f2f; color: white; font-weight: bold; text-align: center; font-size: 13px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        .status-tag { font-weight: bold; font-size: 10px; border: 1px solid; padding: 2px 4px; border-radius: 3px; text-transform: uppercase; }
        .ms { color: #00e676; border-color: #00e676; }
        .ert { color: #ff5252; border-color: #ff5252; }
        .baslamadi { color: #40c4ff; border-color: #40c4ff; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    <button onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>

    <table>
        <thead>
            <tr>
                <th>DURUM</th>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    tbody.innerHTML = '';

    let currentLig = "";

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].replace(/[☆✩✰]/g, '');

        // 1. LİG TESPİTİ
        if (line === line.toUpperCase() && !line.includes('-') && isNaN(line.charAt(0)) && line.length > 3 && !line.includes("MS") && !line.includes("ERTELENEN")) {
            currentLig = line;
            tbody.innerHTML += `<tr><td colspan="4" class="lig-baslik">${currentLig}</td></tr>`;
            continue;
        }

        // 2. MAÇ TESPİTİ (Skorlu veya Skorsuz Maçlar)
        // Kural: İçinde "-" olan veya saat formatı içeren veya yan yana iki kelime olan satırlar
        let isScoreMatch = /\d+-\d+/.test(line);
        let isTimeMatch = /\d{2}:\d{2}/.test(line);
        let isErtelenen = line.includes("E-E") || line.includes("ERTELENEN");

        if (isScoreMatch || isTimeMatch || isErtelenen) {
            let score = "-";
            let iy = "-";
            let teams = line;
            let statusClass = "baslamadi";
            let statusText = "SAAT";

            if (isScoreMatch) {
                let scoreMatch = line.match(/\d+-\d+/);
                score = scoreMatch[0];
                teams = line.split(score)[0].trim();
                statusClass = "ms";
                statusText = "MS";

                // İY Skoru kontrolü
                if (i + 1 < lines.length && /^\d+-\d+$/.test(lines[i+1].trim())) {
                    iy = lines[i+1].trim();
                    i++; 
                }
            } else if (isTimeMatch) {
                let timeMatch = line.match(/\d{2}:\d{2}/);
                statusText = timeMatch[0];
                teams = line.split(timeMatch[0])[0].trim();
                if(teams == "") teams = line.split(timeMatch[0])[1].trim();
            } else if (isErtelenen) {
                statusClass = "ert";
                statusText = "ERT";
                teams = line.replace("E-E", "").replace("ERTELENEN", "").trim();
            }

            // Temizlik
            teams = teams.replace(/\d+\sMS/g, '').replace(/MS/g, '').replace(/null/g, '').trim();
            if(teams.length < 2) continue;

            tbody.innerHTML += `
                <tr>
                    <td><span class="status-tag ${statusClass}">${statusText}</span></td>
                    <td>${teams}</td>
                    <td style="text-align:center"><span class="skor-kutusu">${score}</span></td>
                    <td style="text-align:center; color:#888;">${iy}</td>
                </tr>`;
        }
    }
}
</script>

</body>
</html>
