<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Dรผzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:active { transform: scale(0.98); }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        
        .col-mac { width: auto; }
        .col-skor { width: 1px; white-space: nowrap; text-align: center; padding-left: 2px; padding-right: 2px; } 
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karฤฑลฤฑk metni buraya yapฤฑลtฤฑrฤฑn..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LฤฐSTEYฤฐ DรZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LฤฐSTEYฤฐ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th class="col-mac">MAร</th>
                <th class="col-skor">MS</th>
                <th class="col-skor">ฤฐY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    // Satฤฑrlarฤฑ temizlerken sadece tireden oluลan satฤฑrlarฤฑ gรถrmezden gel
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0 && l !== '-');
    const tbody = document.getElementById('sonucAlani');
    const fragment = document.createDocumentFragment();
    const scoreRegex = /(\d+-\d+|E-E)/g;
    
    tbody.innerHTML = '';

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        
        // Satฤฑrฤฑn baลฤฑndaki veya sonundaki baฤฤฑmsฤฑz tireleri temizle ama skorun iรงindekine dokunma
        line = line.replace(/(^-\s+)|(\s+-$)/g, '').trim();

        let scores = line.match(scoreRegex) || [];
        
        let matchName = line
            .replace(scoreRegex, '')
            .replace(/\d{2}:\d{2}/g, '')
            .replace(/\b(MS|ฤฐY|IY|ฤฐyi|Iyi|Sonuรงlandฤฑ|Bitti)\b/gi, '')
            .replace(/[โโฉโฐ*]/g, '')
            .replace(/\s+/g, ' ')
            .trim();

        if (scores.length === 0 && matchName.length > 3) {
            if (i + 1 < lines.length) {
                // Alt satฤฑrda skor ararken de tireleri yok say
                let cleanNextLine = lines[i+1].replace(/(^-)|(-$)/g, '').trim();
                let nextLineScores = cleanNextLine.match(scoreRegex);
                if (nextLineScores) {
                    scores = nextLineScores;
                }
            }
        }

        if (scores.length > 0 && matchName.length > 3) {
            let msScore = scores[0]; 
            let iyScore = scores.length > 1 ? scores[1] : "-";

            if (iyScore === "-" && i + 1 < lines.length) {
                let nextLine = lines[i+1].trim().replace(/(^-)|(-$)/g, '').trim();
                if (nextLine.match(/^(\d+-\d+)$/)) {
                    iyScore = nextLine;
                }
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${matchName}</td>
                <td class="col-skor"><span class="skor-kutusu">${msScore}</span></td>
                <td class="col-skor" style="color:#888;">${iyScore}</td>
            `;
            fragment.appendChild(tr);
        }
    }
    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            text += `${cells[0].innerText.trim()}\tMS ${cells[1].innerText.trim()}\tฤฐY ${cells[2].innerText.trim()}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => alert("Liste MS ve ฤฐY ibareleriyle kopyalandฤฑ!"));
    } else {
        alert("Kopyalanacak veri yok.");
    }
}
</script>

</body>
</html>
