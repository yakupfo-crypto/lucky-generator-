<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor & Maç Eşleştirici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        textarea { width: 100%; height: 250px; background: #1a1a1a; color: #00ff41; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; resize: none; }
        .controls { text-align: center; }
        button { padding: 15px 40px; background: #2962ff; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0039cb; transform: scale(1.02); }
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        th { background: #333; color: #757575; padding: 12px; font-size: 12px; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #262626; font-size: 14px; }
        .no-cell { color: #2962ff; font-weight: bold; width: 40px; text-align: center; }
        .match-cell { color: #fff; font-weight: 500; }
        .score-box { background: #333; color: #ffea00; padding: 5px 10px; border-radius: 4px; font-weight: bold; min-width: 45px; display: inline-block; text-align: center; }
        .iy-cell { color: #888; font-size: 13px; text-align: center; }
        .lig-row { background: #b71c1c; color: white; font-weight: bold; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="panels">
        <textarea id="listInput" placeholder="1: Maç listesini buraya yapıştırın (Üstteki liste)..."></textarea>
        <textarea id="scoreInput" placeholder="2: Skor verilerini buraya yapıştırın (Alttaki liste)..."></textarea>
    </div>

    <div class="controls">
        <button onclick="eslestirVeSirala()">EŞLEŞTİR VE NUMARALANDIR</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>NO</th>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
function eslestirVeSirala() {
    const listRaw = document.getElementById('listInput').value;
    const scoreRaw = document.getElementById('scoreInput').value;
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';

    // 1. Skor Verilerini Haritalama (Hata payını azaltmak için normalize edilir)
    const scoreMap = {};
    const scoreLines = scoreRaw.split('\n').map(s => s.trim());
    
    for (let i = 0; i < scoreLines.length; i++) {
        if (scoreLines[i].includes('-')) {
            let teamA = scoreLines[i-1] || "";
            let scoreLine = scoreLines[i];
            let teamB = scoreLines[i+1] || "";
            let iyLine = scoreLines[i+2] || "";

            if (teamA && teamB && scoreLine.match(/\d+\s-\s\d+/)) {
                let key = (teamA + teamB).replace(/\s+/g, '').toLowerCase();
                let iy = iyLine.includes('İ.Y') ? iyLine.replace('İ.Y', '').trim() : "-";
                scoreMap[key] = { ms: scoreLine.trim(), iy: iy };
            }
        }
    }

    // 2. Maç Listesini Temizleme ve Analiz
    const listLines = listRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matches = [];
    let currentLig = "";

    for (let i = 0; i < listLines.length; i++) {
        let line = listLines[i];
        if (line.includes(':')) continue; // Saatleri geç
        if (line.includes('-') && listLines[i-1] && listLines[i+1]) {
            matches.push({
                lig: currentLig,
                home: listLines[i-1],
                away: listLines[i+1]
            });
        } else if (line.length > 5 && isNaN(line[0]) && !line.includes('-')) {
            currentLig = line;
        }
    }

    // 3. Eşleştirme ve Numaralandırma (Aşağıdan yukarıya doğru 1'den başlar)
    const totalMatches = matches.length;
    
    matches.forEach((m, index) => {
        let key = (m.home + m.away).replace(/\s+/g, '').toLowerCase();
        let found = scoreMap[key] || { ms: "-", iy: "-" };
        
        // Mantık: En alttaki maç 1 numara olacak şekilde sıralama
        let rowNo = totalMatches - index;

        let row = `<tr>
            <td class="no-cell">${rowNo}</td>
            <td class="match-cell">${m.home} - ${m.away}</td>
            <td style="text-align:center"><span class="score-box">${found.ms}</span></td>
            <td class="iy-cell">${found.iy}</td>
        </tr>`;
        
        // Başa ekleyerek (prepend) nihai listede numaraların 1-2-3... gitmesini sağlarız
        tbody.insertAdjacentHTML('afterbegin', row);
    });
}
</script>

</body>
</html>
