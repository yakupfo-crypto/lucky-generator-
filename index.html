<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #results {
            margin-top: 30px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        th { background-color: #f1f5f9; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        .score-badge {
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            color: #1e40af;
        }
        .iy-badge { font-size: 0.85em; color: #64748b; margin-left: 10px; }

        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            th:nth-child(1), td:nth-child(1) { display: none; } /* Mobilde saati gizle (opsiyonel) */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Maç Sonuç Eşleştirici</h1>
    
    <div class="input-grid">
        <div>
            <label>1. Fikstür Programı:</label>
            <textarea id="fixturInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>2. Sonuçlar Kısmı:</label>
            <textarea id="sonucInput" placeholder="Sonuç listesini buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="matchScores()">EŞLEŞTİR VE SONUÇLARI GETİR</button>

    <div id="results">
        <table id="resultTable" style="display:none;">
            <thead>
                <tr>
                    <th>Saat/Lig</th>
                    <th>Maç</th>
                    <th>MS</th>
                    <th>İY</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>

<script>
function matchScores() {
    const fixturRaw = document.getElementById('fixturInput').value;
    const sonucRaw = document.getElementById('sonucInput').value;
    
    const fixturLines = fixturRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const sonucLines = sonucRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    const matches = [];
    
    // Fikstür Analizi (Basit mantık: Takım A - Takım B yapısını bulur)
    for (let i = 0; i < fixturLines.length; i++) {
        if (fixturLines[i] === '-') {
            const team1 = fixturLines[i-1];
            const team2 = fixturLines[i+1];
            const timeOrLeague = fixturLines[i-2] || "";
            
            matches.push({
                t1: team1,
                t2: team2,
                header: timeOrLeague,
                score: 'Oynanmadı',
                iy: '-'
            });
        }
    }

    // Sonuçlar Analizi ve Eşleştirme
    matches.forEach(m => {
        for (let j = 0; j < sonucLines.length; j++) {
            // Eğer sonuç kısmında ev sahibi takımı bulursak
            if (sonucLines[j] === m.t1 && sonucLines[j+2] === m.t2) {
                m.score = sonucLines[j+1]; // Skor genelde iki takım arasındadır
                
                // İY Skoru ara (yakındaki satırlarda "İ.Y" geçen satırı bul)
                for(let k = j; k < j+10 && k < sonucLines.length; k++) {
                    if(sonucLines[k].includes('İ.Y')) {
                        m.iy = sonucLines[k].replace('İ.Y', '').trim();
                        break;
                    }
                }
            }
        }
    });

    // Tabloyu Oluştur
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    
    matches.forEach(m => {
        const row = `<tr>
            <td>${m.header}</td>
            <td>${m.t1} - ${m.t2}</td>
            <td><span class="score-badge">${m.score}</span></td>
            <td><span class="iy-badge">${m.iy}</span></td>
        </tr>`;
        tbody.innerHTML += row;
    });

    document.getElementById('resultTable').style.display = 'table';
}
</script>

</body>
</html>
