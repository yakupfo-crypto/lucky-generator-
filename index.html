<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor DĂźzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:active { transform: scale(0.98); }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; table-layout: fixed; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid #2d2d2d; font-size: 14px; vertical-align: middle; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; display: inline-block; min-width: 35px; text-align: center; }
        
        /* MS ve Ä°Y sĂźtunlarÄąnÄą yukarÄądan aĹaÄÄąya ve yanlardan tam hizalÄą yapan ayarlar */
        .col-mac { width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-skor { width: 15%; text-align: center; } 
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="KarÄąĹÄąk metni buraya yapÄąĹtÄąrÄąn..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LÄ°STEYÄ° DĂZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LÄ°STEYÄ° KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th class="col-mac">MAĂ</th>
                <th class="col-skor">MS</th>
                <th class="col-skor">Ä°Y</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    const fragment = document.createDocumentFragment();
    const scoreRegex = /(\d+-\d+|E-E)/g;
    
    tbody.innerHTML = '';

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        let scores = line.match(scoreRegex) || [];
        
        let matchName = line
            .replace(scoreRegex, '')
            .replace(/\d{2}:\d{2}/g, '')
            .replace(/\b(MS|Ä°Y|IY|Ä°yi|Iyi|SonuĂ§landÄą|Bitti)\b/gi, '')
            .replace(/[ââŠâ°*]/g, '')
            .replace(/\s\s+/g, ' ')
            .trim();

        if (scores.length === 0 && matchName.length > 3) {
            if (i + 1 < lines.length) {
                let nextLineScores = lines[i+1].match(scoreRegex);
                if (nextLineScores) {
                    scores = nextLineScores;
                }
            }
        }

        if (scores.length > 0 && matchName.length > 3) {
            let msScore = scores[0]; 
            let iyScore = scores.length > 1 ? scores[1] : "-";

            if (iyScore === "-" && i + 1 < lines.length) {
                let nextLine = lines[i+1].trim();
                if (nextLine.match(/^(\d+-\d+)$/)) {
                    iyScore = nextLine;
                }
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-mac">${matchName}</td>
                <td class="col-skor"><span class="skor-kutusu">${msScore}</span></td>
                <td class="col-skor" style="color:#888;">${iyScore}</td>
            `;
            fragment.appendChild(tr);
        }
    }
    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            // KopyalandÄąÄÄąnda hizanÄąn bozulmamasÄą iĂ§in maĂ§ ismini sabit boĹlukla ayÄąrÄąr
            let mac = cells[0].innerText.padEnd(40, ' ');
            let ms = cells[1].innerText.padEnd(10, ' ');
            let iy = cells[2].innerText;
            text += `${mac}\t${ms}\t${iy}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => alert("Liste hizada kopyalandÄą!"));
    } else {
        alert("Kopyalanacak veri yok.");
    }
}
</script>

</body>
</html>
