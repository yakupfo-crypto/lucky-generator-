<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .match-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 50px 1fr 120px 80px;
            align-items: center;
            transition: transform 0.2s;
        }

        .match-card:hover {
            transform: scale(1.01);
        }

        .match-no {
            font-weight: bold;
            color: #95a5a6;
            font-size: 1.1rem;
        }

        .match-teams {
            font-weight: 600;
            padding: 0 10px;
        }

        .match-score {
            text-align: center;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            padding: 5px 0;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .match-ht {
            text-align: right;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .status {
            font-size: 0.7rem;
            display: block;
            color: var(--secondary);
            margin-bottom: 2px;
        }

        /* Mobil Görünüm */
        @media (max-width: 600px) {
            .match-card {
                grid-template-columns: 40px 1fr 80px;
                grid-template-areas: 
                    "no teams score"
                    "no teams ht";
                gap: 5px;
            }
            .match-no { grid-area: no; }
            .match-teams { grid-area: teams; font-size: 0.9rem; }
            .match-score { grid-area: score; font-size: 1rem; }
            .match-ht { grid-area: ht; text-align: center; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Canlı Maç Sonuçları</h2>
        <div id="resultList">
            </div>
    </div>

    <pre id="fixtureData" class="hidden">
        [FİKSTÜR METNİ BURAYA]
    </pre>

    <pre id="scoreData" class="hidden">
        [SONUÇ METNİ BURAYA]
    </pre>

    <script>
        // Örnek veriyi kod içine de gömüyorum (Siz metni değiştirdikçe çalışacaktır)
        const rawFixture = `PASTE_YOUR_FIXTURE_HERE`; 
        const rawScores = `PASTE_YOUR_SCORES_HERE`;

        function parseData() {
            // DOM'daki verileri al (veya değişkenlerden)
            const fText = document.getElementById('fixtureData').innerText;
            const sText = document.getElementById('scoreData').innerText;

            // Satırlara ayır ve temizle
            const fLines = fText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const sLines = sText.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            let matches = [];

            // Fikstürdeki takımları bul (Saat/Lig satırlarını atla, Takım-Takım formatını yakala)
            for (let i = 0; i < fLines.length; i++) {
                if (fLines[i] === "-") {
                    const home = fLines[i-1];
                    const away = fLines[i+1];
                    if(home && away) {
                        matches.push({ home, away, score: "- / -", ht: "İ.Y - / -" });
                    }
                }
            }

            // Sonuçları eşleştir
            matches.forEach(m => {
                for (let j = 0; j < sLines.length; j++) {
                    // Takım isimleri sonuç metninde geçiyor mu kontrol et
                    if (sLines[j].includes(m.home) && sLines[j+2] && sLines[j+2].includes(m.away)) {
                        m.score = sLines[j+1] || "-";
                        // İ.Y sonucunu ara
                        if (sLines[j+3] && sLines[j+3].includes("İ.Y")) {
                            m.ht = sLines[j+3];
                        }
                    }
                }
            });

            // En alttan numaralandırma için listeyi ters çevirip yazdır
            const container = document.getElementById('resultList');
            const total = matches.length;
            
            // Ters sıralama (En alttaki 1 olacak şekilde görselleştirme)
            matches.reverse().forEach((m, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-no">${total - index}</div>
                    <div class="match-teams">
                        <span class="status">BİTTİ / CANLI</span>
                        ${m.home} - ${m.away}
                    </div>
                    <div class="match-score">${m.score.replace(/\n/g, ' ')}</div>
                    <div class="match-ht">${m.ht}</div>
                `;
                container.appendChild(card);
            });
        }

        // Sayfa yüklendiğinde çalıştır
        window.onload = parseData;
    </script>
</body>
</html>
