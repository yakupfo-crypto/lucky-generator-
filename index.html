<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Fikstür & Sonuç Paneli</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h2 { text-align: center; color: var(--accent); margin-bottom: 20px; }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-size: 13px;
            resize: vertical;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.1s;
        }

        .match-card:hover { border-color: var(--accent); }

        .match-no {
            font-weight: bold;
            color: var(--accent);
            min-width: 30px;
            font-size: 1.1em;
        }

        .match-info { flex: 1; }

        .league-name {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            display: block;
            margin-bottom: 4px;
        }

        .teams {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scores {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 80px;
            gap: 5px;
        }

        .ms-score {
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 800;
            color: var(--success);
            border: 1px solid var(--border);
        }

        .iy-score {
            font-size: 11px;
            color: var(--text-dim);
        }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .match-card { padding: 10px; gap: 8px; }
            .teams { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fikstür & Canlı Sonuç Eşleştirici</h2>
    
    <div class="input-section">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processData()">VERİLERİ ANALİZ ET VE LİSTELE</button>
    </div>

    <div id="output"></div>
</div>

<script>
function normalizeName(name) {
    return name.toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, '')
        .trim();
}

function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const output = document.getElementById('output');
    output.innerHTML = '';

    // 1. Fikstür Parçalama
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matches = [];
    let currentLeague = "";

    for (let i = 0; i < fixtureLines.length; i++) {
        // Lig tespiti (genelde içinde saat/skor olmayan satırlar)
        if (!fixtureLines[i].includes(':') && isNaN(fixtureLines[i].charAt(0))) {
            currentLeague = fixtureLines[i];
            continue;
        }
        // Saat satırı tespiti (HH:mm)
        if (/\d{2}:\d{2}/.test(fixtureLines[i])) {
            let match = {
                league: currentLeague,
                time: fixtureLines[i],
                team1: fixtureLines[i+1],
                team2: fixtureLines[i+3],
                ms: "-",
                iy: "-"
            };
            matches.push(match);
            i += 3; // Diğer satırları atla
        }
    }

    // 2. Sonuçları Parçalama ve Eşleştirme
    const resultsPool = resultsText.split(/Bitti|MS|\d{1,2}'/i);
    
    matches.forEach(match => {
        const t1Norm = normalizeName(match.team1);
        const t2Norm = normalizeName(match.team2);

        resultsPool.forEach(block => {
            if (block.toLowerCase().includes(t1Norm.substring(0, 5)) || block.toLowerCase().includes(t2Norm.substring(0, 5))) {
                // MS Skor Bulma (Örn: 2 - 1)
                const scoreMatch = block.match(/(\d+)\s*-\s*(\d+)/);
                if (scoreMatch) {
                    match.ms = `${scoreMatch[1]} - ${scoreMatch[2]}`;
                }
                // İY Skor Bulma
                const iyMatch = block.match(/İ\.?Y\s*(\d+)\s*-\s*(\d+)/i);
                if (iyMatch) {
                    match.iy = `(İY ${iyMatch[1]}-${iyMatch[2]})`;
                }
            }
        });
    });

    // 3. Tersten Numaralandırma ve Yazdırma
    const reversedMatches = matches.reverse();
    reversedMatches.forEach((m, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-no">${index + 1}</div>
            <div class="match-info">
                <span class="league-name">${m.league} | ${m.time}</span>
                <div class="teams">
                    <span>${m.team1}</span>
                    <span style="color:var(--accent); margin: 0 10px;">vs</span>
                    <span>${m.team2}</span>
                </div>
            </div>
            <div class="scores">
                <div class="ms-score">${m.ms}</div>
                <div class="iy-score">${m.iy}</div>
            </div>
        `;
        output.appendChild(card);
    });
}
</script>

</body>
</html>
