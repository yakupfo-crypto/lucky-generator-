<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici & Numaralandırıcı</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 { text-align: center; color: var(--primary); }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #resultTable {
            margin-top: 30px;
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        #resultTable th, #resultTable td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        #resultTable th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        #resultTable tr:hover { background-color: #f8fafc; }

        .num { font-weight: bold; color: var(--primary); width: 40px; }
        .score-box { font-family: monospace; font-weight: bold; }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            #resultTable { font-size: 13px; }
            th:nth-child(2), td:nth-child(2) { display: none; } /* Lig kolonunu mobilde gizle */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Skor Eşleştirici v1.0</h1>
    
    <div class="input-section">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür metnini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuç metnini buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">VERİLERİ EŞLEŞTİR VE SIRALA</button>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Lig</th>
                <th>Maç</th>
                <th>Sonuç (MS / İY)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    function processData() {
        const fixtureText = document.getElementById('fixtureInput').value;
        const resultsText = document.getElementById('resultsInput').value;
        
        const fixtures = parseFixtures(fixtureText);
        const scores = parseResults(resultsText);
        
        const matched = [];

        fixtures.forEach(f => {
            // Basit bir isim eşleştirme mantığı
            const scoreMatch = scores.find(s => 
                (s.home.includes(f.home) || f.home.includes(s.home)) &&
                (s.away.includes(f.away) || f.away.includes(s.away))
            );

            matched.push({
                league: f.league,
                match: `${f.home} - ${f.away}`,
                ms: scoreMatch ? scoreMatch.ms : "- / -",
                iy: scoreMatch ? scoreMatch.iy : "-"
            });
        });

        renderTable(matched);
    }

    function parseFixtures(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const matches = [];
        let currentLeague = "";

        for (let i = 0; i < lines.length; i++) {
            // Eğer satır saat formatındaysa (00:00 gibi), bir önceki satır lig, sonraki satırlar takımdır
            if (/^\d{2}:\d{2}$/.test(lines[i])) {
                currentLeague = lines[i-1] || currentLeague;
                matches.push({
                    league: currentLeague,
                    home: lines[i+1],
                    away: lines[i+3] // "-" işaretini atlayıp konuğu alır
                });
            }
        }
        return matches;
    }

    function parseResults(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const results = [];

        for (let i = 0; i < lines.length; i++) {
            // Skor satırını bul (Örn: 2 - 1)
            if (/^\d+\s*-\s*\d+$/.test(lines[i])) {
                const ms = lines[i];
                const home = lines[i-1];
                const away = lines[i+1];
                let iy = "-";

                // İY skorunu ara (yakınındaki satırlarda)
                for(let j = i; j < i + 5 && j < lines.length; j++) {
                    if (lines[j].includes("İ.Y")) {
                        iy = lines[j].replace("İ.Y", "").trim();
                        break;
                    }
                }

                results.push({ home, away, ms, iy });
            }
        }
        return results;
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const table = document.getElementById('resultTable');
        tbody.innerHTML = "";
        table.style.display = "table";

        // En alttan numaralandırma için diziyi ters çevirip işliyoruz
        // Ama kullanıcı en altta 1 görünecek dediği için listeyi normal basıp 
        // numarayı (Toplam - İndex) şeklinde vereceğiz.
        const total = data.length;
        
        data.forEach((item, index) => {
            const row = `<tr>
                <td class="num">${total - index}</td>
                <td>${item.league}</td>
                <td>${item.match}</td>
                <td class="score-box">${item.ms} <small>(İY: ${item.iy})</small></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
</script>

</body>
</html>
