<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici PRO v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; background: #0f172a; color: #34d399; border: 1px solid #334155; border-radius: 10px; padding: 15px; font-family: monospace; font-size: 13px; margin-bottom: 15px; resize: vertical; }
        .btn-box { display: flex; gap: 10px; margin-bottom: 25px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .btn-process { background: #38bdf8; color: #0f172a; }
        .btn-process:hover { background: #0ea5e9; }
        .btn-copy { background: #64748b; color: white; }
        .btn-copy:hover { background: #475569; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #334155; color: #94a3b8; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        .row-num { color: #64748b; font-weight: bold; width: 40px; }
        .match-name { color: #f1f5f9; font-weight: 500; }
        .score-ms { color: #fbbf24; font-weight: bold; text-align: center; width: 80px; }
        .score-iy { color: #94a3b8; text-align: center; width: 80px; }
        .highlight { background: rgba(56, 189, 248, 0.05); }
        tr:hover { background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

<div class="container">
    <h2>⚽ Skor Eşleştirme Sistemi</h2>
    <textarea id="rawInput" placeholder="Buraya önce fikstürü, altına skor listesini yapıştırın..."></textarea>
    
    <div class="btn-box">
        <button class="btn-process" onclick="syncScores()">VERİLERİ EŞLEŞTİR VE NUMARALANDIR</button>
        <button class="btn-copy" onclick="copyTable()">SONUCU KOPYALA</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>NO</th>
                <th>KARŞILAŞMA</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="outputBody"></tbody>
    </table>
</div>

<script>
function syncScores() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    let matches = [];
    let scoreMap = new Map();

    // 1. Veri Ayrıştırma Mantığı
    // Önce tüm skorları bir haritaya (Map) alalım (Takım isimlerini anahtar yaparak)
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('-')) {
            const parts = lines[i].split('-').map(p => p.trim());
            const home = parts[0];
            const away = parts[1];
            const matchKey = (home + away).toLowerCase().replace(/\s/g, '');

            // Skor bulma (Bir sonraki satırlara bak)
            let ms = "-";
            let iy = "-";
            
            for (let j = 1; j <= 5; j++) {
                if (i + j < lines.length) {
                    let nextLine = lines[i+j];
                    // MS Skoru Kontrolü (Örn: 2 - 1)
                    if (/^\d+\s*-\s*\d+$/.test(nextLine)) {
                        ms = nextLine;
                    }
                    // İY Skoru Kontrolü (Örn: İ.Y 0 - 0)
                    if (nextLine.includes('İ.Y')) {
                        iy = nextLine.replace('İ.Y', '').trim();
                    }
                    // Eğer yeni bir takıma veya lige geçtiysek aramayı durdur
                    if (nextLine.includes('-') && nextLine.length > 5) break;
                }
            }
            
            if (ms !== "-") {
                scoreMap.set(matchKey, { ms, iy });
            }
            
            // Eğer bu bir fikstür satırıysa (saat içeriyorsa veya skor haritasında yoksa listeye ekle)
            if (/\d{2}:\d{2}/.test(lines[i-1]) || lines[i-1].includes('Lig') || lines[i-1].includes('Kupası')) {
                matches.push({ home, away, key: matchKey });
            }
        }
    }

    // 2. Numaralandırma ve Tablo Oluşturma
    const tbody = document.getElementById('outputBody');
    tbody.innerHTML = '';
    
    // Alttan başlayarak numaralandırma (İsteğine göre: Listenin sonundaki maç 1 numara)
    let counter = 1;
    for (let i = matches.length - 1; i >= 0; i--) {
        const m = matches[i];
        const scoreData = scoreMap.get(m.key) || { ms: "0 - 0", iy: "0 - 0" };
        
        const row = `
            <tr>
                <td class="row-num">${counter}</td>
                <td class="match-name">${m.home} - ${m.away}</td>
                <td class="score-ms">${scoreData.ms}</td>
                <td class="score-iy">${scoreData.iy}</td>
            </tr>
        `;
        tbody.insertAdjacentHTML('afterbegin', row); // Üste ekleyerek sıralamayı koru (1 en altta kalır)
        counter++;
    }
}

function copyTable() {
    let text = "";
    const rows = document.querySelectorAll("#outputBody tr");
    rows.forEach(row => {
        const cols = row.querySelectorAll("td");
        text += `${cols[0].innerText}\t${cols[1].innerText}\tMS: ${cols[2].innerText}\tİY: ${cols[3].innerText}\n`;
    });
    navigator.clipboard.writeText(text);
    alert("Liste kopyalandı!");
}
</script>

</body>
</html>
