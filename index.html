<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinamik Skor Eşleştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .input-area { background: #1e293b; border: 1px solid #334155; color: #94a3b8; transition: all 0.3s; }
        .input-area:focus { border-color: #38bdf8; color: #fff; outline: none; }
        .match-row { border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .match-row:hover { background: #1e293b; }
        .score-box { background: #0f172a; border: 1px solid #334155; min-width: 60px; text-align: center; border-radius: 6px; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-white">LiveScore <span class="text-blue-500">Matcher</span></h1>
            <p class="text-slate-400 text-sm">Program ve sonuç listelerini yapıştırın, sistem otomatik eşleştirsin.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-sm font-semibold mb-2 text-blue-400">1. Program Listesi (Saatli Bölüm)</label>
                <textarea id="fixtureInput" class="input-area w-full h-48 p-4 rounded-lg text-xs" placeholder="00:00 CD Victoria - Juticalpa FC..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2 text-green-400">2. Sonuç Listesi (Skorlu Bölüm)</label>
                <textarea id="resultsInput" class="input-area w-full h-48 p-4 rounded-lg text-xs" placeholder="Bitti CD Victoria 2 - 1 Juticalpa FC..."></textarea>
            </div>
        </div>

        <div class="flex justify-center mb-10">
            <button onclick="matchMatches()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-12 rounded-full shadow-lg transform active:scale-95 transition">
                VERİLERİ EŞLEŞTİR VE LİSTELE
            </button>
        </div>

        <div id="outputContainer" class="hidden bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-800">
            <div class="bg-slate-800 px-6 py-3 flex justify-between text-xs font-bold uppercase tracking-wider text-slate-400">
                <span>DURUM / İY</span>
                <span class="mr-32">MAÇ VE SKOR</span>
            </div>
            <div id="matchList"></div>
        </div>
    </div>

    <script>
        function matchMatches() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultsText = document.getElementById('resultsInput').value;
            const matchList = document.getElementById('matchList');
            const outputContainer = document.getElementById('outputContainer');

            if(!fixtureText || !resultsText) {
                alert("Lütfen her iki alanı da doldurun.");
                return;
            }

            // 1. Programı Parse Et (Saat ve Takımlar)
            const fixtureLines = fixtureText.split('\n').filter(l => l.includes('-'));
            const fixtureData = fixtureLines.map(line => {
                const parts = line.split(/(\d{2}:\d{2})/); // Saati ayır
                const teams = (parts[2] || parts[0]).split('-');
                return {
                    time: parts[1] || "--:--",
                    home: teams[0]?.trim(),
                    away: teams[1]?.trim()
                };
            });

            // 2. Sonuçları Parse Et
            // Takımları anahtar olarak kullanarak bir nesne oluşturuyoruz
            const resultLines = resultsText.split('İ.Y');
            const resultsMap = {};

            resultLines.forEach(block => {
                const lines = block.split('\n').filter(l => l.trim() !== "");
                let home = "", away = "", score = "-", status = "Bitti", iy = "0-0";

                // Skor ve takım tespiti için basit regex/logic
                lines.forEach(l => {
                    if(l.includes('-') && /\d/.test(l)) {
                        const scoreMatch = l.match(/(\d+)\s*-\s*(\d+)/);
                        if(scoreMatch) score = scoreMatch[0];
                        
                        // Skor satırı genelde takımların arasındadır veya altındadır
                        // Bu kısım senin verdiğin formata göre esnektir
                    }
                });

                // Örnek formatında takımlar skorun üstünde/altında olduğu için
                // her bloğun içindeki takımları bulup map'e ekliyoruz
                const foundTeams = lines.filter(l => l.length > 3 && !l.includes('-') && !l.includes('Bitti'));
                if(foundTeams.length >= 2) {
                    const key = (foundTeams[0].trim() + foundTeams[1].trim()).toLowerCase().replace(/\s/g, '');
                    const iyMatch = block.match(/\d\s*-\s*\d/);
                    resultsMap[key] = {
                        score: score,
                        iy: iyMatch ? iyMatch[0] : "0-0",
                        status: block.includes('Bitti') ? "Bitti" : (block.includes('\'') ? "Canlı" : "Bitti")
                    };
                }
            });

            // 3. Eşleştir ve Yazdır
            matchList.innerHTML = '';
            fixtureData.forEach(m => {
                const matchKey = (m.home + m.away).toLowerCase().replace(/\s/g, '');
                const matchResult = resultsMap[matchKey] || { score: "- / -", iy: "- / -", status: "Bekliyor" };

                matchList.innerHTML += `
                    <div class="match-row p-4 md:p-6 flex items-center gap-4">
                        <div class="w-20 flex flex-col">
                            <span class="text-[10px] font-bold text-blue-500 uppercase">${matchResult.status}</span>
                            <span class="text-xs text-slate-500 tracking-tighter">İY: ${matchResult.iy}</span>
                        </div>
                        
                        <div class="flex-1 flex items-center justify-between">
                            <div class="flex-1 text-right pr-3 md:pr-10 font-medium text-sm md:text-base">${m.home}</div>
                            <div class="score-box px-3 py-1 text-lg">${matchResult.score}</div>
                            <div class="flex-1 text-left pl-3 md:pl-10 font-medium text-sm md:text-base">${m.away}</div>
                        </div>

                        <div class="w-12 text-right text-xs text-slate-600 font-mono hidden md:block">
                            ${m.time}
                        </div>
                    </div>
                `;
            });

            outputContainer.classList.remove('hidden');
        }
    </script>
</body>
</html>
