<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #333;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h2 { color: var(--primary-color); text-align: center; }

        .match-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .match-card:hover { transform: translateY(-2px); }

        .match-no {
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .match-info { flex-grow: 1; }

        .teams {
            font-weight: 600;
            font-size: 1.05em;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        .results-row {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
        }

        .score-box {
            color: var(--accent-color);
            font-weight: bold;
        }

        .iy-box {
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .status-badge {
            font-size: 0.75em;
            padding: 4px 8px;
            border-radius: 20px;
            background: #27ae60;
            color: white;
            margin-left: auto;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .match-card { padding: 10px; }
            .teams { font-size: 0.95em; }
            .results-row { flex-direction: column; gap: 2px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Sonuçları & Fikstür</h2>
    <div id="matchList"></div>
</div>

<script>
// Kullanıcıdan gelen ham veriler (Örnek veriler buraya gelecek)
const fixtureRaw = `... (Fikstür Verisi) ...`; 
const resultsRaw = `... (Sonuç Verisi) ...`;

// Not: Bu script sayfadaki veriyi senin paylaştığın metinden çeker.
// Gerçek kullanımda bu değişkenleri prompttaki metinlerle dolduruyoruz.

function parseData() {
    // 1. Veriyi temizleme ve parse etme
    const fixtureLines = document.body.innerText.split('\n');
    
    const matches = [];
    let currentMatch = null;

    // Fikstürden Takımları Ayıklama (Takım - Takım formatı)
    const teamRegex = /(.+)\s-\s(.+)/;

    // Bu fonksiyon basitçe tüm satırları gezer ve eşleşme arar
    const lines = document.body.innerText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    let allTeams = [];
    lines.forEach(line => {
        if(line.includes(" - ")) {
            const parts = line.split(" - ");
            if(parts.length === 2 && !line.includes("İ.Y")) {
                allTeams.push({
                    home: parts[0].trim(),
                    away: parts[1].trim(),
                    score: "Oynanmadı",
                    iy: "-"
                });
            }
        }
    });

    // Sonuçları bulma ve eşleştirme
    lines.forEach((line, index) => {
        if(line.includes("İ.Y")) {
            const scoreLine = lines[index-1];
            const teamsLine = lines[index-2];
            
            if(teamsLine && teamsLine.includes("-")) {
                const [h, a] = teamsLine.split("-").map(t => t.trim());
                const matchIndex = allTeams.findIndex(m => m.home === h || m.away === a);
                
                if(matchIndex !== -1) {
                    allTeams[matchIndex].score = scoreLine;
                    allTeams[matchIndex].iy = line;
                }
            }
        }
    });

    // En alttan numaralandırma (Diziyi ters çevirip render etme)
    const listDiv = document.getElementById('matchList');
    const reversedMatches = [...allTeams].reverse();

    reversedMatches.forEach((match, index) => {
        const cardNumber = reversedMatches.length - index;
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-no">${cardNumber}</div>
            <div class="match-info">
                <div class="teams">${match.home} vs ${match.away}</div>
                <div class="results-row">
                    <div class="score-box">MS: ${match.score}</div>
                    <div class="iy-box">${match.iy}</div>
                </div>
            </div>
            ${match.score !== "Oynanmadı" ? '<div class="status-badge">Bitti</div>' : ''}
        `;
        listDiv.appendChild(card);
    });
}

// Sayfa yüklendiğinde çalıştır
window.onload = parseData;

</script>

</body>
</html>
