<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e74c3c;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary); }

        .input-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #219150; }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            overflow-x: auto;
            display: block;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        .score-box {
            font-weight: bold;
            color: var(--accent);
            white-space: nowrap;
        }

        .iy-box {
            font-size: 12px;
            color: #7f8c8d;
        }

        .no-match { color: #ccc; font-style: italic; }

        @media (max-width: 600px) {
            .input-sections { grid-template-columns: 1fr; }
            td, th { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚽ Maç Sonucu Eşleştirici</h2>
    
    <div class="input-sections">
        <div>
            <label><strong>1. Fikstür Programı:</strong></label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label><strong>2. Maç Sonuçları:</strong></label>
            <textarea id="resultInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processMatches()">VERİLERİ EŞLEŞTİR VE LİSTELE</button>

    <table class="results-table" id="outputTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Saat / Lig</th>
                <th>Ev Sahibi</th>
                <th>Skor</th>
                <th>Deplasman</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultText = document.getElementById('resultInput').value;
    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = "";

    // Fikstür parçalama
    const fixtures = [];
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    
    let currentLig = "";
    for(let i=0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes(':') && fixtureLines[i].length <= 5) {
            let time = fixtureLines[i];
            let home = fixtureLines[i+1];
            let away = fixtureLines[i+3];
            fixtures.push({ time, lig: currentLig, home, away });
            i += 3; 
        } else {
            currentLig = fixtureLines[i];
        }
    }

    // Sonuçları parçalama ve Map'e atma
    const resultMap = new Map();
    const resultBlocks = resultText.split(/(?=Bitti|90'|81'|25'|PENMS|UZMS|ERT)/);

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        if(lines.length >= 4) {
            let homeName = lines[1];
            let score = lines[2];
            let awayName = lines[3];
            let iy = "";
            
            // İY skorunu bul
            const iyLine = lines.find(l => l.includes("İ.Y"));
            if(iyLine) iy = iyLine.replace("İ.Y", "").trim();

            const key = (homeName + awayName).replace(/\s+/g, '').toLowerCase();
            resultMap.set(key, { score, iy });
        }
    });

    // Tabloyu oluştur
    fixtures.forEach((fix, index) => {
        const matchKey = (fix.home + fix.away).replace(/\s+/g, '').toLowerCase();
        const matchData = resultMap.get(matchKey);

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${index + 1}</td>
            <td><small>${fix.lig}</small><br><strong>${fix.time}</strong></td>
            <td>${fix.home}</td>
            <td class="score-box">${matchData ? matchData.score : '<span class="no-match">-</span>'}</td>
            <td>${fix.away}</td>
            <td class="iy-box">${matchData ? matchData.iy : '-'}</td>
        `;
        resultBody.appendChild(row);
    });
}
</script>

</body>
</html>
