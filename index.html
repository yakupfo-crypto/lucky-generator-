<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e74c3c;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }

        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #219150; }

        .match-card {
            display: grid;
            grid-template-columns: 50px 1fr 120px 100px;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 12px 10px;
            transition: background 0.2s;
        }

        .match-card:hover { background: #f9f9f9; }

        .no { font-weight: bold; color: #888; }
        .teams { font-weight: 500; color: var(--primary); }
        .score { font-weight: bold; color: var(--accent); text-align: center; font-size: 1.1rem; }
        .half-time { font-size: 0.85rem; color: #666; text-align: right; }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .match-card {
                grid-template-columns: 40px 1fr 80px;
                gap: 5px;
            }
            .half-time {
                grid-column: 2 / 4;
                text-align: left;
                padding-left: 0;
                margin-top: -5px;
                font-style: italic;
            }
            .teams { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Fikstür & Sonuç Eşleştirici</h1>
    
    <div class="input-area">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processData()">LİSTEYİ OLUŞTUR VE EŞLEŞTİR</button>
    </div>

    <div id="output"></div>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultText = document.getElementById('resultInput').value;
    const output = document.getElementById('output');
    output.innerHTML = '';

    // Fikstür Analizi (Takım isimlerini ayıkla)
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "" && l !== "-");
    let matches = [];

    for (let i = 0; i < fixtureLines.length; i++) {
        // Saat formatı veya Lig adı değilse ve bir sonraki satır varsa muhtemelen maç eşleşmesidir
        if (fixtureLines[i].includes(':') || fixtureLines[i].includes('Lig') || fixtureLines[i].includes('Kupası')) continue;
        
        let home = fixtureLines[i];
        let away = fixtureLines[i+1];
        
        if(home && away && !away.includes(':')) {
            matches.push({ home, away });
            i++; // Deplasman takımını atla
        }
    }

    // Sonuç Analizi
    const resultLines = resultText.split('\n').map(l => l.trim());
    let resultsMap = {};

    for (let i = 0; i < resultLines.length; i++) {
        let line = resultLines[i];
        // Eğer skor satırıysa (Örn: 2 - 1)
        if (line.includes('-') && /\d/.test(line)) {
            let homeTeam = resultLines[i-1];
            let awayTeam = resultLines[i+1];
            let score = line;
            let ht = "";
            
            // İ.Y skorunu bul (genelde 2 satır sonra)
            if(resultLines[i+2] && resultLines[i+2].includes('İ.Y')) {
                ht = resultLines[i+2];
            }

            if(homeTeam && awayTeam) {
                resultsMap[homeTeam + " vs " + awayTeam] = { score, ht };
            }
        }
    }

    // Tersten numaralandırarak HTML oluştur (En alttaki 1 olacak)
    const totalMatches = matches.length;
    let html = "";

    matches.reverse().forEach((match, index) => {
        // Eşleşen sonucu bul
        let matchKey = Object.keys(resultsMap).find(key => 
            key.toLowerCase().includes(match.home.toLowerCase()) || 
            match.home.toLowerCase().includes(key.split(' vs ')[0].toLowerCase())
        );

        let finalScore = resultsMap[matchKey]?.score || "0 - 0";
        let finalHT = resultsMap[matchKey]?.ht || "İ.Y 0 - 0";
        let matchNo = totalMatches - index;

        html += `
            <div class="match-card">
                <div class="no">${matchNo}.</div>
                <div class="teams">${match.home} - ${match.away}</div>
                <div class="score">${finalScore}</div>
                <div class="half-time">${finalHT}</div>
            </div>
        `;
    });

    output.innerHTML = html || "<p style='text-align:center'>Eşleşen veri bulunamadı. Lütfen metinleri kontrol edin.</p>";
}
</script>

</body>
</html>
