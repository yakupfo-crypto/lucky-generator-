<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Skor Eşleştirici ve Numaralandırıcı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f1f5f9; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        h2 { color: #38bdf8; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .input-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 250px; background: #0f172a; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 13px; resize: vertical; }
        textarea:focus { outline: none; border-color: #38bdf8; color: #f1f5f9; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-process { background: #0ea5e9; color: white; }
        .btn-process:hover { background: #0284c7; }
        .btn-copy { background: #10b981; color: white; }
        .btn-copy:hover { background: #059669; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th { background: #334155; color: #38bdf8; padding: 12px; text-align: left; font-size: 12px; border-bottom: 2px solid #1e293b; }
        td { padding: 10px 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        tr:hover { background: #2d3748; }
        .num-col { color: #94a3b8; font-weight: bold; width: 40px; text-align: center; }
        .score-box { background: #0f172a; padding: 4px 8px; border-radius: 4px; color: #fbbf24; font-weight: bold; font-family: monospace; }
        .iy-box { color: #94a3b8; font-size: 12px; }
        .lig-row { background: #475569; color: #fff; font-weight: bold; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Skor Eşleştirme Sistemi</h2>
    
    <div class="input-sections">
        <textarea id="matchList" placeholder="1. Örnek Maç Listesini Buraya Yapıştırın..."></textarea>
        <textarea id="scoreData" placeholder="2. Skor Verilerini Buraya Yapıştırın..."></textarea>
    </div>

    <div class="controls">
        <button class="btn-process" onclick="processData()">EŞLEŞTİR VE NUMARALANDIR</button>
        <button class="btn-copy" onclick="copyTable()">VERİYİ KOPYALA</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>NO</th>
                <th>LİG / MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>
</div>

<script>
function processData() {
    const listInput = document.getElementById('matchList').value;
    const scoreInput = document.getElementById('scoreData').value;
    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = '';

    // 1. Skor verilerini haritala (İsim -> Skorlar)
    const scoreMap = {};
    const scoreBlocks = scoreInput.split(/Bitti|ERT|UZMS|PENMS|\d+'/);
    
    scoreBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 1);
        if (lines.length >= 2) {
            const team1 = lines[0];
            let team2 = "";
            let ms = "-";
            let iy = "-";

            // Skor satırını ve rakip takımı bul
            for(let i=1; i < lines.length; i++) {
                if(lines[i].includes('-') && /\d/.test(lines[i])) {
                    ms = lines[i];
                    team2 = lines[i-1];
                    // Bir sonraki satır İY olabilir
                    if(lines[i+1] && lines[i+1].includes('İ.Y')) {
                        iy = lines[i+1].replace('İ.Y', '').trim();
                    }
                    break;
                }
            }
            if(team1 && team2) {
                const key = (team1 + team2).toLowerCase().replace(/\s/g, '');
                scoreMap[key] = { ms, iy };
            }
        }
    });

    // 2. Maç listesini işle
    const listLines = listInput.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matches = [];
    let currentLig = "";

    for (let i = 0; i < listLines.length; i++) {
        let line = listLines[i];
        if (line.includes('-')) {
            const teams = line.split('-');
            matches.push({
                lig: currentLig,
                home: teams[0].trim(),
                away: teams[1].trim()
            });
        } else if (!/\d{2}:\d{2}/.test(line)) {
            currentLig = line;
        }
    }

    // 3. Ters numaralandırma ve tabloya ekleme
    let matchCount = matches.length;
    matches.forEach((m) => {
        const key = (m.home + m.away).toLowerCase().replace(/\s/g, '');
        const found = scoreMap[key] || { ms: "0 - 0", iy: "0 - 0" };
        
        const row = `
            <tr>
                <td class="num-col">${matchCount--}</td>
                <td>
                    <div style="font-size:11px; color:#38bdf8">${m.lig}</div>
                    <strong>${m.home} - ${m.away}</strong>
                </td>
                <td style="text-align:center"><span class="score-box">${found.ms}</span></td>
                <td style="text-align:center"><span class="iy-box">${found.iy}</span></td>
            </tr>
        `;
        resultBody.innerHTML += row;
    });
}

function copyTable() {
    let text = "";
    const rows = document.querySelectorAll("#resultBody tr");
    rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        if(cells.length > 1) {
            text += `${cells[0].innerText}\t${cells[1].innerText.replace(/\n/g, ' ')}\t${cells[2].innerText}\t${cells[3].innerText}\n`;
        }
    });
    navigator.clipboard.writeText(text).then(() => alert("Liste kopyalandı!"));
}
</script>

</body>
</html>
