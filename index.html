<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-muted: #7f8c8d;
            --border-color: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            font-size: 12px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        #match-list {
            display: flex;
            flex-direction: column;
        }

        .match-card {
            background: var(--card-bg);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--primary-color);
        }

        .match-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .match-number {
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            min-width: 30px;
        }

        .match-details {
            display: flex;
            flex-direction: column;
        }

        .league-name {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
        }

        .teams {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .result-area {
            text-align: right;
            min-width: 120px;
        }

        .score {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-color);
            display: block;
        }

        .half-time {
            font-size: 11px;
            color: #e67e22;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .match-card { flex-direction: column; align-items: flex-start; gap: 10px; }
            .result-area { text-align: left; border-top: 1px solid var(--border-color); width: 100%; pt: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary-color);">Fikstür & Sonuç İşleyici</h2>
    
    <div class="input-area">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">LİSTEYİ HAZIRLA</button>
    </div>

    <div id="match-list">
        </div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const listContainer = document.getElementById('match-list');
    listContainer.innerHTML = '';

    // 1. Fikstürü parçala
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let matches = [];
    let currentLeague = "";

    for (let i = 0; i < fixtureLines.length; i++) {
        let line = fixtureLines[i];
        
        // Eğer satırda ":" yoksa ve takımlar arası "-" içermiyorsa lig adıdır (basit varsayım)
        if (!line.includes(':') && !line.includes(' - ') && isNaN(line.charAt(0))) {
            currentLeague = line;
            continue;
        }

        // Zaman formatı kontrolü (00:00 gibi)
        if (/^\d{2}:\d{2}$/.test(line)) {
            let teams = fixtureLines[i+1] ? fixtureLines[i+1].split(' - ') : null;
            if (teams && teams.length === 2) {
                matches.push({
                    time: line,
                    league: currentLeague,
                    home: teams[0].trim(),
                    away: teams[1].trim(),
                    score: "- / -",
                    iy: ""
                });
                i++; // Takım satırını atla
            }
        }
    }

    // 2. Sonuçları bir haritaya (Map) al (Takım eşleşmesi için)
    const resultsMap = new Map();
    const resultBlocks = resultsText.split(/(?=Bitti|UZMS|PENMS|ERT|\d+')/g);

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (lines.length >= 3) {
            let homeTeam = "", awayTeam = "", score = "", iy = "";
            
            // Satırları tara (Skor ve takımları bul)
            for(let j=0; j<lines.length; j++){
                if(lines[j].includes(' - ') && /\d/.test(lines[j])) {
                    score = lines[j];
                    homeTeam = lines[j-1];
                    awayTeam = lines[j+1];
                }
                if(lines[j].includes('İ.Y')) iy = lines[j];
            }

            if(homeTeam && awayTeam) {
                resultsMap.set(homeTeam.toLowerCase(), { score, iy });
            }
        }
    });

    // 3. Eşleştir ve Numaralandır (En alttan 1 ile başlayarak)
    const reversedMatches = matches.reverse();
    
    reversedMatches.forEach((match, index) => {
        const matchResult = resultsMap.get(match.home.toLowerCase());
        
        const card = document.createElement('div');
        card.className = 'match-card';
        
        card.innerHTML = `
            <div class="match-info">
                <div class="match-number">${index + 1}</div>
                <div class="match-details">
                    <span class="league-name">${match.league} | ${match.time}</span>
                    <span class="teams">${match.home} - ${match.away}</span>
                </div>
            </div>
            <div class="result-area">
                <span class="score">${matchResult ? matchResult.score : '- - -'}</span>
                <span class="half-time">${matchResult ? matchResult.iy : ''}</span>
            </div>
        `;
        listContainer.appendChild(card);
    });
}
</script>

</body>
</html>
