<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: var(--primary); }
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #resultsTable {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: var(--card);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background-color: #f1f5f9; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        .no-badge {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }
        .score-box {
            font-weight: bold;
            color: #059669;
        }
        .iy-box {
            font-size: 0.85em;
            color: #64748b;
        }
        @media (max-width: 768px) {
            .input-section { grid-template-columns: 1fr; }
            th:nth-child(2), td:nth-child(2) { display: none; } /* Lig sütununu gizle */
            body { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Maç Sonuç Eşleştirici</h1>
    
    <div class="input-section">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür metnini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuç metnini buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">VERİLERİ EŞLEŞTİR VE SIRALA</button>

    <table id="resultsTable" style="display:none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Lig / Kategori</th>
                <th>Maç</th>
                <th>Sonuç (MS / İY)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    
    if (!fixtureText || !resultsText) {
        alert("Lütfen her iki alanı da doldurun.");
        return;
    }

    // 1. Fikstürü Analiz Et
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let fixtures = [];
    
    for (let i = 0; i < fixtureLines.length; i++) {
        // Eğer satır "-" içeriyorsa bu bir maç satırıdır
        if (fixtureLines[i].includes('-') && fixtureLines[i].length > 3) {
            let teamLine = fixtureLines[i];
            let teams = teamLine.split('-').map(t => t.trim());
            
            // Lig bilgisini bul (Genelde maçın 2 veya 3 satır üstündedir)
            let league = "Bilinmiyor";
            if (i > 1) {
                // Saat formatını (00:00) geçip ligi bulmaya çalış
                league = (fixtureLines[i-1].includes(':')) ? fixtureLines[i-2] : fixtureLines[i-1];
            }

            fixtures.push({
                home: teams[0],
                away: teams[1],
                league: league,
                fullMatchName: teamLine
            });
        }
    }

    // 2. Sonuçları Analiz Et
    const resultsLines = resultsText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let parsedResults = [];
    
    for (let i = 0; i < resultsLines.length; i++) {
        if (resultsLines[i].includes('-') && (resultsLines[i].includes('İ.Y') || resultsLines[i].match(/\d\s-\s\d/))) {
            // Bu bir skor veya İY satırı olabilir, ancak biz takım isimlerinden yola çıkacağız
        }
    }

    // 3. Eşleştirme ve Tablo Oluşturma
    // En alttan numaralandırma için diziyi ters çeviriyoruz
    const reversedFixtures = [...fixtures].reverse();
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = "";

    reversedFixtures.forEach((fix, index) => {
        let matchScore = "Oynanmadı";
        let iyScore = "-";

        // Sonuçlar metni içinde ev sahibi ve deplasman takımının beraber geçtiği bloğu ara
        const resLower = resultsText.toLowerCase();
        const hLow = fix.home.toLowerCase();
        const aLow = fix.away.toLowerCase();

        // Basit bir arama algoritması
        let searchIndex = resLower.indexOf(hLow);
        if (searchIndex !== -1) {
            // Takımın bulunduğu yerin yakınındaki 200 karakteri incele
            let snippet = resultsText.substring(searchIndex, searchIndex + 300);
            
            // Skor tespiti (Örn: 2 - 1)
            let scoreMatch = snippet.match(/(\d+)\s*-\s*(\d+)/);
            if (scoreMatch) matchScore = scoreMatch[1] + " - " + scoreMatch[2];

            // İY tespiti (Örn: İ.Y 1 - 0)
            let iyMatch = snippet.match(/İ\.Y\s*(\d+)\s*-\s*(\d+)/i);
            if (iyMatch) iyScore = iyMatch[1] + " - " + iyMatch[2];
        }

        const row = `<tr>
            <td><span class="no-badge">${index + 1}</span></td>
            <td>${fix.league}</td>
            <td>${fix.home} <b>v</b> ${fix.away}</td>
            <td>
                <div class="score-box">MS: ${matchScore}</div>
                <div class="iy-box">İY: ${iyScore}</div>
            </td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    document.getElementById('resultsTable').style.display = "table";
}
</script>

</body>
</html>
