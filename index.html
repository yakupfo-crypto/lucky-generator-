<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .match-card { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .match-card:hover { background-color: #1e293b; border-left-color: #38bdf8; }
        .score-box { background: #334155; border-radius: 4px; min-width: 60px; text-align: center; font-weight: bold; }
        .iy-box { font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-white mb-2">Maç Sonuçları Eşleştirme</h1>
        <p class="text-slate-400">Fikstür ve sonuçları yapıştırın, anında eşleştirin.</p>
    </header>

    <div class="grid md:grid-cols-2 gap-4 mb-8">
        <div>
            <label class="block mb-2 text-sm font-medium">Fikstür Programı</label>
            <textarea id="fixtureInput" class="w-full h-48 p-3 bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Fikstür metnini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label class="block mb-2 text-sm font-medium">Sonuçlar Kısmı</label>
            <textarea id="resultsInput" class="w-full h-48 p-3 bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Sonuç metnini buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg mb-8 transition-all">
        VERİLERİ EŞLEŞTİR VE SIRALA
    </button>

    <div id="output" class="space-y-2">
        </div>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const output = document.getElementById('output');
    output.innerHTML = '';

    // 1. Fikstürü parçala (Saat - Takım A - Takım B formatı tahmini)
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matches = [];
    
    // Basit bir eşleştirme mantığı: Satırda "-" varsa maç satırıdır
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes('-') && i > 0) {
            const teams = fixtureLines[i].split('-');
            matches.push({
                teamA: teams[0].trim(),
                teamB: teams[1].trim(),
                time: fixtureLines[i-1] // Bir önceki satır genelde saattir
            });
        }
    }

    // 2. Sonuçları bir objeye haritala (Takım isimleri anahtar olacak)
    const resultsMap = {};
    const resultBlocks = resultsText.split(/(?=Bitti|90'|PENMS|ERT|UZMS)/g);

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (lines.length >= 3) {
            // Skorun olduğu satırı bul (Örn: 2 - 1)
            const scoreIndex = lines.findIndex(l => /\d+\s*-\s*\d+/.test(l));
            if (scoreIndex !== -1) {
                const teamA = lines[scoreIndex - 1];
                const teamB = lines[scoreIndex + 1];
                const score = lines[scoreIndex];
                
                // İ.Y. skorunu bul
                const iyLine = lines.find(l => l.includes('İ.Y'));
                const iyScore = iyLine ? iyLine.replace('İ.Y', '').trim() : '-';

                resultsMap[teamA] = { score, iyScore };
            }
        }
    });

    // 3. En alttan numaralandır (Diziyi ters çevir)
    const reversedMatches = matches.reverse();

    // 4. HTML Oluştur
    reversedMatches.forEach((match, index) => {
        const result = resultsMap[match.teamA] || { score: 'vs', iyScore: '-' };
        const matchNo = index + 1;

        const row = `
            <div class="match-card bg-slate-800 p-3 flex items-center justify-between shadow-md">
                <div class="flex items-center gap-4">
                    <span class="text-blue-400 font-bold w-6">${matchNo}</span>
                    <div class="flex flex-col">
                        <span class="text-xs text-slate-500">${match.time}</span>
                        <span class="text-sm md:text-base font-semibold text-slate-200">${match.teamA} - ${match.teamB}</span>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <div class="score-box px-3 py-1 text-white">${result.score}</div>
                    <div class="iy-box mt-1">İY: ${result.iyScore}</div>
                </div>
            </div>
        `;
        output.innerHTML += row;
    });

    if (matches.length === 0) {
        output.innerHTML = '<p class="text-center text-red-400">Eşleşen maç bulunamadı. Lütfen formatı kontrol edin.</p>';
    }
}
</script>

</body>
</html>
