<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Skor Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { text-align: center; color: var(--primary); }
        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .results-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background-color: var(--primary); color: white; }
        tr:hover { background-color: #f1f5f9; }
        .no-match { color: #94a3b8; font-style: italic; }
        .ms-score { font-weight: bold; color: #059669; }
        .iy-score { color: #64748b; font-size: 0.9em; }

        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            th:nth-child(3), td:nth-child(3) { display: none; } /* Ligleri mobilde gizle */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Fikstür & Sonuç Eşleştirici</h1>
    
    <div class="input-area">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">VERİLERİ EŞLEŞTİR VE LİSTELE</button>

    <table class="results-table" id="outputTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Maç / Takımlar</th>
                <th>Lig</th>
                <th>MS</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
function cleanName(name) {
    if (!name) return "";
    return name.toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[0-9]/g, '')
        .replace(/u21|u20|ba|go|mg|pa|sp|ce|rj/g, ''); // Yaygın ekleri temizle
}

function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = "";

    // 1. Fikstür Parçalama (Takımları ve Ligleri Bulma)
    const fixtures = [];
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    let currentLeague = "Bilinmiyor";
    for (let i = 0; i < fixtureLines.length; i++) {
        let line = fixtureLines[i];
        
        // Eğer satırda "-" varsa maç satırıdır
        if (line === "-" && i > 0 && i < fixtureLines.length - 1) {
            let teamA = fixtureLines[i-1];
            let teamB = fixtureLines[i+1];
            
            // Lig tespiti (saat formatı olmayan üst satırlardan biridir)
            let leagueIdx = i - 2;
            while(leagueIdx >= 0) {
                if (!fixtureLines[leagueIdx].includes(":") && !fixtureLines[leagueIdx].includes("-")) {
                    currentLeague = fixtureLines[leagueIdx];
                    break;
                }
                leagueIdx--;
            }

            fixtures.push({
                teamA: teamA,
                teamB: teamB,
                cleanA: cleanName(teamA),
                cleanB: cleanName(teamB),
                league: currentLeague,
                ms: "-",
                iy: "-"
            });
        }
    }

    // 2. Sonuçları Parçalama
    const results = [];
    const resLines = resultsText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    for (let i = 0; i < resLines.length; i++) {
        if (resLines[i] === "-" && i > 0 && i < resLines.length - 1) {
            let scoreA = resLines[i-1];
            let scoreB = resLines[i+1];
            let teamA = resLines[i-2];
            let teamB = resLines[i+2];
            
            // İY Bulma
            let iy = "-";
            for(let j = i; j < i + 10 && j < resLines.length; j++) {
                if(resLines[j].includes("İ.Y")) {
                    iy = resLines[j].replace("İ.Y", "").trim();
                    break;
                }
            }

            results.push({
                teamA: cleanName(teamA),
                teamB: cleanName(teamB),
                ms: `${scoreA} - ${scoreB}`,
                iy: iy
            });
        }
    }

    // 3. Eşleştirme ve Tabloya Basma (Alttan numaralandırma için ters döngü)
    let matchCount = 1;
    fixtures.reverse().forEach((fix) => {
        let found = results.find(r => 
            (r.teamA.includes(fix.cleanA) || fix.cleanA.includes(r.teamA)) &&
            (r.teamB.includes(fix.cleanB) || fix.cleanB.includes(r.teamB))
        );

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${matchCount++}</td>
            <td>${fix.teamA} <br> ${fix.teamB}</td>
            <td>${fix.league}</td>
            <td class="ms-score">${found ? found.ms : '-'}</td>
            <td class="iy-score">${found ? found.iy : '-'}</td>
        `;
        tableBody.appendChild(row);
    });
}
</script>

</body>
</html>
