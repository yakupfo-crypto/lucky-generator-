<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .match-card { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .match-card:hover { border-left-color: #3b82f6; background-color: #1e293b; }
        .score-badge { background: #334155; padding: 2px 8px; border-radius: 4px; font-weight: bold; color: #38bdf8; }
        .iy-badge { font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-white mb-2">Skor Tablosu Oluşturucu</h1>
            <p class="text-slate-400">Fikstür ve sonuç metinlerini aşağıya yapıştırın.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <textarea id="fixtureInput" class="w-full h-40 p-3 bg-slate-800 rounded-lg border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Fikstür Programını Buraya Yapıştırın..."></textarea>
            <textarea id="resultInput" class="w-full h-40 p-3 bg-slate-800 rounded-lg border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Sonuçları Buraya Yapıştırın..."></textarea>
        </div>

        <button onclick="processData()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg shadow-lg transform active:scale-95 transition-all mb-8">
            VERİLERİ EŞLEŞTİR VE SIRALA
        </button>

        <div id="output" class="space-y-2">
            </div>
    </div>

    <script>
        function processData() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultText = document.getElementById('resultInput').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';

            // 1. Fikstür İşleme (Takımları Bulma)
            const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let matches = [];
            
            for (let i = 0; i < fixtureLines.length; i++) {
                if (fixtureLines[i] === '-') {
                    const home = fixtureLines[i-1];
                    const away = fixtureLines[i+1];
                    if (home && away) {
                        matches.push({ home, away, score: '?-?', iy: '?-?' });
                    }
                }
            }

            // 2. Sonuçları İşleme ve Eşleştirme
            const resultsRaw = resultText.split('Bitti').filter(r => r.trim().length > 0);
            
            matches.forEach(match => {
                resultsRaw.forEach(res => {
                    if (res.includes(match.home) || res.includes(match.away)) {
                        const scoreMatch = res.match(/(\d+\s*-\s*\d+)/);
                        const iyMatch = res.match(/İ\.Y\s*(\d+\s*-\s*\d+)/);
                        
                        if (scoreMatch) match.score = scoreMatch[1];
                        if (iyMatch) match.iy = iyMatch[1];
                    }
                });
            });

            // 3. Numaralandırma (En alttaki 1 olacak şekilde ters çevir ve render et)
            const total = matches.length;
            const reversedMatches = [...matches].reverse();

            reversedMatches.forEach((match, index) => {
                const matchNumber = index + 1; // En alttaki maç 1 oldu
                const card = document.createElement('div');
                card.className = 'match-card bg-slate-800/50 p-4 rounded-lg flex items-center justify-between shadow-sm';
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-slate-500 font-mono text-sm w-6">${matchNumber}</span>
                        <div>
                            <div class="text-sm md:text-base font-semibold text-slate-200">
                                ${match.home} vs ${match.away}
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="score-badge">${match.score}</div>
                        <div class="iy-badge mt-1 text-xs">İY: ${match.iy}</div>
                    </div>
                `;
                outputDiv.prepend(card); // En üstte en yüksek rakam görünecek şekilde ekler
            });

            if (matches.length === 0) {
                outputDiv.innerHTML = '<p class="text-center text-red-400">Eşleşen maç bulunamadı. Lütfen formatı kontrol edin.</p>';
            }
        }
    </script>
</body>
</html>
