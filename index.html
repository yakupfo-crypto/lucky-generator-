<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:active { transform: scale(0.98); }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    // Satırları ayır ve boş olmayanları al
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    const fragment = document.createDocumentFragment();
    tbody.innerHTML = '';

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        
        // Skor formatlarını (0-0, 1-2, E-E vb.) yakala
        const scoreRegex = /(\d+-\d+|E-E)/g;
        let scores = line.match(scoreRegex) || [];
        
        // Eğer bu satırda hiç skor yoksa ama bir sonraki satır sadece skorsa, onu al
        if (scores.length === 0 && i + 1 < lines.length) {
            let nextLineScores = lines[i+1].match(/^(\d+-\d+|E-E)$/g);
            if (nextLineScores) {
                scores = nextLineScores;
                i++; // Alt satırı kullandığımız için atla
            }
        }

        if (scores.length > 0) {
            let msScore = scores[0]; 
            let iyScore = scores.length > 1 ? scores[1] : "-";

            // Takım isimlerini temizleme mantığı
            let matchName = line
                .replace(scoreRegex, '') // Skorları sil
                .replace(/\d{2}:\d{2}/g, '') // Saatleri sil
                .replace(/\b(MS|İY|IY|İyi|Iyi)\b/gi, '') // Durum belirteçlerini sil
                .replace(/[☆✩✰*]/g, '') // Gereksiz sembolleri sil
                .replace(/\s\s+/g, ' ') // Fazla boşlukları temizle
                .trim();

            // Eğer isim çok kısaysa muhtemelen hatalı satırdır, atla
            if (matchName.length < 2) continue;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${matchName}</td>
                <td style="text-align:center"><span class="skor-kutusu">${msScore}</span></td>
                <td style="text-align:center; color:#888;">${iyScore}</td>
            `;
            fragment.appendChild(tr);
        }
    }
    
    // Performans için tek seferde ekle
    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            text += `${cells[0].innerText}\t${cells[1].innerText}\t${cells[2].innerText}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => {
            alert("Liste başarıyla kopyalandı!");
        });
    } else {
        alert("Kopyalanacak veri bulunamadı.");
    }
}
</script>

</body>
</html>
