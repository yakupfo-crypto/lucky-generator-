function processAndDisplay() {
    // 1. Maç Listesini Hazırla (Numaralandırma alttan başlar)
    const matchLines = rawMatches.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matchPairs = [];
    
    for (let i = 0; i < matchLines.length; i++) {
        if (matchLines[i] === '-') {
            matchPairs.push({
                home: matchLines[i-1],
                away: matchLines[i+1]
            });
        }
    }

    // 2. Sonuçları Parçala ve Map'le
    const resultLines = rawResults.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let resultMap = {};

    for (let i = 0; i < resultLines.length; i++) {
        // Skor satırını bul (örneğin "2 - 1")
        if (resultLines[i].includes(' - ') && !resultLines[i].includes(':') && /[0-9]/.test(resultLines[i])) {
            let homeTeam = resultLines[i-1];
            let awayTeam = resultLines[i+1];
            let fullScore = resultLines[i];
            let htScore = "";
            
            // İlk yarı skorunu bul (İ.Y ile başlayan bir sonraki satır mı?)
            if (resultLines[i+2] && resultLines[i+2].startsWith('İ.Y')) {
                htScore = resultLines[i+2];
            }
            
            const key = (homeTeam + awayTeam).replace(/\s/g, '').toLowerCase();
            resultMap[key] = { fullScore, htScore };
        }
    }

    // 3. HTML Tablosunu Oluştur
    let html = `<table>
                <thead>
                    <tr>
                        <th class="no">#</th>
                        <th>Ev Sahibi</th>
                        <th>Misafir</th>
                        <th>MS</th>
                        <th>İY</th>
                    </tr>
                </thead>
                <tbody>`;

    // Alttan üste doğru numaralandırma ve eşleşme
    const total = matchPairs.length;
    matchPairs.forEach((pair, index) => {
        const matchKey = (pair.home + pair.away).replace(/\s/g, '').toLowerCase();
        const scoreData = resultMap[matchKey] || { fullScore: "-", htScore: "-" };
        
        // 1'den başlayıp üste doğru numaralandır (İstediğiniz: Alttan 1 ile başlamak)
        // Eğer listenin en başındaki maça en yüksek numarayı vermek istiyorsanız:
        const rowNumber = total - index; 

        html += `<tr>
                    <td class="no">${rowNumber}</td>
                    <td>${pair.home}</td>
                    <td>${pair.away}</td>
                    <td class="score">${scoreData.fullScore}</td>
                    <td class="ht-score">${scoreData.htScore}</td>
                </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('matchBoard').innerHTML = html;
}

// Sayfa yüklendiğinde çalıştır
window.onload = processAndDisplay;
</script>
