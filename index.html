<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #1a73e8;
            --secondary: #5f6368;
            --accent: #e8f0fe;
            --text-dark: #202124;
            --border: #dadce0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 { text-align: center; color: var(--primary); }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover { background-color: #1557b0; }

        .match-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            border-left: 5px solid var(--primary);
        }

        .match-id {
            background: var(--accent);
            color: var(--primary);
            font-weight: bold;
            min-width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            font-size: 14px;
        }

        .match-info { flex-grow: 1; }

        .league { font-size: 12px; color: var(--secondary); margin-bottom: 4px; }

        .teams {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scores {
            text-align: right;
            min-width: 120px;
        }

        .final-score {
            font-size: 18px;
            font-weight: 800;
            color: #d93025;
        }

        .ht-score {
            font-size: 12px;
            color: var(--secondary);
            display: block;
        }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .teams { flex-direction: column; align-items: flex-start; }
            .scores { text-align: left; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fikstür & Sonuç Eşleştirici</h1>
    
    <div class="input-section">
        <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar listesini buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">EŞLEŞTİR VE LİSTELE</button>
    </div>

    <div id="output"></div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const output = document.getElementById('output');
    output.innerHTML = '';

    // Fikstür ayrıştırma
    const fixtureLines = fixtureText.split('\n');
    let fixtures = [];
    let currentLeague = "";

    for (let i = 0; i < fixtureLines.length; i++) {
        let line = fixtureLines[i].trim();
        if (!line) continue;

        // Saat formatı kontrolü (00:00 gibi)
        if (line.match(/^\d{2}:\d{2}$/)) {
            let teams = fixtureLines[i+1] ? fixtureLines[i+1].trim() : "";
            let team2 = fixtureLines[i+3] ? fixtureLines[i+3].trim() : "";
            
            if (teams && team2) {
                fixtures.push({
                    league: currentLeague,
                    time: line,
                    home: teams,
                    away: team2
                });
            }
        } else if (isNaN(line.charAt(0)) && !line.includes('-')) {
            currentLeague = line;
        }
    }

    // Sonuç ayrıştırma
    const resultsMap = new Map();
    const resultBlocks = resultsText.split('Bitti').filter(b => b.trim());

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l);
        // Takım isimlerini ve skorları temizle
        let homeTeam = lines[0];
        let scoreLine = lines[1];
        let awayTeam = lines[2];
        let htLine = lines.find(l => l.includes('İ.Y'));

        if (homeTeam && awayTeam) {
            resultsMap.set(homeTeam.toLowerCase(), {
                score: scoreLine,
                ht: htLine || ""
            });
        }
    });

    // Eşleştirme ve Tersten Numaralandırma
    fixtures.reverse(); // En alttakini 1 yapmak için ters çeviriyoruz

    fixtures.forEach((match, index) => {
        let result = resultsMap.get(match.home.toLowerCase()) || { score: "- / -", ht: "İ.Y - / -" };
        
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-id">${index + 1}</div>
            <div class="match-info">
                <div class="league">${match.league} | ${match.time}</div>
                <div class="teams">
                    <span>${match.home} vs ${match.away}</span>
                    <div class="scores">
                        <span class="final-score">${result.score}</span>
                        <span class="ht-score">${result.ht}</span>
                    </div>
                </div>
            </div>
        `;
        output.appendChild(card);
    });
}
</script>

</body>
</html>
