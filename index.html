<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür ve Sonuç Eşleştirici</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            resize: vertical;
            font-size: 14px;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            grid-column: span 2;
        }

        button:hover {
            background-color: #2980b9;
        }

        .match-list {
            display: flex;
            flex-direction: column-reverse; /* En alttaki 1 numara olacak şekilde */
        }

        .match-card {
            background: var(--card-bg);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent-color);
        }

        .match-info {
            flex: 2;
        }

        .match-number {
            font-weight: bold;
            color: var(--accent-color);
            margin-right: 10px;
            min-width: 30px;
            display: inline-block;
        }

        .teams {
            font-weight: 600;
            font-size: 1.1em;
        }

        .league {
            font-size: 0.85em;
            color: #7f8c8d;
            display: block;
        }

        .results {
            flex: 1;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ms-score {
            font-size: 1.2em;
            font-weight: bold;
            color: #e74c3c;
        }

        .iy-score {
            font-size: 0.9em;
            color: #7f8c8d;
        }

        @media (max-width: 600px) {
            .input-section {
                grid-template-columns: 1fr;
            }
            button {
                grid-column: 1;
            }
            .match-card {
                flex-direction: column;
                text-align: center;
            }
            .results {
                margin-top: 10px;
                text-align: center;
                border-top: 1px solid #eee;
                width: 100%;
                padding-top: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Skor Eşleştirme Paneli</h1>

    <div class="input-section">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">Verileri İşle ve Listele</button>
    </div>

    <div id="output" class="match-list">
        </div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const output = document.getElementById('output');
    output.innerHTML = '';

    // 1. Fikstürü ayrıştır (Takım isimlerini baz al)
    const fixtureLines = fixtureText.split('\n').filter(l => l.trim() !== "");
    let matches = [];
    
    // Basit bir eşleştirme algoritması: "-" içeren satırları bul ve üstündeki saat/lig bilgisini al
    for(let i = 0; i < fixtureLines.length; i++) {
        if(fixtureLines[i].trim() === "-") {
            let home = fixtureLines[i-1]?.trim();
            let away = fixtureLines[i+1]?.trim();
            if(home && away) {
                matches.push({
                    home: home,
                    away: away,
                    fullMatch: `${home} - ${away}`,
                    ms: "-",
                    iy: "-"
                });
            }
        }
    }

    // 2. Sonuçları ayrıştır
    const resultBlocks = resultsText.split('Bitti').filter(b => b.trim() !== "");
    
    matches.forEach(match => {
        resultBlocks.forEach(block => {
            // Eğer blok içinde hem ev sahibi hem deplasman takımı geçiyorsa
            if(block.includes(match.home) && block.includes(match.away)) {
                // Skor bulma (Örn: 2 - 1)
                const scoreMatch = block.match(/(\d+\s*-\s*\d+)/);
                if(scoreMatch) match.ms = scoreMatch[0];
                
                // İY bulma (Örn: İ.Y 0 - 0)
                const iyMatch = block.match(/İ\.Y\s*(\d+\s*-\s*\d+)/);
                if(iyMatch) match.iy = iyMatch[1];
            }
        });
    });

    // 3. Ekrana Yazdır (En alttaki 1 olacak şekilde numaralandır)
    matches.forEach((m, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        
        card.innerHTML = `
            <div class="match-info">
                <span class="match-number">${index + 1}.</span>
                <span class="teams">${m.home} vs ${m.away}</span>
            </div>
            <div class="results">
                <span class="ms-score">MS: ${m.ms}</span>
                <span class="iy-score">İY: ${m.iy}</span>
            </div>
        `;
        output.appendChild(card);
    });
}
</script>

</body>
</html>
