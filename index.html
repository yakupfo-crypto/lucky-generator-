<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 { color: var(--primary-color); text-align: center; }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #219150; }

        /* Masaüstü Görünüm */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .results-table th, .results-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .results-table th {
            background-color: var(--primary-color);
            color: white;
        }

        .match-row:hover { background-color: #f9f9f9; }

        .score-box {
            font-weight: bold;
            color: #d35400;
        }

        .iy-score {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-left: 10px;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .input-section { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            
            .results-table thead { display: none; }
            .results-table, .results-table tbody, .results-table tr, .results-table td {
                display: block;
                width: 100%;
            }

            .match-row {
                margin-bottom: 15px;
                border: 1px solid #ddd;
                padding: 10px;
                position: relative;
            }

            .match-row td {
                border: none;
                padding: 5px 0;
            }

            .match-num {
                font-weight: bold;
                color: var(--accent-color);
                border-bottom: 1px solid #eee !important;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fikstür & Sonuç İşleyici</h1>

    <div class="input-section">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">Eşleştir ve Numaralandır</button>
    </div>

    <table class="results-table" id="outputTable" style="display:none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Lig / Saat</th>
                <th>Maç</th>
                <th>Sonuç (MS / İY)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultText = document.getElementById('resultInput').value;
    
    // Fikstür Analizi
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let matches = [];
    
    // Fikstür verisini temizle ve yapılandır (Takım isimlerini yakala)
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i] === "-") {
            let home = fixtureLines[i-1];
            let away = fixtureLines[i+1];
            let timeInfo = fixtureLines[i-2] || "";
            let leagueInfo = fixtureLines[i-3] || "";
            
            matches.push({
                home: home,
                away: away,
                info: leagueInfo + " " + timeInfo,
                result: "Oynanmadı",
                iy: "-"
            });
        }
    }

    // Sonuç Analizi ve Eşleştirme
    const resultBlocks = resultText.split(/Bitti|90'|81'|25'|PENMS|UZMS|ERT/).filter(b => b.includes("-"));
    
    matches.forEach(match => {
        resultBlocks.forEach(block => {
            if (block.includes(match.home) || block.includes(match.away)) {
                // Skor yakalama (Örn: 2 - 1)
                const scoreMatch = block.match(/(\d+)\s*-\s*(\d+)/);
                if (scoreMatch) {
                    match.result = `${scoreMatch[1]} - ${scoreMatch[2]}`;
                }
                // İY yakalama
                const iyMatch = block.match(/İ\.Y\s*(\d+)\s*-\s*(\d+)/);
                if (iyMatch) {
                    match.iy = `${iyMatch[1]} - ${iyMatch[2]}`;
                }
            }
        });
    });

    // Görselleştirme (En alttaki 1 numara olacak şekilde ters çevir)
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = "";
    const total = matches.length;

    matches.reverse().forEach((match, index) => {
        const row = `
            <tr class="match-row">
                <td class="match-num">#${index + 1}</td>
                <td>${match.info}</td>
                <td><strong>${match.home} - ${match.away}</strong></td>
                <td>
                    <span class="score-box">${match.result}</span>
                    <span class="iy-score">(İY: ${match.iy})</span>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });

    document.getElementById('outputTable').style.display = "table";
}
</script>

</body>
</html>
