<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --text: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 800px; margin: auto; }
        h2 { text-align: center; color: var(--primary); }
        textarea { width: 100%; height: 150px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        button:hover { background: #2980b9; }
        .match-card { background: var(--card); border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; border-left: 5px solid var(--accent); }
        .m-num { background: #eee; min-width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: bold; margin-right: 15px; }
        .m-details { flex-grow: 1; }
        .m-teams { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .m-scores { display: flex; gap: 10px; font-size: 14px; }
        .ms { color: #e74c3c; font-weight: bold; }
        .iy { color: #7f8c8d; }
        @media (max-width: 480px) {
            .match-card { padding: 10px; }
            .m-teams { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fikstür & Sonuç İşleyici</h2>
    
    <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
    <textarea id="resultInput" placeholder="Sonuç listesini buraya yapıştırın..."></textarea>
    
    <button onclick="processData()">LİSTEYİ OLUŞTUR VE EŞLEŞTİR</button>

    <div id="output"></div>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultText = document.getElementById('resultInput').value;
    const output = document.getElementById('output');
    output.innerHTML = "";

    // Maçları temizle ve diziye aktar (Takım - Takım formatını yakala)
    const fixtureLines = fixtureText.split('\n').filter(l => l.includes('-'));
    const results = resultText.split(/(?=Bitti|90'|PENMS|UZMS|ERT)/);

    // Sonuçları bir haritaya (map) al (Daha hızlı eşleşme için)
    const scoreMap = {};
    results.forEach(res => {
        const lines = res.split('\n').map(l => l.trim()).filter(l => l);
        let teams = "";
        let ms = "-";
        let iy = "-";

        for(let i=0; i<lines.length; i++) {
            if(lines[i].includes('-') && !lines[i].includes('İ.Y')) {
                // Skor satırı mı takım satırı mı kontrolü
                if(/\d/.test(lines[i])) ms = lines[i]; 
            }
            if(lines[i].includes('İ.Y')) iy = lines[i].replace('İ.Y', '').trim();
            // Takımları bul (Skor ve İY olmayan, 2-3 satır sürebilen yapı)
            if(i > 0 && !lines[i].includes('-') && !lines[i].includes('Bitti') && lines[i].length > 3) {
                teams += lines[i] + " ";
            }
        }
        if(teams) scoreMap[teams.trim().toLowerCase()] = { ms, iy };
    });

    // Fikstürü işle (En alttan 1 numara olacak şekilde)
    const processedMatches = [];
    fixtureLines.forEach((line) => {
        const teams = line.split('-').map(t => t.trim());
        const searchKey = (teams[0] + " " + teams[1]).toLowerCase();
        
        let foundScore = { ms: "Oynanmadı", iy: "-" };
        
        // Akıllı arama: Sonuç listesinde bu takımların geçtiği anahtarı bul
        for (let key in scoreMap) {
            if (key.includes(teams[0].toLowerCase()) || key.includes(teams[1].toLowerCase())) {
                foundScore = scoreMap[key];
                break;
            }
        }

        processedMatches.push({
            name: `${teams[0]} - ${teams[1]}`,
            ms: foundScore.ms,
            iy: foundScore.iy
        });
    });

    // TERSTEN NUMARALANDIRMA VE GÖRÜNÜM
    processedMatches.reverse().forEach((match, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="m-num">${index + 1}</div>
            <div class="m-details">
                <div class="m-teams">${match.name}</div>
                <div class="m-scores">
                    <span class="ms">MS: ${match.ms}</span>
                    <span class="iy">İY: ${match.iy}</span>
                </div>
            </div>
        `;
        output.prepend(card); // En son eklenen en üstte (Numara 1 en altta kalır)
    });
}
</script>

</body>
</html>
