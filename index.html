<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sıralı Skor Eşleştirici</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #222; color: #00ff00; border: 1px solid #444; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; cursor: pointer; font-weight: bold; border: none; border-radius: 5px; }
        .btn-process { background: #00c853; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        .num { color: #888; font-weight: bold; width: 40px; }
        .score { color: #ffeb3b; font-weight: bold; }
        .iy { color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

    <h3>1. Maç Listesini ve 2. Skor Listesini Yapıştır</h3>
    <textarea id="rawInput" placeholder="Önce maç listesini, sonra altına skor listesini yapıştırın..."></textarea>
    
    <div class="controls">
        <button class="btn-process" onclick="generateList()">LİSTEYİ OLUŞTUR VE NUMARALANDIR</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>#</th>
                <th>MAÇ</th>
                <th>MS</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>

<script>
function generateList() {
    const text = document.getElementById('rawInput').value;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    let matches = [];
    let scoresMap = new Map();

    // 1. Adım: Skorları ve Maç Sonuçlarını Haritala (Map)
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('-')) {
            let parts = lines[i].split('-');
            if (parts.length === 2 && /\d/.test(parts[0]) && /\d/.test(parts[1])) {
                // Bu bir skordur, bir üstündeki ve altındaki takım isimlerine bak
                let home = lines[i-1];
                let away = lines[i+1];
                if (home && away && !home.includes(':') && !away.includes('İ.Y')) {
                    let key = (home + away).replace(/\s+/g, '').toLowerCase();
                    let ms = lines[i];
                    let iy = "0-0";
                    if (lines[i+2] && lines[i+2].includes('İ.Y')) {
                        iy = lines[i+2].replace('İ.Y', '').trim();
                    }
                    scoresMap.set(key, {ms, iy});
                }
            }
        }
    }

    // 2. Adım: Maç Listesini Belirle (Saat içeren satırlar arası)
    let tempMatches = [];
    for (let i = 0; i < lines.length; i++) {
        if (/\d{2}:\d{2}/.test(lines[i]) && lines[i+1] && lines[i+2]) {
            let home = lines[i+1];
            let away = lines[i+2];
            if (!away.includes('-') && !away.includes(':')) {
                tempMatches.push(home + " - " + away);
            }
        }
    }

    // 3. Adım: Ters Çevir, Numaralandır ve Tabloya Bas
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    
    // Listeyi ters çeviriyoruz ki aşağıdan yukarı 1-N olsun
    tempMatches.reverse().forEach((mName, index) => {
        let cleanKey = mName.replace(/\s+|-/g, '').toLowerCase();
        let data = scoresMap.get(cleanKey) || {ms: '0-0', iy: '0-0'};
        
        let row = `<tr>
            <td class="num">${index + 1}</td>
            <td>${mName}</td>
            <td class="score">${data.ms}</td>
            <td class="iy">İY: ${data.iy}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
</script>
</body>
</html>
