<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:hover { background: #00e676; }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    const fragment = document.createDocumentFragment();
    tbody.innerHTML = '';

    let matches = [];
    let currentMatch = null;

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        // 1. Skor tespiti (X-X veya E-E)
        let scoreMatch = line.match(/(\d+-\d+|E-E)/g);

        if (scoreMatch) {
            if (currentMatch) {
                // Eğer zaten bir maç ismimiz varsa, bulunan skorları ona ata
                scoreMatch.forEach(s => {
                    if (currentMatch.ms === "-") currentMatch.ms = s;
                    else if (currentMatch.iy === "-") currentMatch.iy = s;
                });
            }
        } else {
            // 2. Takım ismi tespiti (Saat, tarih gibi verileri ele)
            let cleanLine = line
                .replace(/\d{2}:\d{2}/g, '')
                .replace(/\b(MS|İY|İptal|Ertelendi)\b/gi, '')
                .replace(/[☆✩✰]/g, '')
                .trim();

            // Eğer satırda en az bir " - " varsa veya harf yoğunluğu fazlaysa bu bir maç adıdır
            if (cleanLine.length > 3 && !/^\d+$/.test(cleanLine)) {
                // Önceki maç bittiyse (veya ilk defa başlıyorsa) yeni obje aç
                if (currentMatch && currentMatch.ms !== "-") {
                    matches.push(currentMatch);
                }
                currentMatch = { name: cleanLine, ms: "-", iy: "-" };
            }
        }
    }
    // Son maçı ekle
    if (currentMatch) matches.push(currentMatch);

    // DOM'a hızlıca yazdır
    matches.forEach(m => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${m.name}</td>
            <td style="text-align:center"><span class="skor-kutusu">${m.ms}</span></td>
            <td style="text-align:center; color:#888;">${m.iy}</td>
        `;
        fragment.appendChild(tr);
    });

    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if(cells.length === 3) {
            text += `${cells[0].innerText}\t${cells[1].innerText}\t${cells[2].innerText}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => alert("Liste kopyalandı!"));
    } else {
        alert("Kopyalanacak veri yok.");
    }
}
</script>

</body>
</html>
