<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Maç Sonuç Eşleştirici</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #3498db; color: white; text-transform: uppercase; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; }
        .match-row { animation: fadeIn 0.5s ease-in; }
        .score-box { font-weight: bold; color: #e74c3c; background: #fdeaea; padding: 4px 8px; border-radius: 4px; }
        .iy-box { font-size: 0.85em; color: #7f8c8d; margin-left: 10px; }
        .no-data { color: #bdc3c7; font-style: italic; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Sonuçları ve Eşleşmeler</h2>
    <div id="output">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Lig / Takımlar</th>
                    <th>Maç Sonucu (MS)</th>
                    <th>İlk Yarı (İY)</th>
                </tr>
            </thead>
            <tbody id="matchTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
// Mantık: Üstteki maç listesi (Input A) ve Alttaki sonuç listesi (Input B)
// Bu alanları gerçek verilerle değiştirdiğinde sistem otomatik eşleşir.

const macListesiRaw = `
Honduras Ulusal Lig, Kapanış
00:00
CD Victoria
-
Juticalpa FC

Brezilya Kupası
01:00
Bahia BA
-
Clube DO Remo PA
`; // Örnek veri formatı buraya gelir

const sonuclarRaw = `
Bitti
CD Victoria
2 - 1
Juticalpa FC
İ.Y 0 - 0

Bitti
Bahia BA
1 - 3
Clube DO Remo PA
İ.Y 1 - 1
`; // Örnek sonuç formatı buraya gelir

function parseData() {
    // Maç listesini (A) ayıklama
    const aRows = macListesiRaw.trim().split('\n').filter(line => line.trim() !== "");
    let matchesA = [];
    
    for (let i = 0; i < aRows.length; i++) {
        if (aRows[i].includes('-')) {
            let home = aRows[i-1] ? aRows[i-1].trim() : "";
            let away = aRows[i+1] ? aRows[i+1].trim() : "";
            if(home && away) matchesA.push({ home, away });
        }
    }

    // Sonuçları (B) ayıklama (Takım isimlerine göre skor eşleme)
    const bLines = sonuclarRaw.trim().split('\n').map(l => l.trim());
    let resultsMap = {};

    for (let i = 0; i < bLines.length; i++) {
        if (bLines[i].includes(' - ') && !bLines[i].startsWith('İ.Y')) {
            let teamsLine = bLines[i-1];
            let scoreLine = bLines[i];
            let iyLine = bLines[i+1] && bLines[i+1].startsWith('İ.Y') ? bLines[i+1] : "İY Belirsiz";
            
            if(teamsLine && scoreLine) {
                resultsMap[teamsLine.toLowerCase()] = { score: scoreLine, iy: iyLine };
            }
        }
    }

    // Numaralandırma: Alttan başa (Tersten numaralandır)
    const tableBody = document.getElementById('matchTableBody');
    let totalMatches = matchesA.length;

    matchesA.reverse().forEach((match, index) => {
        const matchKey = match.home.toLowerCase();
        const found = resultsMap[matchKey];
        
        let row = document.createElement('tr');
        row.className = 'match-row';
        row.innerHTML = `
            <td>${totalMatches - index}</td>
            <td><strong>${match.home}</strong> - ${match.away}</td>
            <td><span class="${found ? 'score-box' : 'no-data'}">${found ? found.score : 'Veri Yok'}</span></td>
            <td><span class="iy-box">${found ? found.iy : '-'}</span></td>
        `;
        tableBody.appendChild(row);
    });
}

// Sayfa yüklendiğinde çalıştır
window.onload = parseData;
</script>

</body>
</html>
