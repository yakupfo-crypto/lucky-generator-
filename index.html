<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Listesi Numaralandırıcı</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        #matchList {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--accent-color);
        }

        .match-info {
            flex-grow: 1;
            margin-left: 15px;
        }

        .match-no {
            background: var(--primary-color);
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            flex-shrink: 0;
        }

        .league-tag {
            font-size: 12px;
            color: #7f8c8d;
            display: block;
            margin-bottom: 4px;
        }

        .teams {
            font-weight: bold;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .teams { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Listesi Oluşturucu</h2>
    <textarea id="rawInput" placeholder="Maç listesini buraya yapıştırın..."></textarea>
    <button onclick="processMatches()">Numaralandır ve Listele</button>

    <div id="matchList"></div>
</div>

<script>
function processMatches() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(line => line.trim()).filter(line => line !== "");
    const container = document.getElementById('matchList');
    container.innerHTML = "";

    let matches = [];
    let currentLeague = "";

    // Basit bir regex ile saat içeren satırları ve maçları ayıralım
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        // Eğer satırda "-" varsa bu bir maçtır (Takım A - Takım B)
        if (line.includes('-')) {
            let time = "";
            // Bir önceki satır saat mi kontrol et (Örn: 02:30)
            if (i > 0 && /^\d{2}:\d{2}$/.test(lines[i-1])) {
                time = lines[i-1];
            }
            
            matches.push({
                teams: line,
                time: time,
                league: currentLeague
            });
        } else if (!/^\d{2}:\d{2}$/.test(line)) {
            // Saat değilse ve maç değilse lig adıdır
            currentLeague = line;
        }
    }

    // Alttan üste doğru numaralandırma (Son maç 1 numara olacak)
    // Listeyi ters çevirip yazdırıyoruz
    matches.reverse().forEach((match, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        
        card.innerHTML = `
            <div class="match-no">${index + 1}</div>
            <div class="match-info">
                <span class="league-tag">${match.league} | ${match.time}</span>
                <div class="teams">${match.teams}</div>
            </div>
        `;
        container.appendChild(card);
    });
}
</script>

</body>
</html>
