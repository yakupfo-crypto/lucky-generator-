<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-secondary: #7f8c8d;
            --border-color: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 30px; }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover { background-color: #219150; }

        .match-list {
            display: flex;
            flex-direction: column-reverse; /* En alttaki 1 numara olacak şekilde ters sıralama */
            gap: 10px;
            margin-top: 20px;
        }

        .match-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent-color);
        }

        .match-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .match-no {
            font-weight: bold;
            color: var(--text-secondary);
            min-width: 30px;
        }

        .teams {
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 120px;
        }

        .final-score {
            font-size: 1.2rem;
            font-weight: 800;
            color: #e67e22;
        }

        .half-score {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .match-card { flex-direction: column; align-items: flex-start; gap: 10px; }
            .score-box { align-items: flex-start; border-top: 1px solid var(--border-color); width: 100%; pt: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fikstür & Sonuç Eşleştirici</h1>

        <div class="input-section">
            <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
            <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
            <button onclick="processMatches()">Eşleştir ve Listele</button>
        </div>

        <div id="output" class="match-list"></div>
    </div>

    <script>
        function processMatches() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultsText = document.getElementById('resultsInput').value;
            const output = document.getElementById('output');
            output.innerHTML = '';

            // 1. Sonuçları bir haritaya (Map) kaydet
            // Anahtar: "Takım1-Takım2", Değer: { score: "2-1", iy: "0-0" }
            const resultMap = new Map();
            const resultLines = resultsText.split(/\n\s*\n/); // Boş satırlara göre böl

            resultLines.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
                let score = "-";
                let iy = "İ.Y -";
                let home = "", away = "";

                for(let i=0; i < lines.length; i++) {
                    if (lines[i].includes('-') && /\d/.test(lines[i]) && !lines[i].includes('İ.Y')) {
                        score = lines[i];
                        home = lines[i-1];
                        away = lines[i+1];
                    }
                    if (lines[i].includes('İ.Y')) {
                        iy = lines[i];
                    }
                }

                if(home && away) {
                    const key = (home + away).replace(/\s+/g, '').toLowerCase();
                    resultMap.set(key, { score, iy });
                }
            });

            // 2. Fikstürü işle
            const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
            let matches = [];

            for (let i = 0; i < fixtureLines.length; i++) {
                if (fixtureLines[i] === "-") {
                    let home = fixtureLines[i-1];
                    let away = fixtureLines[i+1];
                    
                    if(home && away) {
                        const searchKey = (home + away).replace(/\s+/g, '').toLowerCase();
                        const result = resultMap.get(searchKey) || { score: "Henüz Yok", iy: "İ.Y -" };
                        
                        matches.push({
                            home: home,
                            away: away,
                            score: result.score,
                            iy: result.iy
                        });
                    }
                }
            }

            // 3. Ekrana Yazdır (Numaralandırma en alttan 1 olacak şekilde)
            matches.forEach((match, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-info">
                        <span class="match-no">${index + 1}</span>
                        <span class="teams">${match.home} vs ${match.away}</span>
                    </div>
                    <div class="score-box">
                        <span class="final-score">${match.score}</span>
                        <span class="half-score">${match.iy}</span>
                    </div>
                `;
                output.appendChild(card);
            });
        }
    </script>
</body>
</html>
