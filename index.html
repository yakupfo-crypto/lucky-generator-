<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirme Sistemi PRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #f0f0f0; padding: 20px; line-height: 1.6; }
        .main-container { max-width: 1100px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00e676; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        .input-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 250px; background: #252525; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 13px; resize: none; transition: 0.3s; }
        textarea:focus { border-color: #00e676; outline: none; box-shadow: 0 0 10px rgba(0,230,118,0.2); }
        .controls { text-align: center; margin-bottom: 25px; }
        button { padding: 15px 40px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 50px; border: none; transition: 0.3s; text-transform: uppercase; }
        .btn-merge { background: #00e676; color: #000; margin-right: 10px; }
        .btn-merge:hover { background: #00c853; transform: scale(1.05); }
        .btn-copy { background: #2979ff; color: #fff; }
        .btn-copy:hover { background: #2962ff; transform: scale(1.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #212121; border-radius: 10px; overflow: hidden; }
        th { background: #333; color: #00e676; padding: 15px; font-size: 14px; text-align: left; border-bottom: 2px solid #444; }
        td { padding: 12px 15px; border-bottom: 1px solid #333; font-size: 14px; }
        .row-num { color: #888; font-weight: bold; width: 40px; }
        .score-box { background: #333; color: #ffea00; padding: 5px 10px; border-radius: 5px; font-family: 'Courier New', monospace; font-weight: bold; }
        .iy-box { color: #aaa; font-size: 12px; margin-left: 10px; }
        .match-name { font-weight: 500; }
        .status-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #444; color: #fff; margin-right: 8px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2>Maç & Skor Senkronizasyon Paneli</h2>
    
    <div class="input-sections">
        <div>
            <label style="display:block; margin-bottom:8px; color:#aaa;">1. Taslak Maç Listesi (Üstteki Örnek):</label>
            <textarea id="templateInput" placeholder="Numaralandırılacak ana listeyi buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label style="display:block; margin-bottom:8px; color:#aaa;">2. Skor Verisi (Alttaki Örnek):</label>
            <textarea id="scoreInput" placeholder="Skorlu ve sonuçlanmış verileri buraya yapıştırın..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="btn-merge" onclick="syncMatches()">EŞLEŞTİR VE NUMARALANDIR</button>
        <button class="btn-copy" onclick="copyTable()">TABLOYU KOPYALA</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th class="row-num">#</th>
                <th>MAÇ BİLGİSİ</th>
                <th style="text-align:center;">MS / İY SKORU</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            </tbody>
    </table>
</div>

<script>
function syncMatches() {
    const templateText = document.getElementById('templateInput').value;
    const scoreText = document.getElementById('scoreInput').value;
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';

    // 1. Skor Verisini Haritala (Takım İsimlerine Göre)
    const scoreMap = {};
    const scoreBlocks = scoreText.split(/Bitti|ERT|PENMS|UZMS|\d+'/);
    
    scoreBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 1);
        if (lines.length >= 2) {
            let home = lines[0];
            let scoreLine = lines[1];
            let away = lines[2];
            let iyLine = lines.find(l => l.includes('İ.Y'));

            if (home && away && scoreLine.includes('-')) {
                const key = (home + away).replace(/\s+/g, '').toLowerCase();
                scoreMap[key] = {
                    ms: scoreLine,
                    iy: iyLine ? iyLine.replace('İ.Y', '').trim() : "0 - 0"
                };
            }
        }
    });

    // 2. Taslak Listeyi Alttan Yukarı Numaralandırarak İşle
    const templateLines = templateText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const matches = [];
    
    for (let i = 0; i < templateLines.length; i++) {
        if (templateLines[i].includes(':') && templateLines[i+1] && templateLines[i+2] === "-") {
            matches.push({
                time: templateLines[i],
                home: templateLines[i+1],
                away: templateLines[i+3]
            });
            i += 3;
        }
    }

    // Alttan başlayarak 1'den yukarı doğru numaralandırma
    const total = matches.length;
    matches.reverse().forEach((m, index) => {
        const matchKey = (m.home + m.away).replace(/\s+/g, '').toLowerCase();
        const scoreData = scoreMap[matchKey] || { ms: "- / -", iy: "0 - 0" };
        
        const row = `
            <tr>
                <td class="row-num">${index + 1}</td>
                <td>
                    <span class="status-tag">${m.time}</span>
                    <span class="match-name">${m.home} - ${m.away}</span>
                </td>
                <td style="text-align:center;">
                    <span class="score-box">${scoreData.ms}</span>
                    <span class="iy-box">(İY: ${scoreData.iy})</span>
                </td>
            </tr>
        `;
        // En üste ekle (Çünkü reverse yaptık, alttaki maç 1 oldu ve en üstte görünmesi için prepend yapıyoruz)
        tbody.insertAdjacentHTML('afterbegin', row);
    });
}

function copyTable() {
    let text = "";
    const rows = document.querySelectorAll("#resultBody tr");
    rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        text += `${cells[0].innerText}\t${cells[1].innerText}\t${cells[2].innerText}\n`;
    });
    navigator.clipboard.writeText(text).then(() => alert("Liste kopyalandı!"));
}
</script>

</body>
</html>
