<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Maç Sonuçları Paneli</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .score-box { font-weight: bold; color: #e74c3c; }
        .ht-box { font-size: 0.9em; color: #7f8c8d; }
    </style>
</head>
<body>

    <h2>Maç Sonuçları Sıralı Listesi</h2>
    <table id="matchTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Takımlar</th>
                <th>İ.Y / MS</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        // 1. VERİ GİRİŞİ: Buraya ham metinler yapıştırıldığında sistem çalışır.
        const fixtureRaw = `...Üstteki Örnek Maç Listesi Buraya Gelecek...`;
        const resultsRaw = `...Alttaki Skorlu Maç Listesi Buraya Gelecek...`;

        function parseData() {
            // Fikstürdeki satırları temizle ve diziye al
            const lines = fixtureRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0 && !l.includes(':'));
            
            let matches = [];
            for(let i=0; i<lines.length; i+=2) {
                if(lines[i] && lines[i+1]) {
                    matches.push({ team1: lines[i], team2: lines[i+1] });
                }
            }

            // Skorları içeren metni analiz et
            const resultBlocks = resultsRaw.split(/İ\.Y/);
            const scoreMap = {};

            // Skor eşleştirme mantığı (Takım isimlerini anahtar olarak kullanır)
            // Not: Bu kısım gerçek verideki "Bitti", "90'" gibi durumları ve skorları yakalar
            const linesResults = resultsRaw.split('\n').map(l => l.trim());
            
            const tableBody = document.getElementById('tableBody');
            
            // TERS SIRALAMA VE NUMARALANDIRMA (Aşağıdan yukarıya 1'den başlayarak)
            let counter = 1;
            for (let i = matches.length - 1; i >= 0; i--) {
                const match = matches[i];
                const matchDisplay = `${match.team1} - ${match.team2}`;
                
                // Skor bulma algoritması
                let foundScore = "Henüz Başlamadı";
                let foundHT = "-";

                // Ham metin içinde takımları arayarak skoru eşleştir
                const resultIndex = resultsRaw.indexOf(match.team1);
                if (resultIndex !== -1) {
                    const segment = resultsRaw.substring(resultIndex, resultIndex + 200);
                    const scoreMatch = segment.match(/(\d+)\s*-\s*(\d+)/);
                    const iyMatch = segment.match(/İ\.Y\s*(\d+)\s*-\s*(\d+)/);
                    
                    if (scoreMatch) foundScore = `${scoreMatch[1]} - ${scoreMatch[2]}`;
                    if (iyMatch) foundHT = `(İ.Y ${iyMatch[1]} - ${iyMatch[2]})`;
                }

                const row = `<tr>
                    <td>${counter}</td>
                    <td>${matchDisplay}</td>
                    <td><span class="score-box">${foundScore}</span> <span class="ht-box">${foundHT}</span></td>
                </tr>`;
                
                tableBody.innerHTML += row;
                counter++;
            }
        }

        // Sayfa yüklendiğinde çalıştır
        window.onload = parseData;

        /* GELİŞTİRİCİ NOTLARI:
           1. fixtureRaw: Kullanıcıdan gelen "saat - takım1 - takım2" listesini alır.
           2. resultsRaw: "Bitti - Takım1 - Skor - Takım2 - İY" formatındaki listeyi alır.
           3. Eşleşme: Takım isimleri üzerinden substring araması yaparak skorları yakalar.
           4. Sıralama: Array indexi tersten okunarak (matches.length - 1) tabloya basılır.
        */
    </script>
</body>
</html>
