<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor Paneli</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
            --score-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Modern Kart Tasarımı */
        .match-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: grid;
            grid-template-columns: 80px 1fr 100px;
            align-items: center;
            transition: transform 0.2s;
        }

        .match-item:hover { transform: translateY(-2px); border-color: var(--accent); }

        .league-info {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            grid-column: 1 / -1;
        }

        .status {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .teams {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 10px;
        }

        .team-name {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-box {
            background: var(--score-bg);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .ms-score {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .iy-score {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 2px;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 480px) {
            .match-item {
                grid-template-columns: 60px 1fr 80px;
                padding: 12px;
            }
            .ms-score { font-size: 1rem; }
            .team-name { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container" id="matchContainer">
    </div>

<script>
    // Dinamik Veri Yapısı: Buraya istediğin kadar maç ekleyebilirsin.
    // Script otomatik olarak bu listeyi alttan üste doğru sıralayıp basar.
    const macVerileri = [
        { lig: "Peru Primera Ligi", ev: "Cultural San", dep: "CS Cienciano", ms: "1 - 0", iy: "0 - 0", durum: "Bitti" },
        { lig: "Portekiz Kupası", ev: "Torreense", dep: "AD Fafe", ms: "2 - 0", iy: "0 - 0", durum: "Bitti" },
        { lig: "İspanya La Liga", ev: "Real Oviedo", dep: "Villarreal", ms: "1 - 1", iy: "0 - 1", durum: "Bitti" },
        { lig: "İzlanda Urvalsdeild", ev: "Vikingur Reykjavik", dep: "Stjarnan", ms: "3 - 2", iy: "1 - 1", durum: "Bitti" },
        { lig: "Hollanda Eredivisie", ev: "PSV", dep: "Zwolle", ms: "6 - 1", iy: "1 - 0", durum: "Bitti" },
        { lig: "Ziraat Türkiye Kupası", ev: "Beşiktaş", dep: "Alanyaspor", ms: "3 - 0", iy: "1 - 0", durum: "Bitti" }
    ];

    const container = document.getElementById('matchContainer');

    // MANTIK: Listeyi tersten (alttan üste) döngüye sokuyoruz
    function renderMatches() {
        const reversedData = [...macVerileri].reverse();
        
        container.innerHTML = reversedData.map(mac => `
            <div class="match-item">
                <div class="league-info">${mac.lig}</div>
                <div class="status">${mac.durum}</div>
                <div class="teams">
                    <div class="team-name">${mac.ev}</div>
                    <div class="team-name">${mac.dep}</div>
                </div>
                <div class="score-box">
                    <div class="ms-score">${mac.ms}</div>
                    <div class="iy-score">İY ${mac.iy}</div>
                </div>
            </div>
        `).join('');
    }

    // Uygulamayı başlat
    renderMatches();
</script>

</body>
</html>
