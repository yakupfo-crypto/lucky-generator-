<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Paneli</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #333;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .match-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            border-left: 5px solid var(--primary-color);
            transition: transform 0.2s;
        }

        .match-card:hover {
            transform: scale(1.01);
        }

        .match-no {
            font-weight: bold;
            background: var(--primary-color);
            color: white;
            min-width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            font-size: 0.8em;
        }

        .match-info {
            flex-grow: 1;
        }

        .league-name {
            font-size: 0.75em;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .teams {
            font-weight: 600;
            font-size: 1rem;
        }

        .score-section {
            text-align: right;
            min-width: 120px;
        }

        .main-score {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent-color);
            display: block;
        }

        .half-time {
            font-size: 0.8rem;
            color: #666;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .match-card {
                flex-direction: column;
                align-items: flex-start;
                position: relative;
            }
            .score-section {
                text-align: left;
                margin-top: 10px;
                width: 100%;
                border-top: 1px dashed var(--border-color);
                padding-top: 5px;
            }
            .match-no {
                position: absolute;
                right: 10px;
                top: 10px;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Maç Sonuçları ve Fikstür</h1>
    <div id="scoreboard"></div>
</div>

<script>
// Kullanıcıdan gelen ham metinler (Örnek veriler)
const fiksturRaw = `...buraya fikstür metni gelecek...`; 
const sonuclarRaw = `...buraya sonuçlar metni gelecek...`;

// Gelişmiş Temizleme ve Eşleştirme Fonksiyonu
function parseData() {
    const fixtureLines = document.body.innerText.split('\n'); // Simülasyon için body'den alıyoruz
    // Gerçek uygulamada buradaki değişkenlere yukarıdaki kopyaladığın metni yapıştırabilirsin.
}

function processScores() {
    const content = document.body.innerText;
    const scoreboard = document.getElementById('scoreboard');
    
    // Basit bir regex ve splitting mantığı ile takımları ve skorları ayıklıyoruz
    // Not: Bu kısım senin verdiğin spesifik formata göre optimize edilmiştir.
    
    const matches = [];
    const lines = content.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    // Eşleştirme algoritması (Basitleştirilmiş sürüm)
    // Bu algoritma "Takım A - Takım B" yapısını arar
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes(' - ') && !lines[i].includes(':')) {
            let teamLine = lines[i];
            let league = lines[i-1] || "Bilinmeyen Lig";
            
            // Skor bulma (Aşağıdaki satırlarda "X - Y" formatında skor arar)
            let score = "-";
            let iy = "-";
            
            for(let j=0; j < lines.length; j++) {
                if(lines[j] === teamLine) {
                    // Skor genellikle takım isimlerinin hemen altında veya üstünde olur
                    if(lines[j+1] && lines[j+1].includes(' - ') && /\d/.test(lines[j+1])) {
                        score = lines[j+1];
                        if(lines[j+2] && lines[j+2].includes('İ.Y')) iy = lines[j+2];
                    }
                    if(lines[j-1] && lines[j-1].includes(' - ') && /\d/.test(lines[j-1])) {
                        score = lines[j-1];
                    }
                }
            }
            
            if(!matches.find(m => m.teams === teamLine)) {
                matches.push({ league, teams: teamLine, score, iy });
            }
        }
    }

    // Numaralandırma (En alttaki 1 olacak şekilde ters çevir ve bas)
    const reversedMatches = matches.reverse();
    
    scoreboard.innerHTML = reversedMatches.map((m, index) => `
        <div class="match-card">
            <div class="match-no">${index + 1}</div>
            <div class="match-info">
                <div class="league-name">${m.league}</div>
                <div class="teams">${m.teams}</div>
            </div>
            <div class="score-section">
                <span class="main-score">${m.score === "-" ? "Oynanmadı" : m.score}</span>
                <span class="half-time">${m.iy !== "-" ? m.iy : ""}</span>
            </div>
        </div>
    `).join('');
}

// Sayfa yüklendiğinde çalıştır
window.onload = processScores;
</script>

</body>
</html>
