<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Fikstür ve Sonuç Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { text-align: center; color: var(--primary); }
        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .results-table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        th { background-color: #f1f5f9; font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        .match-row:hover { background-color: #f8fafc; }
        .score-pill {
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-family: monospace;
        }
        .iy-pill {
            font-size: 12px;
            color: #64748b;
            margin-left: 10px;
        }
        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            th, td { font-size: 13px; padding: 10px 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fikstür & Sonuç Eşleştirici</h1>
    
    <div class="input-area">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="scoreInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
    </div>
    
    <button onclick="processData()">EŞLEŞTİR VE LİSTELE</button>

    <table class="results-table" id="outputTable" style="display: none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Lig / Saat</th>
                <th>Maç</th>
                <th>MS / İY</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const scoreText = document.getElementById('scoreInput').value;
    const tableBody = document.getElementById('tableBody');
    const outputTable = document.getElementById('outputTable');
    
    tableBody.innerHTML = '';
    
    // 1. Fikstürü Analiz Et
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let matches = [];
    
    // Basit bir döngüyle maçları ayıkla (Saat ve altındaki iki takım mantığı)
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes(':') && fixtureLines[i+1] && fixtureLines[i+2]) {
            matches.push({
                time: fixtureLines[i],
                team1: fixtureLines[i+1],
                team2: fixtureLines[i+2],
                league: fixtureLines[i-1] || "Bilinmiyor"
            });
        }
    }

    // 2. Sonuçları Analiz Et (Takım isimlerine göre harita oluştur)
    const scoreMap = new Map();
    const scoreBlocks = scoreText.split(/Bitti|90'|81'|25'|PENMS|UZMS|ERT/).filter(b => b.trim().length > 10);

    scoreBlocks.forEach(block => {
        const lines = block.trim().split('\n').map(l => l.trim());
        // Takım isimlerini ve skorları bul
        let t1 = lines[0];
        let t2 = lines[lines.length - 2];
        let ms = lines[1] || "-";
        let iy = "İ.Y -";

        lines.forEach(l => {
            if (l.includes('İ.Y')) iy = l;
        });

        if (t1 && t2) {
            scoreMap.set(t1.toLowerCase(), { ms, iy });
        }
    });

    // 3. Eşleştir ve Tersten (En alttan 1) Numaralandır
    const finalData = matches.map(m => {
        // Tam eşleşme veya takım adının içinde geçmesi durumu
        let found = scoreMap.get(m.team1.toLowerCase());
        return {
            ...m,
            ms: found ? found.ms : "- - -",
            iy: found ? found.iy : "İ.Y - - -"
        };
    });

    // Tersten sıralama (En son maç 1 numara olacak şekilde)
    finalData.reverse();

    finalData.forEach((item, index) => {
        const row = document.createElement('tr');
        row.className = 'match-row';
        row.innerHTML = `
            <td>${index + 1}</td>
            <td style="font-size:12px"><b>${item.league}</b><br>${item.time}</td>
            <td>${item.team1} - ${item.team2}</td>
            <td>
                <span class="score-pill">${item.ms}</span>
                <span class="iy-pill">${item.iy}</span>
            </td>
        `;
        tableBody.appendChild(row);
    });

    outputTable.style.display = 'table';
}
</script>

</body>
</html>
