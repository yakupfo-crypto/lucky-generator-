<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e74c3c;
            --accent: #27ae60;
            --light: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .input-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #c0392b;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: var(--white);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:hover { background-color: #f9f9f9; }

        .score-badge {
            background: var(--accent);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }

        .iy-badge {
            font-size: 12px;
            color: #7f8c8d;
            margin-left: 10px;
        }

        .match-no {
            font-weight: bold;
            color: #95a5a6;
            width: 40px;
        }

        @media (max-width: 768px) {
            .input-sections { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
            th, td { padding: 8px; font-size: 12px; }
            .iy-badge { display: block; margin-left: 0; margin-top: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Skor Eşleştirme Sistemi</h1>
        <p>Fikstürü ve sonuçları yapıştırın, anında eşleşenleri görün.</p>
    </div>

    <div class="input-sections">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstürü buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processMatches()">EŞLEŞTİR VE LİSTELE</button>

    <table class="results-table" id="outputTable" style="display:none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Maç Detayı</th>
                <th>Skor (MS / İY)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function normalize(text) {
    return text.toLowerCase()
        .replace(/ı/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u')
        .replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c')
        .replace(/[^a-z0-9]/g, '').trim();
}

function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    
    // Fikstür Parçalama (Takımları bulma)
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let fixtures = [];
    
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes('-')) {
            const teams = fixtureLines[i].split('-');
            if (teams.length === 2) {
                fixtures.push({
                    home: teams[0].trim(),
                    away: teams[1].trim(),
                    matchKey: normalize(teams[0]) + normalize(teams[1])
                });
            }
        }
    }

    // Sonuç Parçalama
    const resultsParts = resultsText.split(/(?=Bitti|İ\.Y|\d{2}')/g);
    let scoresMap = {};

    for (let i = 0; i < resultsParts.length; i++) {
        const block = resultsParts[i];
        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 1);
        
        // Skor bloğu içinde skor ve takım bulma mantığı
        const scoreMatch = block.match(/(\d+\s*-\s*\d+)/);
        const iyMatch = block.match(/İ\.Y\s*(\d+\s*-\s*\d+)/);
        
        if (scoreMatch) {
            // Takım isimlerini yakalamaya çalış (skorun üstündeki ve altındaki satırlar)
            // Bu kısım metin formatına göre esneklik gösterir
            fixtures.forEach(f => {
                if (block.includes(f.home) || block.includes(f.away)) {
                    scoresMap[f.matchKey] = {
                        ms: scoreMatch[0],
                        iy: iyMatch ? iyMatch[1] : ' - '
                    };
                }
            });
        }
    }

    // Tabloyu Oluştur (En alttaki 1 numara olacak şekilde ters çevir)
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const reversedFixtures = [...fixtures].reverse();

    reversedFixtures.forEach((match, index) => {
        const scoreData = scoresMap[match.matchKey] || { ms: 'Oynanmadı', iy: '-' };
        const row = `
            <tr>
                <td class="match-no">${reversedFixtures.length - index}</td>
                <td><strong>${match.home}</strong> vs <strong>${match.away}</strong></td>
                <td>
                    <span class="score-badge">${scoreData.ms}</span>
                    <span class="iy-badge">İY: ${scoreData.iy}</span>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });

    document.getElementById('outputTable').style.display = 'table';
}
</script>

</body>
</html>
