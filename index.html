<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        button { width: 100%; background: #00c853; color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .lig-baslik { background: #d32f2f; color: white; font-weight: bold; text-align: center; font-size: 13px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        .ms-tag { color: #00e676; font-weight: bold; font-size: 11px; border: 1px solid #00e676; padding: 2px 4px; border-radius: 3px; }
        .ert-tag { color: #ff9800; border-color: #ff9800; }
        .bekle-tag { color: #888; border-color: #555; } /* Skorsuz maçlar için gri etiket */
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    <button onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>

    <table>
        <thead>
            <tr>
                <th>DURUM</th>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    tbody.innerHTML = '';

    let currentLig = "";

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        // 1. LİG TESPİTİ
        if (line === line.toUpperCase() && !line.includes('-') && isNaN(line.charAt(0)) && line.length > 3 && !line.includes("MS")) {
            currentLig = line;
            tbody.innerHTML += `<tr><td colspan="4" class="lig-baslik">${currentLig}</td></tr>`;
            continue;
        }

        // 2. MAÇ TESPİTİ (Skor olsun veya olmasın içinde "-" geçen satırlar)
        if (line.includes('-') && line.length > 3) {
            let msScore = "-";
            let iyScore = "-";
            let statusTag = "MS";
            let tagClass = "ms-tag";

            // Skorları bul (0-0 veya E-E formatı)
            let matches = line.match(/\d+-\d+|E-E/g); 
            
            let homeAwayPart = line;

            if (matches) {
                msScore = matches[0];
                if (msScore === "E-E") {
                    msScore = "E";
                    iyScore = "E";
                    statusTag = "ERT";
                    tagClass = "ms-tag ert-tag";
                } else if (matches.length > 1) {
                    iyScore = matches[matches.length - 1];
                }
                
                // Skorları metinden temizle ki takım isimleri kalsın
                matches.forEach(m => { homeAwayPart = homeAwayPart.replace(m, ' SPLIT '); });
            } else {
                // Skor yoksa durumu "BAŞL." veya boş yapabiliriz
                statusTag = "-";
                tagClass = "ms-tag bekle-tag";
            }

            // Takım isimlerini ayır
            let parts = homeAwayPart.split(/SPLIT|-/);
            let home = parts[0] ? parts[0].trim() : "";
            let away = parts[1] ? parts[1].trim() : "";

            // Gereksiz ifadeleri temizle
            const clean = (text) => text.replace(/[☆✩✰]/g, '').replace(/\d+\sMS/g, '').replace(/MS/g, '').trim();
            let cleanHome = clean(home);
            let cleanAway = clean(away);

            if(cleanHome.length < 2) continue;

            // Eğer alt satırda İY skoru unutulmuşsa kontrol et (Opsiyonel)
            if (msScore !== "-" && msScore !== "E" && iyScore === "-") {
                for (let j = 1; j <= 2; j++) {
                    if (i + j < lines.length) {
                        let nextLine = lines[i + j].trim();
                        let subMatch = nextLine.match(/^(\d+-\d+)$/);
                        if (subMatch) {
                            iyScore = subMatch[1];
                            i = i + j; // Satırı atla
                            break;
                        }
                    }
                }
            }

            let fullMatchName = cleanHome + (cleanAway ? " - " + cleanAway : "");

            tbody.innerHTML += `
                <tr>
                    <td><span class="${tagClass}">${statusTag}</span></td>
                    <td>${fullMatchName}</td>
                    <td style="text-align:center"><span class="skor-kutusu">${msScore}</span></td>
                    <td style="text-align:center; color:#888;">${iyScore}</td>
                </tr>`;
        }
    }
}
</script>

</body>
</html>
