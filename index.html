<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: var(--primary); }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #1d4ed8; }
        #resultsTable {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        #resultsTable th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            font-size: 13px;
        }
        #resultsTable td {
            border-bottom: 1px solid #f1f5f9;
            padding: 10px;
            font-size: 13px;
            text-align: center;
        }
        .match-row:nth-child(even) { background-color: #f8fafc; }
        .no { font-weight: bold; color: #64748b; width: 30px; }
        .teams { text-align: left !important; font-weight: 500; }
        .score-box {
            display: inline-block;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            min-width: 40px;
        }
        .iy-box { color: #ef4444; font-size: 11px; margin-left: 5px; }
        @media (max-width: 600px) {
            #resultsTable th:nth-child(2), #resultsTable td:nth-child(2) { display: none; }
            td { font-size: 12px !important; padding: 8px 4px !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fikstür & Skor Eşleştirici</h2>
    
    <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
    <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
    
    <button onclick="processData()">EŞLEŞTİR VE LİSTELE</button>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Saat</th>
                <th>Maç Detayı</th>
                <th>MS</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="matchBody">
            </tbody>
    </table>
</div>

<script>
    function cleanName(name) {
        if (!name) return "";
        return name.toLowerCase()
            .replace(/u21|u20|fc|sc|cd|ba|go|mg|sp|pa|ce|sjdr|ac|club|de|deportivo|atletico|indep|u\.|juniors/g, "")
            .replace(/[^a-z0-9]/g, "")
            .trim();
    }

    function processData() {
        const fixtureRaw = document.getElementById('fixtureInput').value;
        const resultsRaw = document.getElementById('resultsInput').value;
        const body = document.getElementById('matchBody');
        body.innerHTML = "";

        // 1. Fikstür Analizi
        const fixtureLines = fixtureRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let matches = [];
        
        for (let i = 0; i < fixtureLines.length; i++) {
            if (fixtureLines[i].includes(':') && i + 2 < fixtureLines.length) {
                const time = fixtureLines[i];
                const team1 = fixtureLines[i+1];
                const team2 = fixtureLines[i+2] === "-" ? fixtureLines[i+3] : fixtureLines[i+2];
                matches.push({
                    time: time,
                    t1: team1,
                    t2: team2,
                    clean1: cleanName(team1),
                    clean2: cleanName(team2),
                    ms: "-",
                    iy: "-"
                });
            }
        }

        // 2. Sonuç Eşleştirme
        const resultsLines = resultsRaw.split('\n').map(l => l.trim());
        
        matches.forEach(match => {
            for (let j = 0; j < resultsLines.length; j++) {
                let line = cleanName(resultsLines[j]);
                // Eğer takımlardan biri sonuçlar satırında geçiyorsa
                if (line.length > 3 && (line.includes(match.clean1) || match.clean1.includes(line))) {
                    // Yakın çevrede skor ara
                    for (let k = Math.max(0, j-5); k < Math.min(resultsLines.length, j+10); k++) {
                        // MS Ara (Örn: 2 - 1)
                        const msMatch = resultsLines[k].match(/(\d+)\s*-\s*(\d+)/);
                        if (msMatch && !resultsLines[k].includes('İ.Y')) {
                            match.ms = `${msMatch[1]} - ${msMatch[2]}`;
                        }
                        // İY Ara
                        if (resultsLines[k].includes('İ.Y')) {
                            const iyMatch = resultsLines[k].match(/(\d+)\s*-\s*(\d+)/);
                            if (iyMatch) match.iy = `${iyMatch[1]} - ${iyMatch[2]}`;
                        }
                    }
                }
            }
        });

        // 3. Numaralandırma (Aşağıdan yukarıya 1) ve Tabloya Basma
        const total = matches.length;
        matches.reverse().forEach((m, index) => {
            const row = `
                <tr class="match-row">
                    <td class="no">${total - index}</td>
                    <td>${m.time}</td>
                    <td class="teams">${m.t1} <br> ${m.t2}</td>
                    <td><span class="score-box">${m.ms}</span></td>
                    <td><span class="iy-box">${m.iy}</span></td>
                </tr>
            `;
            body.innerHTML += row;
        });
    }
</script>

</body>
</html>
