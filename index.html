<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 { text-align: center; color: var(--primary); }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .input-group { grid-template-columns: 1fr; }
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            resize: vertical;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        #resultArea {
            margin-top: 30px;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .match-row {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-variant-numeric: tabular-nums;
        }

        .match-row:nth-child(even) { background-color: #fcfcfc; }

        .match-info { flex: 1; }
        .score-box {
            font-weight: 800;
            color: #ef4444;
            margin-left: 15px;
            white-space: nowrap;
        }

        .num {
            display: inline-block;
            width: 35px;
            font-weight: bold;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Skor Eşleştirici</h1>
    
    <div class="input-group">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstürü buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Sonuçlar Kısmı:</label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">HIZLI EŞLEŞTİR VE SIRALA</button>

    <div id="resultArea" style="display:none;">
        <div id="matchList"></div>
    </div>
</div>

<script>
function cleanText(text) {
    return text.split('\n')
               .map(line => line.trim())
               .filter(line => line.length > 0 && !line.includes(':') && isNaN(line.charAt(0)));
}

function processData() {
    const fixtureRaw = document.getElementById('fixtureInput').value;
    const resultsRaw = document.getElementById('resultsInput').value;
    
    // 1. Fikstürdeki maçları ayıkla (Saat ve Lig isimlerini atla)
    // Mantık: İki satır ard arda geliyorsa takımlardır.
    const fixtureLines = fixtureRaw.split('\n').map(l => l.trim()).filter(l => l !== "");
    let fixtureMatches = [];
    
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i] && fixtureLines[i+1] && !fixtureLines[i].includes(':') && !fixtureLines[i+1].includes(':') && fixtureLines[i].length > 3 && fixtureLines[i+1].length > 3) {
            // Basit bir kontrol: Eğer satır saat değilse ve bir sonraki satır da saat değilse bunlar takımdır
            fixtureMatches.push({ home: fixtureLines[i], away: fixtureLines[i+1] });
            i++; 
        }
    }

    // 2. Sonuçları bir haritaya (Map) al
    const resultsLines = resultsRaw.split('\n').map(l => l.trim()).filter(l => l !== "");
    let scoresMap = {};

    for (let i = 0; i < resultsLines.length; i++) {
        let home = resultsLines[i];
        let away = resultsLines[i+2]; // Genelde arada skor olur
        let score = resultsLines[i+1];
        let iy = "";

        if(resultsLines[i+3] && resultsLines[i+3].includes("İ.Y")) {
            iy = resultsLines[i+3];
        }

        // Anahtar oluştur (Takım isimlerini birleştir)
        let key = (home + away).replace(/\s+/g, '').toLowerCase();
        scoresMap[key] = { full: score, half: iy };
    }

    // 3. Eşleştirme ve Numaralandırma
    const resultDiv = document.getElementById('matchList');
    resultDiv.innerHTML = "";
    
    // En alttan numaralandırma için listeyi ters çevirip işliyoruz
    const reversedFixtures = [...fixtureMatches].reverse();

    reversedFixtures.forEach((match, index) => {
        let matchKey = (match.home + match.away).replace(/\s+/g, '').toLowerCase();
        let found = scoresMap[matchKey];
        
        const row = document.createElement('div');
        row.className = 'match-row';
        
        let scoreText = found ? `MS ${found.full} (${found.half})` : "Sonuç Bekleniyor";
        
        row.innerHTML = `
            <div class="match-info">
                <span class="num">${index + 1}.</span>
                <span>${match.home} - ${match.away}</span>
            </div>
            <div class="score-box">${scoreText}</div>
        `;
        resultDiv.appendChild(row);
    });

    document.getElementById('resultArea').style.display = 'block';
}
</script>

</body>
</html>
