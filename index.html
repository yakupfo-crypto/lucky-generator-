<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici PRO v2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        textarea { width: 100%; height: 180px; background: #1a1a1a; color: #00ff00; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: monospace; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-process { background: #ffca28; color: #000; }
        .btn-copy { background: #29b6f6; color: #fff; }
        button:hover { opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; background: #181818; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        th { background: #252525; color: #888; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #252525; font-size: 14px; }
        .num-col { color: #ffca28; font-weight: bold; width: 30px; }
        .score-box { background: #333; color: #00ff00; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        .iy-box { color: #aaa; font-size: 12px; margin-left: 10px; }
        .match-name { font-weight: 500; }
        .no-match { color: #555; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #ffca28;">Skor Eşleştirme Sistemi</h2>
    <textarea id="rawInput" placeholder="Tüm metni (maç listesi ve sonuçlar dahil) buraya yapıştırın..."></textarea>
    
    <div class="controls">
        <button class="btn-process" onclick="syncScores()">VERİLERİ EŞLEŞTİR VE NUMARALANDIR</button>
        <button class="btn-copy" onclick="copyTable()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>#</th>
                <th>EŞLEŞEN MAÇ</th>
                <th>MS SKOR</th>
                <th>İY SKOR</th>
            </tr>
        </thead>
        <tbody id="outputBody"></tbody>
    </table>
</div>

<script>
function syncScores() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('outputBody');
    tbody.innerHTML = '';

    let matchPairs = [];
    let scoreDatabase = {};

    // 1. ADIM: Sonuç Veritabanını Oluştur (Alttan Üste Tarama)
    // "Bitti", "90'", "İ.Y" gibi anahtar kelimeleri kullanarak skorları yakala
    for (let i = lines.length - 1; i >= 0; i--) {
        if (lines[i].includes('-') && (i > 0 && (lines[i-1] === "Bitti" || lines[i-1].includes("'")))) {
            let score = lines[i];
            let teamA = lines[i-1] === "Bitti" || lines[i-1].includes("'") ? lines[i-2] : lines[i-1];
            let teamB = lines[i+1];
            let iy = "-";

            // İY Skoru bul (bir sonraki satırlarda "İ.Y" araması yap)
            for(let j=1; j<=3; j++) {
                if(lines[i+j] && lines[i+j].includes("İ.Y")) {
                    iy = lines[i+j].replace("İ.Y", "").trim();
                    break;
                }
            }

            if (teamA && teamB) {
                let key = (teamA + teamB).replace(/\s+/g, '').toLowerCase();
                scoreDatabase[key] = { ms: score, iy: iy };
            }
        }
    }

    // 2. ADIM: Ana Maç Listesini Tespit Et ve Eşleştir
    let matchCounter = 1;
    for (let i = 0; i < lines.length; i++) {
        // "00:00" gibi saat formatı veya "-" içeren maç satırlarını bul
        if (/\d{2}:\d{2}/.test(lines[i]) && lines[i+1] && lines[i+3]) {
            let home = lines[i+1];
            let away = lines[i+3];
            
            if (home && away && !home.includes('-') && !away.includes('-')) {
                let searchKey = (home + away).replace(/\s+/g, '').toLowerCase();
                let matchData = scoreDatabase[searchKey];

                let row = `<tr>
                    <td class="num-col">${matchCounter}</td>
                    <td class="match-name">${home} - ${away}</td>
                    <td>${matchData ? `<span class="score-box">${matchData.ms}</span>` : '<span class="no-match">Sonuç Bekleniyor</span>'}</td>
                    <td>${matchData ? `<span class="iy-box">İY: ${matchData.iy}</span>` : '-'}</td>
                </tr>`;
                
                tbody.innerHTML += row;
                matchCounter++;
            }
        }
    }
}

function copyTable() {
    let text = "";
    const rows = document.querySelectorAll('#outputBody tr');
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if(cells.length > 1) {
            text += `${cells[0].innerText}) ${cells[1].innerText} | MS: ${cells[2].innerText} | ${cells[3].innerText}\n`;
        }
    });
    navigator.clipboard.writeText(text).then(() => alert("Liste numaralı şekilde kopyalandı!"));
}
</script>

</body>
</html>
