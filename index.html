<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: var(--primary); }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; }
        .result-item {
            background: var(--card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--primary);
        }
        .match-info { flex: 2; }
        .score-info {
            flex: 1;
            text-align: right;
            font-weight: bold;
        }
        .index-badge {
            background: #e2e8f0;
            padding: 5px 10px;
            border-radius: 5px;
            margin-right: 15px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        .iy { color: #64748b; font-size: 0.85em; font-weight: normal; }
        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
            .result-item { flex-direction: column; text-align: center; }
            .score-info { text-align: center; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Sonuç Eşleştirici</h2>
    
    <div class="input-grid">
        <textarea id="fixInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
    </div>
    
    <button onclick="processData()">ANALİZ ET VE EŞLEŞTİR</button>

    <div id="output" style="margin-top: 30px;"></div>
</div>

<script>
function processData() {
    const fixText = document.getElementById('fixInput').value;
    const resText = document.getElementById('resInput').value;
    const output = document.getElementById('output');
    output.innerHTML = "";

    // Fikstürü satırlara böl ve temizle
    const fixLines = fixText.split('\n').filter(l => l.trim() !== "");
    let matches = [];

    // Fikstürden maçları çıkar (Takım A - Takım B formatı tahmini)
    for(let i = 0; i < fixLines.length; i++) {
        if(fixLines[i].includes('-')) {
            let teams = fixLines[i].split('-');
            let home = teams[0].trim();
            let away = teams[1].trim();
            if(home && away) {
                matches.push({ home, away, score: "Oynanmadı", iy: "" });
            }
        }
    }

    // Sonuçları işle (Gelişmiş regex/arama)
    const resBlocks = resText.split('Bitti').filter(b => b.trim() !== "");
    
    matches.forEach(match => {
        resBlocks.forEach(block => {
            if(block.includes(match.home) || block.includes(match.away)) {
                // Skor bulma (0 - 0 formatı)
                const scoreMatch = block.match(/(\d+)\s*-\s*(\d+)/);
                // İY bulma
                const iyMatch = block.match(/İ\.Y\s*(\d+\s*-\s*\d+)/);
                
                if(scoreMatch) match.score = scoreMatch[0];
                if(iyMatch) match.iy = `(İY: ${iyMatch[1]})`;
            }
        });
    });

    // En alttaki 1 olacak şekilde ters sırala ve yazdır
    matches.reverse();
    
    matches.forEach((m, index) => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
            <div style="display:flex; align-items:center">
                <span class="index-badge">${index + 1}</span>
                <div class="match-info">
                    <strong>${m.home} vs ${m.away}</strong>
                </div>
            </div>
            <div class="score-info">
                <div>${m.score}</div>
                <div class="iy">${m.iy}</div>
            </div>
        `;
        output.appendChild(div);
    });
}
</script>

</body>
</html>
