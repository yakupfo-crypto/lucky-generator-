<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinamik Skor Eşleştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .match-row:nth-child(even) { background-color: #1e293b; }
        .live-pulse { animation: pulse 2s infinite; color: #22c55e; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        textarea { scrollbar-width: thin; scrollbar-color: #475569 #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-blue-500 mb-2">LiveMatch Processor</h1>
            <p class="text-slate-400 text-sm">Fikstür ve sonuçları yapıştırın, sistem anında eşleştirsin.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">1. Fikstür Listesi (Ham Metin)</label>
                <textarea id="fixtureInput" class="w-full h-48 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Maç listesini buraya yapıştırın..."></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">2. Sonuç Listesi (Ham Metin)</label>
                <textarea id="resultsInput" class="w-full h-48 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="Sonuçları buraya yapıştırın..."></textarea>
            </div>
        </div>

        <button onclick="processScores()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg mb-8 uppercase tracking-widest">
            Verileri Birleştir ve Listele
        </button>

        <div id="displayArea" class="hidden bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="p-4">Durum</th>
                            <th class="p-4 text-right">Ev Sahibi</th>
                            <th class="p-4 text-center">MS</th>
                            <th class="p-4">Deplasman</th>
                            <th class="p-4 text-center">İY</th>
                        </tr>
                    </thead>
                    <tbody id="matchTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function normalizeName(name) {
            return name.toLowerCase()
                .trim()
                .replace(/\s+/g, '')
                .replace(/[^\w\s]/gi, '');
        }

        function processScores() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultsText = document.getElementById('resultsInput').value;
            const tableBody = document.getElementById('matchTableBody');
            const displayArea = document.getElementById('displayArea');

            if (!fixtureText || !resultsText) {
                alert("Lütfen her iki alanı da doldurun!");
                return;
            }

            // 1. Sonuçları Parse Et (Takım isimlerini anahtar yaparak sakla)
            const resultsMap = new Map();
            const resultLines = resultsText.split('\n');
            
            let currentHome = "";
            let currentAway = "";
            let currentScore = "-";
            let currentIY = "-";
            let currentStatus = "";

            for (let i = 0; i < resultLines.length; i++) {
                let line = resultLines[i].trim();
                if (!line) continue;

                // Skor ve İY yakalama mantığı
                if (line.includes(' - ') && /\d/.test(line)) {
                    if (line.startsWith('İ.Y')) {
                        currentIY = line.replace('İ.Y', '').trim();
                    } else {
                        currentScore = line.trim();
                    }
                } else if (line === "Bitti" || line === "ERT" || line.includes("'") || line === "PENMS" || line === "UZMS") {
                    currentStatus = line;
                } else {
                    // Takım ismi olma ihtimali (Eğer skor değilse ve durum değilse)
                    // Basit bir state machine: ilk gelen ev, ikinci gelen deplasman
                    if (!currentHome) {
                        currentHome = line;
                    } else if (!currentAway) {
                        currentAway = line;
                        // Kaydet ve sıfırla
                        const key = normalizeName(currentHome) + normalizeName(currentAway);
                        resultsMap.set(key, { score: currentScore, iy: currentIY, status: currentStatus });
                        
                        // Bir sonraki maç için temizle ama skorları/statüyü default yap
                        currentHome = ""; currentAway = ""; currentScore = "-"; currentIY = "-"; currentStatus = "";
                    }
                }
            }

            // 2. Fikstürle Eşleştir ve Tabloyu Oluştur
            tableBody.innerHTML = '';
            const fixtureLines = fixtureText.split('\n');
            let fixHome = "";
            let fixAway = "";

            for (let j = 0; j < fixtureLines.length; j++) {
                let line = fixtureLines[j].trim();
                if (line.includes(' - ') && !/\d/.test(line)) {
                    const teams = line.split(' - ');
                    fixHome = teams[0].trim();
                    fixAway = teams[1].trim();

                    const key = normalizeName(fixHome) + normalizeName(fixAway);
                    const data = resultsMap.get(key) || { score: '?', iy: '?', status: 'Bekliyor' };

                    const statusClass = (data.status !== "Bitti" && data.status !== "ERT" && data.status !== "Bekliyor") ? "live-pulse font-bold" : "text-slate-500";

                    const row = `
                        <tr class="match-row border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                            <td class="p-4 text-xs ${statusClass}">${data.status}</td>
                            <td class="p-4 text-right font-semibold text-sm md:text-base">${fixHome}</td>
                            <td class="p-4 text-center">
                                <span class="bg-slate-700 px-3 py-1 rounded text-blue-400 font-bold">${data.score}</span>
                            </td>
                            <td class="p-4 text-left font-semibold text-sm md:text-base">${fixAway}</td>
                            <td class="p-4 text-center text-xs text-slate-400 font-mono">${data.iy}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                }
            }

            displayArea.classList.remove('hidden');
            displayArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
