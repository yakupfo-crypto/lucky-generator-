<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici ve Numaralandırıcı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #f0f0f0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        textarea { width: 100%; height: 200px; background: #1a1a1a; color: #00ff00; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: monospace; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-process { background: #ff9800; color: #000; }
        .btn-copy { background: #2196f3; color: #fff; }
        button:hover { opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #fff; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #2a2a2a; font-size: 14px; }
        .row-num { color: #ffeb3b; font-weight: bold; width: 40px; }
        .match-name { color: #fff; }
        .score-ms { color: #00e676; font-weight: bold; text-align: center; width: 80px; }
        .score-iy { color: #888; text-align: center; width: 80px; }
        .highlight { color: #ff4081; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #ff9800;">SKOR EŞLEŞTİRME SİSTEMİ</h2>
    <textarea id="rawInput" placeholder="Maç listesini ve skorları buraya topluca yapıştırın..."></textarea>
    
    <div class="controls">
        <button class="btn-process" onclick="analyzeAndSync()">1- SIRALA VE SKORLARI EŞLEŞTİR</button>
        <button class="btn-copy" onclick="copyResult()">2- SONUÇLARI KOPYALA</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>#</th>
                <th>KARŞILAŞMA</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
function analyzeAndSync() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l !== "");
    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = '';

    let matchPairs = [];
    let scoreDatabase = {};

    // 1. ADIM: Skorları Veritabanına Al (Tüm metni tara)
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('-') && (i + 1 < lines.length)) {
            let teamA = lines[i-1];
            let teamB = lines[i+1];
            
            // Eğer bu bir skor satırıysa (Örn: 2 - 1)
            if (/^\d+\s*-\s*\d+$/.test(lines[i]) || lines[i] === "-") {
                let key = (teamA + teamB).replace(/\s+/g, '').toLowerCase();
                let ms = lines[i];
                let iy = "-";

                // İY sonucunu bul (alt satırlarda "İ.Y" arayarak)
                for (let j = 1; j <= 3; j++) {
                    if (lines[i+j] && lines[i+j].includes("İ.Y")) {
                        iy = lines[i+j].replace("İ.Y", "").trim();
                        break;
                    }
                }
                scoreDatabase[key] = { ms, iy };
            }
        }
    }

    // 2. ADIM: Maç İsimlerini Çıkar (Başlangıçtaki saatli liste)
    let finalMatches = [];
    for (let i = 0; i < lines.length; i++) {
        if (/^\d{2}:\d{2}$/.test(lines[i])) {
            let home = lines[i+1];
            let away = lines[i+3];
            if (home && away && away !== "-") {
                finalMatches.push({ home, away });
            }
        }
    }

    // 3. ADIM: Tersten Numaralandır ve Tabloya Bas
    let count = 1;
    for (let i = finalMatches.length - 1; i >= 0; i--) {
        let m = finalMatches[i];
        let key = (m.home + m.away).replace(/\s+/g, '').toLowerCase();
        let score = scoreDatabase[key] || { ms: "-", iy: "-" };

        let row = `<tr>
            <td class="row-num">${count}</td>
            <td class="match-name">${m.home} - ${m.away}</td>
            <td class="score-ms">${score.ms}</td>
            <td class="score-iy">${score.iy}</td>
        </tr>`;
        
        resultBody.insertAdjacentHTML('afterbegin', row); // En son eklenen en üstte (1 numara altta kalacak şekilde)
        count++;
    }
}

function copyResult() {
    let text = "";
    const rows = document.querySelectorAll("#resultBody tr");
    rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        text += `${cells[0].innerText}\t${cells[1].innerText}\tMS: ${cells[2].innerText}\tİY: ${cells[3].innerText}\n`;
    });
    
    navigator.clipboard.writeText(text).then(() => {
        alert("Sıralı liste kopyalandı!");
    });
}
</script>

</body>
</html>
