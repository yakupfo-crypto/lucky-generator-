<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sıfır Hata Skor Eşleştirici</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        textarea { width: 100%; height: 100px; background: #222; color: #00e676; border: 1px solid #444; }
        button { background: #00c853; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #333; }
        .score { color: #ffeb3b; font-weight: bold; }
        .iy { color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="box">
    <h3>Sıralı Maç İsimleri</h3>
    <textarea id="targetMatches" placeholder="Eşleştirilecek ana listeyi buraya yapıştırın..."></textarea>
</div>

<div class="box">
    <h3>Güncel Skor Verileri</h3>
    <textarea id="sourceScores" placeholder="En alttan gelen güncel skorları buraya yapıştırın..."></textarea>
</div>

<button onclick="syncScores()">VERİLERİ EŞLEŞTİR VE SIRALA</button>

<table id="resultTable">
    <thead>
        <tr>
            <th>#</th>
            <th>Maç</th>
            <th>MS</th>
            <th>İY</th>
        </tr>
    </thead>
    <tbody id="resultBody"></tbody>
</table>

<script>
function syncScores() {
    const targetLines = document.getElementById('targetMatches').value.split('\n').filter(l => l.includes('-'));
    const sourceText = document.getElementById('sourceScores').value;
    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = '';

    targetLines.forEach((line, index) => {
        let teams = line.split('-').map(t => t.trim());
        let home = teams[0].replace(/\d{2}:\d{2}/, '').trim();
        let away = teams[1].trim();
        
        // Kaynak metin içinde bu takımları ara ve skorunu çek
        let ms = "-";
        let iy = "-";
        
        // Basit regex ile MS ve İY yakalama (Geliştirilmiş mantık)
        let pattern = new RegExp(home + "[\\s\\S]*?(\\d+ - \\d+|ERT|PENMS)[\\s\\S]*?İY (\\d+ - \\d+)", "i");
        let match = sourceText.match(pattern);
        
        if(match) {
            ms = match[1];
            iy = match[2];
        }

        let row = `<tr>
            <td>${index + 1}</td>
            <td>${home} - ${away}</td>
            <td class="score">${ms}</td>
            <td class="iy">${iy}</td>
        </tr>`;
        resultBody.innerHTML += row;
    });
}
</script>
</body>
</html>
