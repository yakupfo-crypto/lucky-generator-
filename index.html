<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Maç Numaralandırıcı</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        #result {
            margin-top: 25px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .match-row {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .match-number {
            font-weight: bold;
            color: var(--accent-color);
            min-width: 30px;
        }

        .match-content {
            flex: 1;
        }

        .league-title {
            background: #e9ecef;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 15px;
            border-radius: 4px;
            color: #555;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            button { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Listesi Numaralandırıcı</h2>
    <p style="font-size: 12px; color: #666; text-align: center;">Maç listesini yapıştırın. En alttaki maç 1'den başlayarak numaralandırılacaktır.</p>
    
    <textarea id="inputList" placeholder="Maçları buraya yapıştırın..."></textarea>
    
    <button onclick="processList()">LİSTEYİ OLUŞTUR</button>

    <div id="result"></div>
</div>

<script>
    function processList() {
        const input = document.getElementById('inputList').value;
        const resultDiv = document.getElementById('result');
        
        if (!input.trim()) {
            alert("Lütfen bir liste yapıştırın!");
            return;
        }

        // Satırlara böl ve temizle
        let lines = input.split('\n').map(line => line.trim());
        
        let matchBlocks = [];
        let currentBlock = "";

        // Maçları tespit etme mantığı (Saat içeren satırlar maç başlangıcı kabul edilir)
        // Ancak senin formatında "Takım - Takım" yapısı asıl maç satırı.
        
        let finalOutput = [];
        let matchesFound = [];

        // Önce tüm maçları (tire içeren satırları) ayıklayalım
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('-') && lines[i].length > 3) {
                matchesFound.push({
                    originalIndex: i,
                    content: lines[i]
                });
            }
        }

        // En alttaki maça 1 verecek şekilde numaraları ters ata
        let matchCounter = matchesFound.length;
        let matchMap = {};

        matchesFound.forEach((match) => {
            matchMap[match.originalIndex] = matchCounter--;
        });

        // Çıktıyı oluştur
        let html = "";
        for (let i = 0; i < lines.length; i++) {
            if (lines[i] === "") continue;

            if (matchMap[i]) {
                html += `<div class="match-row">
                            <span class="match-number">${matchMap[i]}.</span>
                            <span class="match-content">${lines[i]}</span>
                         </div>`;
            } else {
                // Eğer saat veya lig ismiyse farklı stil ver
                const isTime = /^\d{2}:\d{2}$/.test(lines[i]);
                if (isTime) {
                    html += `<div style="color: #999; font-size: 0.85em; margin-top:5px; padding-left: 40px;">${lines[i]}</div>`;
                } else {
                    html += `<div class="league-title">${lines[i]}</div>`;
                }
            }
        }

        resultDiv.innerHTML = html;
    }
</script>

</body>
</html>
