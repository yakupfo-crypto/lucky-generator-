<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Süper Skor Eşleştirici v3</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; background: #333; color: #fff; border: 1px solid #555; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-run { background: #4CAF50; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        th { background: #2c2c2c; }
        .no-col { width: 50px; text-align: center; color: #aaa; }
        .score-col { font-weight: bold; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>

    <h3>1. Maç Listesi (İsimler)</h3>
    <textarea id="listInput" placeholder="Sadece maç isimlerinin olduğu listeyi buraya yapıştırın..."></textarea>

    <h3>2. Güncel Skor Verisi</h3>
    <textarea id="scoreInput" placeholder="Skorlu karışık veriyi buraya yapıştırın..."></textarea>

    <div class="controls">
        <button class="btn-run" onclick="processMatches()">NUMARALANDIR VE EŞLEŞTİR</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th class="no-col">No</th>
                <th>Maç Karşılaşması</th>
                <th class="score-col">MS</th>
                <th class="score-col">İY</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>

    <script>
    function processMatches() {
        const listText = document.getElementById('listInput').value;
        const scoreText = document.getElementById('scoreInput').value;
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        // 1. Maç İsimlerini Temizleme
        const nameLines = listText.split('\n')
            .map(l => l.trim())
            .filter(l => l.includes('-') && !/\d+/.test(l));

        // 2. Skor Verisini Haritalama (Map)
        const scoreMap = new Map();
        const scoreBlocks = scoreText.split(/Bitti|PENMS|UZMS|ERT|\d+'/i);

        scoreBlocks.forEach(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length >= 2) {
                const teams = lines[0] + " - " + lines[lines.length-1]; // Örn: Takım A - Takım B
                const scoreMatch = block.match(/(\d+\s*-\s*\d+)/);
                const iyMatch = block.match(/İ\.Y\s*(\d+\s*-\s*\d+)/);
                
                if (scoreMatch) {
                    const cleanKey = lines[0].toLowerCase().replace(/\s/g, '');
                    scoreMap.set(cleanKey, {
                        ms: scoreMatch[1],
                        iy: iyMatch ? iyMatch[1] : '0 - 0'
                    });
                }
            }
        });

        // 3. Eşleştirme ve Ters Numaralandırma
        let total = nameLines.length;
        nameLines.forEach((matchName, index) => {
            const homeTeam = matchName.split('-')[0].trim();
            const cleanKey = homeTeam.toLowerCase().replace(/\s/g, '');
            const scoreData = scoreMap.get(cleanKey) || { ms: '- - -', iy: '- - -' };

            const row = `<tr>
                <td class="no-col">${total - index}</td>
                <td>${matchName}</td>
                <td class="score-col">${scoreData.ms}</td>
                <td class="score-col">${scoreData.iy}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }
    </script>
</body>
</html>
