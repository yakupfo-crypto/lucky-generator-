<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Sonuç İşleyici</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-section {
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: var(--card-bg);
            border: 1px solid #334155;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        #output { width: 100%; max-width: 900px; }
        
        .league-title {
            background: #334155;
            padding: 8px 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            border-left: 4px solid var(--accent);
        }
        
        .match-row {
            background: var(--card-bg);
            margin: 5px 0;
            padding: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .team { font-weight: 500; font-size: 15px; }
        .team.home { text-align: right; }
        .team.away { text-align: left; }
        
        .score-box {
            background: #0f172a;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
        }
        
        .ms { font-size: 18px; font-weight: 900; color: var(--success); display: block; }
        .iy { font-size: 11px; color: var(--text-dim); margin-top: 4px; display: block; }
        
        @media (max-width: 600px) {
            .match-row { grid-template-columns: 1fr 80px 1fr; padding: 10px; }
            .team { font-size: 13px; }
            .score-box { min-width: 60px; padding: 5px; }
        }
    </style>
</head>
<body>

<div class="input-section">
    <h2>Maç Verilerini Buraya Yapıştır</h2>
    <textarea id="rawInput" placeholder="Fikstür ve sonuçları karmaşık şekilde buraya yapıştırın..."></textarea>
    <button onclick="processData()">Sistemi Çalıştır ve Eşleştir</button>
</div>

<div id="output"></div>

<script>
function processData() {
    const rawText = document.getElementById('rawInput').value;
    const output = document.getElementById('output');
    output.innerHTML = '';

    // Satırlara böl ve temizle
    const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    let matches = [];
    let currentLeague = "Diğer Ligler";

    // Mantık: Metni tarayıp maçları ve sonuçları yakala
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Lig tespiti (Genelde sonunda Lig, Kupası, Turu gibi ifadeler olur)
        if (line.includes('Lig') || line.includes('Kupa') || line.includes('Division') || line.includes('Açılış') || line.includes('Kapanış')) {
            currentLeague = line;
            continue;
        }

        // Maç satırı tespiti (Takım A - Takım B formatı veya alt alta isimler)
        if (line === '-') {
            const home = lines[i-1];
            const away = lines[i+1];
            
            // Bu maçı sistemde ara (Sonuçlar kısmında var mı?)
            const resultData = findResult(home, away, lines);
            
            matches.push({
                league: currentLeague,
                home: home,
                away: away,
                score: resultData.ms || '?-?',
                iy: resultData.iy || 'İY: ?-?'
            });
        }
    }

    // Alttan üste doğru sırala (Kullanıcı isteği)
    matches.reverse();

    // Görselleştir
    let lastLeague = "";
    matches.forEach(m => {
        if (m.league !== lastLeague) {
            const leagueDiv = document.createElement('div');
            leagueDiv.className = 'league-title';
            leagueDiv.innerText = m.league;
            output.appendChild(leagueDiv);
            lastLeague = m.league;
        }

        const matchDiv = document.createElement('div');
        matchDiv.className = 'match-row';
        matchDiv.innerHTML = `
            <div class="team home">${m.home}</div>
            <div class="score-box">
                <span class="ms">${m.score}</span>
                <span class="iy">${m.iy}</span>
            </div>
            <div class="team away">${m.away}</span>
        `;
        output.appendChild(matchDiv);
    });
}

function findResult(h, a, allLines) {
    let ms = "";
    let iy = "";
    for (let j = 0; j < allLines.length; j++) {
        // Takım isimleri eşleşiyor mu kontrol et
        if (allLines[j] === h && allLines[j+2] === a) {
            // Bir alt satırda skor var mı? (Örn: 2 - 1)
            if (allLines[j+1].includes('-')) {
                ms = allLines[j+1];
            }
            // İlerleyen satırlarda İY var mı?
            if (allLines[j+3] && allLines[j+3].includes('İ.Y')) {
                iy = allLines[j+3].replace('İ.Y', 'İY:');
            }
        }
    }
    return { ms, iy };
}
</script>

</body>
</html>
