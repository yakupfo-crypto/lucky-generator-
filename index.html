<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Sonucu Eşleştirici Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        h2 { text-align: center; color: var(--primary); }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 16px;
        }

        button:hover { opacity: 0.9; }

        #resultArea {
            margin-top: 25px;
            white-space: pre-wrap;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            font-family: monospace;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .input-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fikstür & Sonuç Birleştirici</h2>
    
    <div class="input-group">
        <div>
            <label>1. Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>2. Maç Sonuçları:</label>
            <textarea id="resultsInput" placeholder="Sonuç listesini buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">EŞLEŞTİR VE LİSTELE</button>

    <div id="resultArea">Sonuçlar burada görünecek...</div>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const resultArea = document.getElementById('resultArea');

    if (!fixtureText || !resultsText) {
        alert("Lütfen her iki alanı da doldurun!");
        return;
    }

    // 1. Fikstür Ayrıştırma
    // Format: Takım A - Takım B içeren satırları bulur
    const fixtureLines = fixtureText.split('\n').filter(l => l.trim() !== "");
    let fixtures = [];
    
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes('-')) {
            let home = fixtureLines[i-1] ? fixtureLines[i-1].trim() : "Bilinmiyor";
            let away = fixtureLines[i+1] ? fixtureLines[i+1].trim() : "Bilinmiyor";
            
            // Eğer saat veya lig bilgisi girmişse onları temizle/atla (Basit temizlik)
            if(home.match(/^\d{2}:\d{2}$/)) home = "Takım Bulunamadı";

            fixtures.push({
                home: home,
                away: away,
                fullLine: `${home} - ${away}`,
                matchData: ""
            });
        }
    }

    // 2. Sonuçları Ayrıştırma
    // Takım isimlerini ve skorları yakalamak için daha esnek bir yapı
    const resultsBlocks = resultsText.split('Bitti').filter(b => b.trim() !== "");
    let matchResults = [];

    resultsBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        // Skor satırını bul (Örn: 2 - 1)
        const scoreIndex = lines.findIndex(l => l.match(/\d+ - \d+/));
        
        if (scoreIndex !== -1) {
            const home = lines[scoreIndex - 1];
            const away = lines[scoreIndex + 1];
            const score = lines[scoreIndex];
            const iy = lines.find(l => l.includes("İ.Y")) || "İ.Y 0 - 0";
            
            matchResults.push({
                home: home,
                away: away,
                resultStr: `Skor: ${score} (${iy})`
            });
        }
    });

    // 3. Eşleştirme (İsim benzerliğine göre)
    fixtures.forEach(f => {
        const found = matchResults.find(r => 
            (f.home.toLowerCase().includes(r.home?.toLowerCase()) || r.home?.toLowerCase().includes(f.home.toLowerCase())) &&
            (f.away.toLowerCase().includes(r.away?.toLowerCase()) || r.away?.toLowerCase().includes(f.away.toLowerCase()))
        );
        if (found) {
            f.matchData = found.resultStr;
        } else {
            f.matchData = "Sonuç Bulunamadı";
        }
    });

    // 4. Ters Çevirmeden En Alttan Numaralandırarak Yazdırma
    // Kullanıcı "ters çevirmeden" dediği için normal sırayla ancak 1'den başlayarak
    let output = "";
    fixtures.forEach((f, index) => {
        output += `${index + 1}. ${f.home} - ${f.away}  ==>  ${f.matchData}\n`;
    });

    resultArea.innerText = output;
}
</script>

</body>
</html>
