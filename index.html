<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #219150; }

        .result-table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .result-table tr {
            border-bottom: 1px solid #eee;
        }

        .result-table th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        .result-table td {
            padding: 12px 8px;
        }

        /* Mobil Görünüm Optimizasyonu */
        @media (max-width: 600px) {
            .input-group { grid-template-columns: 1fr; }
            .result-table { font-size: 0.8rem; }
            .container { padding: 10px; }
            td { padding: 8px 4px; }
        }

        .no-badge {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 5px;
        }

        .score { font-weight: bold; color: #e74c3c; }
        .iy-score { color: #7f8c8d; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fikstür & Sonuç Eşleştirici</h2>
    
    <div class="input-group">
        <textarea id="fixInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
    </div>

    <button onclick="processData()">VERİLERİ EŞLEŞTİR VE LİSTELE</button>

    <table class="result-table" id="outputTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Maç</th>
                <th>MS</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
function processData() {
    const fixText = document.getElementById('fixInput').value;
    const resText = document.getElementById('resInput').value;
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = '';

    // Fikstür Parçalama (Takımları bulma)
    const fixLines = fixText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let fixtures = [];
    
    for (let i = 0; i < fixLines.length; i++) {
        if (fixLines[i] === '-') {
            let home = fixLines[i-1];
            let away = fixLines[i+1];
            if(home && away) {
                fixtures.push({ home, away });
            }
        }
    }

    // Sonuç Parçalama (Skorları bulma)
    const resBlocks = resText.split('Bitti').filter(b => b.trim().length > 0);
    let resultsMap = {};

    resBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let homeTeam = "";
        let awayTeam = "";
        let score = "-";
        let iyScore = "-";

        for (let j = 0; j < lines.length; j++) {
            if (lines[j].includes(' - ') && /\d/.test(lines[j])) {
                score = lines[j];
                homeTeam = lines[j-1];
                awayTeam = lines[j+1];
            }
            if (lines[j].startsWith('İ.Y')) {
                iyScore = lines[j].replace('İ.Y', '').trim();
            }
        }

        if(homeTeam && awayTeam) {
            let key = (homeTeam + awayTeam).replace(/\s+/g, '').toLowerCase();
            resultsMap[key] = { score, iyScore };
        }
    });

    // Eşleştirme ve Tersten Numaralandırma
    // En alttaki maç 1 olacak şekilde numaralandırıyoruz
    const total = fixtures.length;
    
    for (let i = 0; i < total; i++) {
        let f = fixtures[i];
        let key = (f.home + f.away).replace(/\s+/g, '').toLowerCase();
        let matchRes = resultsMap[key] || { score: '?', iyScore: '?' };
        
        let row = `<tr>
            <td><span class="no-badge">${total - i}</span></td>
            <td>${f.home} - ${f.away}</td>
            <td class="score">${matchRes.score}</td>
            <td class="iy-score">${matchRes.iyScore}</td>
        </tr>`;
        
        // Yukarıya doğru ekle (En son eklenen en üstte görünür ama no'su büyük olur)
        tableBody.insertAdjacentHTML('afterbegin', row);
    }
}
</script>

</body>
</html>
