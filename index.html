<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:active { transform: scale(0.98); }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        
        .col-mac { width: auto; }
        .col-skor { width: 1px; white-space: nowrap; text-align: center; padding-left: 2px; padding-right: 2px; } 
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th class="col-mac">MAÇ</th>
                <th class="col-skor">MS</th>
                <th class="col-skor">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const rawLines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0 && l !== '-');
    const tbody = document.getElementById('sonucAlani');
    const fragment = document.createDocumentFragment();
    const scoreRegex = /(\d+-\d+|E-E)/g;
    
    tbody.innerHTML = '';

    for (let i = 0; i < rawLines.length; i++) {
        let currentLine = rawLines[i].replace(/(^-\s+)|(\s+-$)/g, '').trim();
        let scores = currentLine.match(scoreRegex) || [];
        
        // Takım ismi temizleme (Skorları ve gereksiz ekleri at)
        let matchName = currentLine
            .replace(scoreRegex, '')
            .replace(/\d{2}:\d{2}/g, '')
            .replace(/\b(MS|İY|IY|İyi|Iyi|Sonuçlandı|Bitti)\b/gi, '')
            .replace(/[☆✩✰*]/g, '')
            .replace(/\s+/g, ' ')
            .trim();

        let msScore = scores[0] || "";
        let iyScore = scores[1] || "";

        // 3 SATIR KONTROLÜ VE BİRLEŞTİRME MANTIĞI
        // Eğer bu satırda skor yoksa veya sadece 1 skor varsa alt satırlara bak
        if (i + 1 < rawLines.length) {
            let next1 = rawLines[i+1].replace(/(^-)|(-$)/g, '').trim();
            let next1Scores = next1.match(scoreRegex) || [];

            // Durum A: Mevcut satırda isim var, bir alt satırda skor var
            if (msScore === "" && next1Scores.length > 0) {
                msScore = next1Scores[0];
                iyScore = next1Scores[1] || "";
                i++; // Bir alt satırı tükettik

                // Eğer hala İY skoru yoksa 3. satıra bak
                if (iyScore === "" && i + 1 < rawLines.length) {
                    let next2 = rawLines[i+1].replace(/(^-)|(-$)/g, '').trim();
                    let next2Scores = next2.match(scoreRegex) || [];
                    if (next2Scores.length > 0) {
                        iyScore = next2Scores[0];
                        i++;
                    } else if (next2.length > 3) { // 3. satır skor değil isimse ekle
                        matchName += " " + next2;
                        i++;
                    }
                }
            } 
            // Durum B: Mevcut satırda isim ve MS var, alt satırda isim devam ediyor veya İY skoru var
            else if (msScore !== "" && iyScore === "") {
                if (next1Scores.length > 0) {
                    iyScore = next1Scores[0];
                    i++;
                } else if (next1.length > 3) {
                    matchName += " " + next1;
                    i++;
                    // İsimden sonra hala skor aranabilir
                    if (i + 1 < rawLines.length) {
                        let next2 = rawLines[i+1].match(scoreRegex);
                        if (next2) { iyScore = next2[0]; i++; }
                    }
                }
            }
        }

        // Temizlik: matchName içinde kalan "MS", "İY" gibi artıkları tekrar temizle
        matchName = matchName.replace(/\b(MS|İY|IY)\b/gi, '').trim();

        if (matchName.length > 2 && msScore !== "") {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${matchName}</td>
                <td class="col-skor"><span class="skor-kutusu">${msScore}</span></td>
                <td class="col-skor" style="color:#888;">${iyScore || "-"}</td>
            `;
            fragment.appendChild(tr);
        }
    }
    tbody.appendChild(fragment);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            text += `${cells[0].innerText.trim()}\tMS ${cells[1].innerText.trim()}\tİY ${cells[2].innerText.trim()}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => alert("Liste 3 satır kontrolüyle birleştirilip kopyalandı!"));
    } else {
        alert("Kopyalanacak veri yok.");
    }
}
</script>

</body>
</html>
