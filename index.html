<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Analyzer Pro - Canlı Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #16a34a;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .input-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .results-container {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .match-card {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .match-card:last-child {
            border-bottom: none;
        }

        .match-card:nth-child(even) {
            background-color: #f8fafc;
        }

        .match-no {
            font-weight: bold;
            color: var(--secondary);
            width: 40px;
        }

        .match-info {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
        }

        .team {
            font-weight: 500;
        }

        .team-home { text-align: right; }
        .team-away { text-align: left; }

        .score-box {
            background: var(--dark);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            min-width: 60px;
            text-align: center;
        }

        .iy-score {
            font-size: 12px;
            color: #ef4444;
            margin-left: 10px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .input-sections { grid-template-columns: 1fr; }
            .match-info { font-size: 12px; }
            .score-box { min-width: 45px; padding: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Score Analyzer Pro</h1>
        <p>Fikstür ve sonuçları otomatik eşleştirin</p>
    </header>

    <div class="input-sections">
        <div>
            <label><strong>Fikstür Programı:</strong></label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label><strong>Maç Sonuçları:</strong></label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">ANALİZ ET VE EŞLEŞTİR</button>

    <div id="outputContainer" class="results-container" style="display: none;">
        <div id="resultsList"></div>
    </div>
</div>

<script>
    function normalizeName(name) {
        if (!name) return "";
        return name.toLowerCase()
            .replace(/u21|u19|ba|go|mg|sp|ce|rj|pa|sc|ac|fc|cd|fk|sk|cf|de/g, "")
            .replace(/[^a-z0-9]/g, "")
            .trim();
    }

    function parseFixture(text) {
        const matches = [];
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        for (let i = 0; i < lines.length; i++) {
            // "Takım A - Takım B" formatını ara
            if (lines[i].includes('-') && lines[i].length > 5) {
                const parts = lines[i].split('-');
                if (parts.length === 2) {
                    matches.push({
                        home: parts[0].trim(),
                        away: parts[1].trim(),
                        id: normalizeName(parts[0]) + normalizeName(parts[1])
                    });
                }
            } else if (i < lines.length - 1 && !lines[i].includes(':') && isNaN(lines[i].charAt(0))) {
                // Alternatif alt alta format: 
                // Takım A
                // -
                // Takım B
                if (lines[i+1] === '-' && lines[i+2]) {
                    matches.push({
                        home: lines[i].trim(),
                        away: lines[i+2].trim(),
                        id: normalizeName(lines[i]) + normalizeName(lines[i+2])
                    });
                    i += 2;
                }
            }
        }
        return matches;
    }

    function parseResults(text) {
        const resultsMap = new Map();
        const segments = text.split(/Bitti|90'|81'|25'|PENMS|UZMS|ERT/);

        segments.forEach(seg => {
            const lines = seg.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length >= 3) {
                let home, away, score = "? - ?", iy = "";
                
                // Skor satırını bul (örneğin "2 - 1")
                const scoreIdx = lines.findIndex(l => /\d+\s*-\s*\d+/.test(l));
                const iyIdx = lines.findIndex(l => l.includes('İ.Y'));

                if (scoreIdx !== -1) {
                    home = lines[scoreIdx - 1];
                    away = lines[scoreIdx + 1];
                    score = lines[scoreIdx];
                    if (iyIdx !== -1) {
                        iy = lines[iyIdx].replace('İ.Y', '').trim();
                    }
                    
                    const key = normalizeName(home) + normalizeName(away);
                    resultsMap.set(key, { score, iy });
                }
            }
        });
        return resultsMap;
    }

    function processData() {
        const fixtureText = document.getElementById('fixtureInput').value;
        const resultsText = document.getElementById('resultsInput').value;
        
        const fixture = parseFixture(fixtureText);
        const results = parseResults(resultsText);
        
        const resultsList = document.getElementById('resultsList');
        resultsList.innerHTML = "";
        
        // Tersten numaralandırma için listeyi ters çeviriyoruz veya indeksi ona göre ayarlıyoruz
        // Kullanıcı "en alttan 1 ile başlasın" dediği için:
        const total = fixture.length;
        
        fixture.forEach((match, index) => {
            const matchResult = results.get(match.id) || { score: "- - -", iy: "" };
            
            const card = document.createElement('div');
            card.className = 'match-card';
            
            // Numara: Toplamdan çıkararak (En alttaki 1 olacak şekilde)
            const matchNo = total - index;

            card.innerHTML = `
                <div class="match-no">#${matchNo}</div>
                <div class="match-info">
                    <div class="team team-home">${match.home}</div>
                    <div class="score-box">${matchResult.score}</div>
                    <div class="team team-away">
                        ${match.away}
                        ${matchResult.iy ? `<span class="iy-score">(İY: ${matchResult.iy})</span>` : ''}
                    </div>
                </div>
            `;
            // En alttaki 1 olması için başa ekliyoruz (prepend)
            resultsList.prepend(card);
        });

        document.getElementById('outputContainer').style.display = 'block';
    }
</script>

</body>
</html>
