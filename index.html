<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; transition: 0.2s; }
        .btn-islem { background: #00c853; color: black; }
        .btn-islem:active { transform: scale(0.98); }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        
        .col-mac { width: auto; }
        .col-skor { width: 1px; white-space: nowrap; text-align: center; padding-left: 2px; padding-right: 2px; } 
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th class="col-mac">MAÇ</th>
                <th class="col-skor">MS</th>
                <th class="col-skor">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0 && l !== '-');
    const tbody = document.getElementById('sonucAlani');
    const fragment = document.createDocumentFragment();
    const scoreRegex = /(\d+-\d+|E-E)/g;
    
    tbody.innerHTML = '';

    for (let i = 0; i < lines.length; i++) {
        let currentLine = lines[i].replace(/(^-\s+)|(\s+-$)/g, '').trim();
        let currentScores = currentLine.match(scoreRegex);

        // 3 SATIRLI BLOK KONTROLÜ (1: Ev+MS, 2: Deplasman, 3: İY)
        if (currentScores && i + 2 < lines.length) {
            let nextLine = lines[i+1].replace(/(^-\s+)|(\s+-$)/g, '').trim();
            let thirdLine = lines[i+2].replace(/(^-\s+)|(\s+-$)/g, '').trim();
            
            let nextLineScores = nextLine.match(scoreRegex);
            let thirdLineScores = thirdLine.match(scoreRegex);

            // Yeni yapı: 1. satırda MS var, 2. satırda skor yok (deplasman), 3. satırda İY var
            if (currentScores.length === 1 && !nextLineScores && thirdLineScores) {
                let homeTeam = currentLine.replace(scoreRegex, '').trim();
                let msScore = currentScores[0];
                let iyScore = thirdLineScores[0];

                ekle(homeTeam, msScore, iyScore, fragment);
                i += 2; // 3 satırı birden tükettik
                continue;
            }
        }

        // STANDART İŞLEME (Değişmedi)
        let matchName = currentLine.replace(scoreRegex, '').replace(/\d{2}:\d{2}/g, '').replace(/\b(MS|İY|IY|İyi|Iyi|Sonuçlandı|Bitti)\b/gi, '').replace(/[☆✩✰*]/g, '').replace(/\s+/g, ' ').trim();
        let scores = currentScores || [];

        if (scores.length === 0 && matchName.length > 3 && i + 1 < lines.length) {
            let cleanNext = lines[i+1].replace(/(^-)|(-$)/g, '').trim();
            let nextScores = cleanNext.match(scoreRegex);
            if (nextScores) scores = nextScores;
        }

        if (scores.length > 0 && matchName.length > 3) {
            let ms = scores[0];
            let iy = scores.length > 1 ? scores[1] : "-";
            if (iy === "-" && i + 1 < lines.length) {
                let nextOnlyScore = lines[i+1].trim().replace(/(^-)|(-$)/g, '').trim();
                if (nextOnlyScore.match(/^(\d+-\d+)$/)) iy = nextOnlyScore;
            }
            ekle(matchName, ms, iy, fragment);
        }
    }
    tbody.appendChild(fragment);
}

function ekle(name, ms, iy, fragment) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>${name}</td>
        <td class="col-skor"><span class="skor-kutusu">${ms}</span></td>
        <td class="col-skor" style="color:#888;">${iy}</td>
    `;
    fragment.appendChild(tr);
}

function tabloyuKopyala() {
    const rows = document.querySelectorAll('#sonucAlani tr');
    let text = "";
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length === 3) {
            text += `${cells[0].innerText.trim()}\tMS ${cells[1].innerText.trim()}\tİY ${cells[2].innerText.trim()}\n`;
        }
    });

    if (text) {
        navigator.clipboard.writeText(text.trim()).then(() => alert("Liste MS ve İY ibareleriyle kopyalandı!"));
    } else {
        alert("Kopyalanacak veri yok.");
    }
}
</script>

</body>
</html>
