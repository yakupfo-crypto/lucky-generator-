<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .input-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .results-table {
            width: 100%;
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-top: 30px;
            border-collapse: collapse;
        }

        .results-table th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .results-table tr:nth-child(even) {
            background-color: #f1f5f9;
        }

        .score-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .iy-badge {
            font-size: 11px;
            color: var(--secondary);
            margin-left: 5px;
        }

        @media (max-width: 768px) {
            .input-sections {
                grid-template-columns: 1fr;
            }
            .results-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fikstür & Sonuç Eşleştirici</h1>
        <p>Programı ve sonuçları yapıştırın, anında eşleştirin.</p>
    </header>

    <div class="input-sections">
        <div>
            <label><strong>Fikstür Programı</strong></label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label><strong>Maç Sonuçları</strong></label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">HIZLI EŞLEŞTİR VE LİSTELE</button>

    <table class="results-table" id="outputTable" style="display:none;">
        <thead>
            <tr>
                <th>#</th>
                <th>Lig / Saat</th>
                <th>Maç</th>
                <th>Sonuç (MS / İY)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const tableBody = document.getElementById('tableBody');
    const outputTable = document.getElementById('outputTable');
    
    tableBody.innerHTML = '';
    
    // 1. Sonuçları haritala (Takım isimlerini anahtar yap)
    const resultsMap = {};
    const resultBlocks = resultsText.split(/(?=Bitti|PENMS|UZMS|ERT|\d{2}')/);

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l);
        if (lines.length >= 3) {
            // Skor ve Takım tespiti
            const scoreLine = lines.find(l => l.includes('-') && /\d/.test(l));
            const iyLine = lines.find(l => l.includes('İ.Y'));
            
            // Takımları bul (Skordan önceki ve sonraki satırlar genelde takımdır)
            let homeTeam = lines[1];
            let awayTeam = lines[3];

            if(homeTeam && awayTeam && scoreLine) {
                const key = (homeTeam + awayTeam).replace(/\s+/g, '').toLowerCase();
                resultsMap[key] = {
                    score: scoreLine,
                    iy: iyLine || ''
                };
            }
        }
    });

    // 2. Fikstürü işle
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l);
    let currentLeague = "";
    let matchCount = 0;
    let matches = [];

    for (let i = 0; i < fixtureLines.length; i++) {
        // Eğer satırda "-" varsa bu bir maç satırıdır
        if (fixtureLines[i] === "-") {
            matchCount++;
            const home = fixtureLines[i-1];
            const away = fixtureLines[i+1];
            const time = fixtureLines[i-2] || "";
            
            // Bir önceki lig başlığını bulmaya çalış
            let league = "Belirtilmemiş";
            for(let j = i-3; j >= 0; j--) {
                if(!fixtureLines[j].includes(':') && fixtureLines[j].length > 5) {
                    league = fixtureLines[j];
                    break;
                }
            }

            const matchKey = (home + away).replace(/\s+/g, '').toLowerCase();
            const resultData = resultsMap[matchKey] || { score: 'Oynanmadı', iy: '' };

            matches.push({
                id: matchCount,
                league: league,
                time: time,
                match: `${home} - ${away}`,
                result: resultData.score,
                iy: resultData.iy
            });
        }
    }

    // 3. Tabloyu oluştur (En alttan 1 ile başlayarak)
    matches.reverse().forEach((m, index) => {
        const row = `<tr>
            <td>${index + 1}</td>
            <td><small>${m.league}</small><br><strong>${m.time}</strong></td>
            <td>${m.match}</td>
            <td>
                <span class="score-badge">${m.result}</span>
                <span class="iy-badge">${m.iy}</span>
            </td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    outputTable.style.display = 'table';
}
</script>

</body>
</html>
