<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Maç Listesi Numaralandırıcı</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        #matchList {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            border-left: 5px solid var(--accent-color);
            animation: fadeIn 0.4s ease;
        }

        .match-number {
            background: var(--primary-color);
            color: white;
            min-width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 15px;
            font-size: 14px;
        }

        .match-details {
            flex-grow: 1;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Düzenleme */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .match-card { padding: 10px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Maç Listesi Düzenleyici</h1>
    
    <textarea id="inputData" placeholder="Maç listesini buraya yapıştırın..."></textarea>
    <button onclick="processMatches()">LİSTEYİ OLUŞTUR</button>

    <div id="matchList"></div>
</div>

<script>
    function processMatches() {
        const input = document.getElementById('inputData').value.trim();
        const container = document.getElementById('matchList');
        container.innerHTML = ''; // Temizle

        if (!input) {
            alert("Lütfen bir liste girin!");
            return;
        }

        // Maçları bloklara ayır (Genelde zaman damgaları veya lig isimleri arasındaki boşluklardan)
        // Bu mantık: "00:00" gibi saat formatlarını veya satır başlarını baz alır.
        const lines = input.split('\n');
        let matches = [];
        let currentMatch = "";

        // Basit bir gruplandırma mantığı: 
        // Eğer satırda "-" varsa veya bir önceki satır saat ise bu bir maç bloğudur.
        // Ancak en garanti yol, kullanıcıdan gelen metni anlamlı satırlara bölmektir.
        
        // Boş satırları temizleyip anlamlı satırları alıyoruz
        const filteredLines = lines.filter(line => line.trim() !== "");

        // Maçları tespit etme (Her 3-4 satır bir maç kabul edilebilir ancak 
        // en sağlamı "-" içeren satırları bulmaktır)
        let tempMatch = [];
        for (let i = 0; i < filteredLines.length; i++) {
            tempMatch.push(filteredLines[i]);
            
            // Eğer satırda "-" varsa, bu maçın ana satırıdır. 
            // Bir sonraki satırda takımlar biter.
            if (filteredLines[i].includes('-')) {
                matches.push(tempMatch.join('\n'));
                tempMatch = [];
            }
        }

        // Eğer yukarıdaki mantık eksik kalırsa (farklı formatlar için), 
        // doğrudan satır satır numara vermek de bir seçenektir.
        // Ama bizden istenen "Maç bazlı" numaralandırma.

        // Alttan 1'den başlayarak numaralandırmak için diziyi ters çeviriyoruz
        const totalMatches = matches.length;
        
        matches.forEach((match, index) => {
            // Ters sıra numarası: Toplam - Mevcut Endeks
            const displayNumber = totalMatches - index;

            const card = document.createElement('div');
            card.className = 'match-card';
            
            card.innerHTML = `
                <div class="match-number">${displayNumber}</div>
                <div class="match-details">${match}</div>
            `;
            
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
