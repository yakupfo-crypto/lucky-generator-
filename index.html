<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Listesi Numaralandırıcı</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary-color); text-align: center; }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        button:hover { background-color: #219150; }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #f9f9f9;
            padding: 15px;
            border-left: 5px solid var(--accent-color);
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #333;
        }

        .match-line {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            button { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚽ Maç Listesi Düzenleyici</h2>
    <p style="font-size: 0.9em; color: #666;">Listenizi yapıştırın ve numaralandırın (En alttan başlar).</p>
    
    <textarea id="rawInput" placeholder="Maç listesini buraya yapıştırın..."></textarea>
    
    <button onclick="processMatches()">LİSTEYİ OLUŞTUR</button>

    <div id="result">Sonuç burada görünecek...</div>
</div>

<script>
    function processMatches() {
        const input = document.getElementById('rawInput').value;
        const resultDiv = document.getElementById('result');
        
        if (!input.trim()) {
            resultDiv.innerText = "Lütfen bir liste girin!";
            return;
        }

        // Satırları ayır ve boş olmayanları temizle
        let lines = input.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        
        let processedLines = [];
        let matchLines = [];

        // Maç satırlarını tespit et (İçinde "-" olan ve saat bilgisi içermeyen satırlar genelde maçtır)
        // Ancak senin formatında "Takım A - Takım B" yapısı var.
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('-') && !lines[i].includes(':')) {
                matchLines.push(i);
            }
        }

        // Numaralandırma (En alttaki maçtan başla: 1, 2, 3...)
        let counter = 1;
        for (let j = matchLines.length - 1; j >= 0; j--) {
            let index = matchLines[j];
            lines[index] = `[${counter}] ` + lines[index];
            counter++;
        }

        resultDiv.innerText = lines.join('\n');
    }
</script>

</body>
</html>
