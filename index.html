<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .match-card { background: #1e293b; border-radius: 12px; transition: transform 0.2s; }
        .match-card:hover { transform: translateY(-2px); background: #334155; }
        .score-box { background: #0ea5e9; color: white; font-weight: bold; padding: 4px 10px; border-radius: 6px; }
        .iy-box { font-size: 0.75rem; color: #94a3b8; }
        .index-badge { background: #475569; color: #cbd5e1; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.7rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-sky-400">Skor Eşleştirme Sistemi</h1>
            <p class="text-slate-400 mt-2">Fikstür ve sonuç metinlerini aşağıya yapıştırın.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <textarea id="fixtureInput" class="w-full h-40 p-4 bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none text-sm" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
            <textarea id="resultsInput" class="w-full h-40 p-4 bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none text-sm" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>

        <button onclick="processData()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-sky-900/20 mb-8">
            VERİLERİ EŞLEŞTİR VE SIRALA
        </button>

        <div id="output" class="space-y-3">
            </div>
    </div>

    <script>
        function processData() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultsText = document.getElementById('resultsInput').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';

            // Fikstür maçlarını ayıkla (Saat ve takım isimleri üzerinden)
            const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let fixtures = [];
            
            for (let i = 0; i < fixtureLines.length; i++) {
                if (fixtureLines[i].includes(':') && fixtureLines[i+1] && fixtureLines[i+2] === '-') {
                    fixtures.push({
                        time: fixtureLines[i],
                        home: fixtureLines[i+1],
                        away: fixtureLines[i+3]
                    });
                }
            }

            // Sonuçları ayıkla
            const resultsData = {};
            const resParts = resultsText.split('Bitti').join('---').split('90\'').join('---').split('---');
            
            resParts.forEach(part => {
                const lines = part.split('\n').map(l => l.trim()).filter(l => l !== '' && l !== '-');
                if (lines.length >= 3) {
                    const home = lines[0];
                    const score = lines[1];
                    const away = lines[2];
                    const iy = lines.find(l => l.includes('İ.Y')) || 'İ.Y -';
                    
                    resultsData[home.toLowerCase()] = { score, iy, away };
                }
            });

            // Alttan yukarı numaralandırma için diziyi ters çeviriyoruz
            fixtures.reverse();

            // Eşleştirme ve Render
            fixtures.forEach((match, index) => {
                const matchKey = match.home.toLowerCase();
                const result = resultsData[matchKey] || { score: 'vs', iy: 'Henüz Başlamadı' };

                const card = document.createElement('div');
                card.className = 'match-card p-4 flex items-center justify-between gap-4 border-l-4 border-sky-500';
                
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="index-badge">${index + 1}</span>
                        <div>
                            <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider">${match.time}</div>
                            <div class="text-sm md:text-base font-bold">${match.home} - ${match.away}</div>
                        </div>
                    </div>
                    <div class="text-right shrink-0">
                        <div class="score-box">${result.score}</div>
                        <div class="iy-box mt-1">${result.iy}</div>
                    </div>
                `;
                outputDiv.appendChild(card);
            });
            
            if(fixtures.length === 0) {
                outputDiv.innerHTML = '<p class="text-center text-red-400">Veri formatı uyuşmuyor veya giriş boş.</p>';
            }
        }
    </script>
</body>
</html>
