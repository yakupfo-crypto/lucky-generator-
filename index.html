<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --card: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            resize: vertical;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .results-table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        th { background-color: #f1f5f9; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .no { font-weight: bold; color: var(--primary); width: 40px; }
        .score { font-weight: bold; color: #dc2626; }
        .iy { color: #64748b; font-size: 12px; }
        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            td, th { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Fikstür Sonuçlandırıcı</h1>
    
    <div class="input-area">
        <div>
            <label>Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>Maç Sonuçları:</label>
            <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>
    
    <button onclick="processData()">LİSTEYİ EŞLEŞTİR VE NUMARALANDIR</button>

    <table class="results-table" id="outputTable" style="display: none;">
        <thead>
            <tr>
                <th>No</th>
                <th>Lig / Saat</th>
                <th>Maç</th>
                <th>Sonuç</th>
                <th>İY</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const tableBody = document.getElementById('tableBody');
    const table = document.getElementById('outputTable');
    
    tableBody.innerHTML = '';
    
    // Fikstürü parçala
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let fixtures = [];
    let currentLeague = "";
    
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes(':') && !isNaN(fixtureLines[i][0])) {
            let time = fixtureLines[i];
            let team1 = fixtureLines[i+1];
            let team2 = fixtureLines[i+3];
            fixtures.push({ league: currentLeague, time: time, t1: team1, t2: team2 });
            i += 3;
        } else if (!fixtureLines[i].includes('-')) {
            currentLeague = fixtureLines[i];
        }
    }

    // Sonuçları parçala
    const resultsRaw = resultsText.split(/(?=Bitti|90'|81'|25'|PENMS|UZMS|ERT)/);
    let resultsMap = {};

    resultsRaw.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (lines.length >= 4) {
            let t1 = lines[1];
            let score = lines[2];
            let t2 = lines[3];
            let iy = "";
            const iyLine = lines.find(l => l.includes('İ.Y'));
            if (iyLine) iy = iyLine.replace('İ.Y', '').trim();
            
            resultsMap[t1] = { score: score, iy: iy };
        }
    });

    // Eşleştir ve Tabloya Yaz
    fixtures.forEach((f, index) => {
        let matchResult = resultsMap[f.t1] || { score: "-", iy: "-" };
        
        let row = `<tr>
            <td class="no">${index + 1}</td>
            <td><small>${f.league}</small><br><b>${f.time}</b></td>
            <td>${f.t1} - ${f.t2}</td>
            <td class="score">${matchResult.score}</td>
            <td class="iy">${matchResult.iy}</td>
        </tr>`;
        tableBody.innerHTML += row;
    });

    table.style.display = 'table';
}
</script>

</body>
</html>
