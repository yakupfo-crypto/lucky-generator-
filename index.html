<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinamik Skor Eşleştirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .match-row:nth-child(even) { background-color: #1e293b; }
        .live-pulse { animation: pulse 2s infinite; color: #22c55e; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-blue-400 border-b border-slate-700 pb-2">Maç Skor Eşleştirme Paneli</h2>
        
        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">1. Fikstür Listesi (Saatli Bölüm)</label>
                <textarea id="fixtureInput" class="w-full h-48 p-3 bg-slate-800 border border-slate-700 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Buraya fikstür listesini yapıştırın..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">2. Skor Listesi (Sonuçlu Bölüm)</label>
                <textarea id="resultsInput" class="w-full h-48 p-3 bg-slate-800 border border-slate-700 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Buraya skorlu listeyi yapıştırın..."></textarea>
            </div>
        </div>

        <button onclick="matchMatches()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all mb-8 shadow-lg">
            SKORLARI EŞLEŞTİR VE LİSTELE
        </button>

        <div class="bg-slate-900 rounded-xl overflow-hidden border border-slate-700 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-slate-300 text-sm">
                    <tr>
                        <th class="p-4">SAAT / DURUM</th>
                        <th class="p-4 text-right">EV SAHİBİ</th>
                        <th class="p-4 text-center">SKOR</th>
                        <th class="p-4 text-left">DEPLASMAN</th>
                        <th class="p-4 text-center">İY</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody">
                    <tr>
                        <td colspan="5" class="p-10 text-center text-slate-500 italic">Henüz veri işlenmedi. Yukarıdaki alanlara listeleri yapıştırıp butona basın.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function matchMatches() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultsText = document.getElementById('resultsInput').value;
            const tbody = document.getElementById('resultTableBody');
            tbody.innerHTML = '';

            // 1. Fikstür Ayrıştırma (Saat ve Takımları bulur)
            // Mantık: Saat formatından (00:00) sonra gelen iki satır takımlardır.
            const fixLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
            let fixtures = [];

            for (let i = 0; i < fixLines.length; i++) {
                if (/^\d{2}:\d{2}$/.test(fixLines[i])) {
                    fixtures.push({
                        time: fixLines[i],
                        home: fixLines[i+1],
                        away: fixLines[i+2]
                    });
                }
            }

            // 2. Skor Ayrıştırma
            // Mantık: Takım isimlerini anahtar olarak kullanıp altındaki skorları çeker.
            const resLines = resultsText.split('\n').map(l => l.trim()).filter(l => l !== "");
            
            fixtures.forEach(fix => {
                let matchData = { score: "- / -", iy: "-", status: "Bekliyor" };

                // Skor listesinde ev sahibi takımı ara
                const resIdx = resLines.findIndex(line => line === fix.home);
                
                if (resIdx !== -1 && resLines[resIdx + 1] === fix.away) {
                    // Skor genellikle takımların bir üstündeki veya bir altındaki satırda olur.
                    // Senin verdiğin örnekte Takım 1 - Takım 2 arasındaydı:
                    matchData.score = resLines[resIdx + 1] === fix.away ? "Veri Bulunamadı" : "-";
                    
                    // Karmaşık metin içinde skor ve İY bulma (regex ile)
                    // Alt alta olan satırlarda skor (0 - 0) ve İY (İ.Y 0 - 0) formatını arıyoruz.
                    for(let j = resIdx - 5; j < resIdx + 10; j++) {
                        if(!resLines[j]) continue;
                        
                        // Maç sonucu tespiti (Örn: 2 - 1)
                        if (/^\d+\s*-\s*\d+$/.test(resLines[j])) {
                            matchData.score = resLines[j];
                        }
                        // İY tespiti
                        if (resLines[j].includes("İ.Y")) {
                            matchData.iy = resLines[j].replace("İ.Y", "").trim();
                        }
                        // Durum tespiti (Bitti, 90', Ert vb.)
                        if (["Bitti", "ERT", "PENMS", "UZMS"].includes(resLines[j]) || resLines[j].includes("'")) {
                            matchData.status = resLines[j];
                        }
                    }
                }

                // Tabloya ekle
                const isLive = matchData.status.includes("'");
                const row = `
                    <tr class="match-row border-b border-slate-800 hover:bg-slate-800/50 transition-colors">
                        <td class="p-4 text-xs">
                            <div class="font-bold text-slate-400">${fix.time}</div>
                            <div class="${isLive ? 'live-pulse font-bold' : 'text-slate-500'}">${matchData.status}</div>
                        </td>
                        <td class="p-4 text-right font-semibold text-sm md:text-base">${fix.home}</td>
                        <td class="p-4 text-center">
                            <span class="bg-slate-700 px-3 py-1 rounded text-blue-400 font-bold">${matchData.score}</span>
                        </td>
                        <td class="p-4 text-left font-semibold text-sm md:text-base">${fix.away}</td>
                        <td class="p-4 text-center text-xs text-slate-400 font-mono">${matchData.iy}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
