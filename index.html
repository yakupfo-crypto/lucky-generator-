<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Düzenleyici PRO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #1e1e1e; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; border: none; }
        .btn-islem { background: #00c853; color: black; }
        .btn-kopyala { background: #03a9f4; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background: #333; color: #aaa; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #2d2d2d; font-size: 14px; }
        .lig-baslik { background: #d32f2f; color: white; font-weight: bold; text-align: center; font-size: 13px; }
        .skor-kutusu { background: #333; padding: 4px 8px; border-radius: 4px; color: #ffeb3b; font-weight: bold; }
        .ms-tag { color: #00e676; font-weight: bold; font-size: 11px; border: 1px solid #00e676; padding: 2px 4px; border-radius: 3px; display: inline-block; min-width: 30px; text-align: center; }
        .ert-tag { color: #ff9800; border-color: #ff9800; }
        .saat-tag { color: #03a9f4; border-color: #03a9f4; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Karışık metni buraya yapıştırın..."></textarea>
    
    <div class="btn-group">
        <button class="btn-islem" onclick="islemYap()">LİSTEYİ DÜZELT VE SIRALA</button>
        <button class="btn-kopyala" onclick="tabloyuKopyala()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="skorTablosu">
        <thead>
            <tr>
                <th>DURUM</th>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="sonucAlani"></tbody>
    </table>
</div>

<script>
function islemYap() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tbody = document.getElementById('sonucAlani');
    tbody.innerHTML = '';

    let currentLig = "";

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        if (line === line.toUpperCase() && !line.includes('-') && isNaN(line.charAt(0)) && line.length > 3 && !line.includes("MS")) {
            currentLig = line;
            tbody.innerHTML += `<tr><td colspan="4" class="lig-baslik">${currentLig}</td></tr>`;
            continue;
        }

        const hasScore = /\d+-\d+/.test(line) || line.includes("E-E");
        const hasTime = /\d{2}:\d{2}/.test(line);

        if ((hasScore || hasTime) && line.length > 3) {
            let msScore = "-";
            let iyScore = "-";
            let statusTag = "MS";
            let tagClass = "ms-tag";

            if (hasScore) {
                let matches = line.match(/\d+-\d+|E-E/g); 
                msScore = matches[0]; 

                if (msScore !== "E-E" && matches.length > 1) {
                    iyScore = matches[matches.length - 1];
                } else if (msScore === "E-E") {
                    msScore = "E";
                    iyScore = "E";
                    statusTag = "ERT";
                    tagClass = "ms-tag ert-tag";
                }

                if (msScore !== "E" && iyScore === "-") {
                    for (let j = 1; j <= 3; j++) {
                        if (i + j < lines.length) {
                            let nextLine = lines[i + j].trim();
                            let subMatch = nextLine.match(/^(\d+-\d+)$/) || nextLine.match(/^E-E$/) || nextLine.match(/^İY\s*(\d+-\d+|E-E)$/);
                            if (subMatch) {
                                iyScore = subMatch[1] || subMatch[0];
                                i = i + j;
                                break;
                            }
                        }
                    }
                }
            } else if (hasTime) {
                statusTag = line.match(/\d{2}:\d{2}/)[0];
                tagClass = "ms-tag saat-tag";
                msScore = "-";
                iyScore = "-";
            }

            let tempLine = line;
            let removeItems = line.match(/\d+-\d+|E-E|\d{2}:\d{2}/g) || [];
            removeItems.forEach(m => { tempLine = tempLine.replace(m, ' SPLIT '); });
            
            let parts = tempLine.split(' SPLIT ');
            let home = parts[0] ? parts[0].trim() : "";
            let away = (parts[1] && parts[1].trim() !== "MS") ? parts[1].trim() : (parts[2] ? parts[2].trim() : "");

            let cleanHome = home.replace(/[☆✩✰]/g, '').replace(/\d+\sMS/g, '').replace(/MS/g, '').trim();
            let cleanAway = away.replace(/[☆✩✰]/g, '').replace(/\d+\sMS/g, '').replace(/MS/g, '').trim();

            if(cleanHome.length < 2) continue;

            let fullMatchName = cleanHome + (cleanAway ? " - " + cleanAway : "");

            tbody.innerHTML += `
                <tr>
                    <td><span class="${tagClass}">${statusTag}</span></td>
                    <td>${fullMatchName}</td>
                    <td style="text-align:center"><span class="skor-kutusu">${msScore}</span></td>
                    <td style="text-align:center; color:#888;">${iyScore}</td>
                </tr>`;
        }
    }
}

function tabloyuKopyala() {
    const tbody = document.getElementById('sonucAlani');
    let kopyalanacakMetin = "";
    const rows = tbody.querySelectorAll('tr');

    rows.forEach(row => {
        if (row.cells.length === 1) {
            // Lig başlıklarını olduğu gibi bırakıyoruz
            kopyalanacakMetin += `\n${row.innerText}\n`;
        } else {
            // DURUM SÜTUNU HARİÇ: Maç İsmi, MS skoru ve İY skorunu yan yana tek boşlukla ekle
            // Görseldeki "Goias GO - Criciuma 1-0 0-0" formatı
            let mac = row.cells[1].innerText;
            let ms = row.cells[2].innerText;
            let iy = row.cells[3].innerText;
            
            // Eğer MS veya İY '-' ise temiz bir görünüm için boşlukları ayarla
            kopyalanacakMetin += `${mac} ${ms} ${iy}\n`;
        }
    });

    if (kopyalanacakMetin.trim() === "") {
        alert("Önce listeyi oluşturun.");
        return;
    }

    navigator.clipboard.writeText(kopyalanacakMetin.trim()).then(() => {
        alert("Liste orijinal dizilişiyle kopyalandı!");
    }).catch(err => {
        console.error('Hata:', err);
    });
}
</script>

</body>
</html>
