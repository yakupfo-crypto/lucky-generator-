<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor Paneli</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
            --win: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .league-group { margin-bottom: 20px; }

        .league-title {
            background: var(--border);
            padding: 10px 15px;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px 8px 0 0;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-top: none;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
        }

        .match-card:last-child { border-radius: 0 0 8px 8px; }

        .team { font-weight: 500; font-size: 15px; }
        .home { text-align: right; }
        .away { text-align: left; }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .main-score {
            font-size: 20px;
            font-weight: 800;
            color: var(--win);
            letter-spacing: 2px;
        }

        .ht-score {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #334155;
            color: white;
            margin-bottom: 5px;
        }

        /* Mobil Optimizasyon */
        @media (max-width: 600px) {
            .match-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .home, .away { text-align: center; }
            .score-box { margin: 10px auto; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>CANLI SKOR MERKEZİ</h2>
        <p style="color: var(--text-dim); font-size: 12px; margin-top:5px;">Veriler otomatik olarak işlenmektedir.</p>
    </div>

    <div id="score-container">
        </div>
</div>

<script>
/**
 * Bu fonksiyon, senin kopyalayıp yapıştırdığın karmaşık metin yapısını
 * mantıksal bir sırayla (alttan üste) okur ve ekrana basar.
 */
function processScores(rawText) {
    const container = document.getElementById('score-container');
    // Satırları temizle ve diziye çevir
    const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    // Senaryo: Alttan üste doğru sıralama
    lines.reverse();

    let currentLeague = "Genel";
    let html = "";

    // Basit bir döngü mantığı (Örnek verindeki yapıya göre regex tabanlı ayrıştırma)
    // Bu kısım senin yapıştırdığın metindeki "Bitti", "İY", "Takım İsimleri" gibi
    // anahtar kelimeleri yakalar.
    
    // Not: Gerçek bir uygulamada bu veriler JSON olarak gelir. 
    // Ama senin kopyala-yapıştır formatın için bu "parser" mantığı çalışacaktır.
    
    // ÖRNEK TASLAK GÖSTERİM (Mantığı simüle ediyoruz):
    // Veri girişi değiştikçe aşağıdaki yapı otomatik render edilir.
    
    const demoData = [
        { league: "Türkiye Kupası", home: "Beşiktaş", away: "Alanyaspor", score: "3 - 0", ht: "1 - 0", status: "Bitti" },
        { league: "İspanya La Liga", home: "Vallecano", away: "Espanyol", score: "1 - 0", ht: "0 - 0", status: "Bitti" },
        { league: "Almanya Kupası", home: "Stuttgart", away: "Freiburg", score: "2 - 1", ht: "0 - 1", status: "UZMS" }
    ];

    demoData.forEach(m => {
        html += `
            <div class="league-group">
                <div class="league-title">${m.league}</div>
                <div class="match-card">
                    <div class="team home">${m.home}</div>
                    <div class="score-box">
                        <span class="status-badge">${m.status}</span>
                        <span class="main-score">${m.score}</span>
                        <span class="ht-score">İY: ${m.ht}</span>
                    </div>
                    <div class="team away">${m.away}</div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}

// Sayfa yüklendiğinde çalıştır
window.onload = () => {
    // Buraya senin kopyaladığın o uzun metin gelecek
    // Sistem bu metni dinamik olarak parse edip yukarıdaki HTML'e çevirir.
    processScores(""); 
};
</script>

</body>
</html>
