<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --card-bg: #ffffff;
            --accent: #2c3e50;
            --text-color: #333;
            --result-bg: #e8f5e9;
            --result-text: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 { text-align: center; color: var(--accent); }

        .input-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }

        .match-card {
            background: var(--card-bg);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--accent);
        }

        .match-info {
            flex: 1;
        }

        .match-number {
            font-weight: bold;
            color: #888;
            margin-right: 15px;
            min-width: 30px;
        }

        .teams {
            font-weight: 600;
            font-size: 15px;
        }

        .score-box {
            background: var(--result-bg);
            color: var(--result-text);
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
            min-width: 100px;
            margin-left: 15px;
        }

        .iy-score {
            display: block;
            font-size: 12px;
            font-weight: normal;
            margin-top: 4px;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .input-area { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .match-card { flex-direction: column; text-align: center; }
            .score-box { margin-top: 10px; width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Skor Eşleştirme Sistemi</h1>
    
    <div class="input-area">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">VERİLERİ EŞLEŞTİR VE SIRALA</button>
    </div>

    <div id="output"></div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = '';

    // 1. Fikstürü ayrıştır
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let fixtures = [];
    
    for(let i = 0; i < fixtureLines.length; i++) {
        if(fixtureLines[i] === '-') {
            const home = fixtureLines[i-1];
            const away = fixtureLines[i+1];
            if(home && away) {
                fixtures.push({ home, away, fullInfo: `${home} - ${away}` });
            }
        }
    }

    // 2. Sonuçları ayrıştır
    const resultBlocks = resultsText.split(/(?=Bitti|90'|81'|25'|PENMS|UZMS|ERT)/g);
    let scoresMap = {};

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let score = "Oynanmadı";
        let iy = "";
        let homeTeam = "";
        let awayTeam = "";

        for(let i = 0; i < lines.length; i++) {
            if(lines[i] === '-') {
                homeTeam = lines[i-1];
                awayTeam = lines[i+1];
                score = (lines[i-2] || "") + " - " + (lines[i+2] || "");
            }
            if(lines[i].includes('İ.Y')) {
                iy = lines[i];
            }
        }

        if(homeTeam && awayTeam) {
            const key = (homeTeam + awayTeam).replace(/\s+/g, '').toLowerCase();
            scoresMap[key] = { score, iy };
        }
    });

    // 3. Eşleştir ve Ters Numaralandır
    // En alttan 1 ile başlaması için listeyi ters çevirip işliyoruz
    const total = fixtures.length;
    
    fixtures.forEach((match, index) => {
        const matchKey = (match.home + match.away).replace(/\s+/g, '').toLowerCase();
        const result = scoresMap[matchKey] || { score: "- / -", iy: "Sonuç bulunamadı" };
        
        // Numaralandırma: En alttaki 1 olacak şekilde (total - index)
        const matchNumber = total - index;

        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-number">#${matchNumber}</div>
            <div class="match-info">
                <div class="teams">${match.home} vs ${match.away}</div>
            </div>
            <div class="score-box">
                <strong>${result.score}</strong>
                <span class="iy-score">${result.iy}</span>
            </div>
        `;
        outputDiv.prepend(card); // Prepend kullanarak görsel olarak da en son ekleneni en üste (büyük numara) koyarız
    });
}
</script>

</body>
</html>
