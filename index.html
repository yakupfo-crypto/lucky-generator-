<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
            --secondary: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: var(--card);
            border: 1px solid #334155;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            resize: vertical;
            font-size: 12px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        #results {
            margin-top: 30px;
        }

        .match-card {
            background: var(--card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .match-info { flex: 1; }
        .match-no { font-weight: bold; color: var(--secondary); margin-right: 10px; }
        .team-names { font-size: 15px; font-weight: 500; }
        .league { font-size: 11px; color: var(--secondary); display: block; margin-top: 4px; }
        
        .score-box {
            text-align: right;
            min-width: 120px;
        }

        .ms-score {
            display: block;
            font-size: 18px;
            font-weight: 800;
            color: var(--success);
        }

        .iy-score {
            font-size: 12px;
            color: var(--secondary);
        }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            .match-card { flex-direction: column; text-align: center; }
            .score-box { text-align: center; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Skor Eşleştirici Pro</h1>
        
        <div class="input-section">
            <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
            <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        </div>

        <button onclick="processData()">EŞLEŞTİR VE LİSTELE</button>

        <div id="results"></div>
    </div>

<script>
    function processData() {
        const fixtureText = document.getElementById('fixtureInput').value;
        const resultsText = document.getElementById('resultsInput').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        // 1. Fikstür Parçalama
        // Maçları "TakımA - TakımB" yapısından yakalarız
        const fixtureLines = fixtureText.split('\n').filter(l => l.trim() !== "");
        let matches = [];
        let currentLeague = "";

        for (let i = 0; i < fixtureLines.length; i++) {
            let line = fixtureLines[i].trim();
            
            // Eğer satırda "-" varsa bu bir maç satırıdır
            if (line === "-" && i > 0 && i < fixtureLines.length - 1) {
                let home = fixtureLines[i-1].trim();
                let away = fixtureLines[i+1].trim();
                
                // Takım isimlerinden saatleri temizle (Örn: 02:30 Takım -> Takım)
                home = home.replace(/^\d{2}:\d{2}\s+/, "");
                
                matches.push({
                    home: home,
                    away: away,
                    fullMatch: `${home} - ${away}`
                });
            }
        }

        // En alttan numaralandırmak için diziyi ters çeviriyoruz
        matches.reverse();

        // 2. Sonuçları Haritalama
        // Takım isimlerini anahtar yaparak skorları saklayacağız
        const resultLines = resultsText.split('Bitti').join('\nBitti').split('\n');
        const scoresMap = {};

        let tempResult = "";
        resultLines.forEach(line => {
            if (line.includes('-')) {
                // Skor veya Takım satırı olabilir, temizleyip haritaya alalım
                // Bu basitleştirilmiş bir mantıktır, geliştirilebilir
            }
        });

        // Gelişmiş Eşleştirme Algoritması
        matches.forEach((match, index) => {
            let foundScore = "Oynanmadı";
            let foundIY = "-";

            // Sonuçlar metninde ev sahibi ve deplasman takımının geçtiği bloğu bul
            const escapedHome = match.home.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const escapedAway = match.away.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            
            // Regex ile Takım isimleri arasındaki skoru yakala
            const scoreRegex = new RegExp(`${escapedHome}\\s*([\\d\\s-]*)\\s*${escapedAway}`, "i");
            const scoreMatch = resultsText.match(scoreRegex);

            if (scoreMatch) {
                foundScore = scoreMatch[1].trim() || "0 - 0";
                
                // İY Skorunu bul (Aynı bloktan sonraki "İ.Y" satırı)
                const iyIndex = resultsText.indexOf(scoreMatch[0]);
                const afterMatchText = resultsText.substring(iyIndex, iyIndex + 100);
                const iyMatch = afterMatchText.match(/İ\.Y\s*([\d\s-]*)/i);
                if (iyMatch) foundIY = "İY: " + iyMatch[1].trim();
            }

            // Arayüzü oluştur
            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = `
                <div class="match-info">
                    <span class="match-no">#${index + 1}</span>
                    <span class="team-names">${match.home} vs ${match.away}</span>
                </div>
                <div class="score-box">
                    <span class="ms-score">${foundScore}</span>
                    <span class="iy-score">${foundIY}</span>
                </div>
            `;
            resultsDiv.appendChild(card);
        });
    }
</script>

</body>
</html>
