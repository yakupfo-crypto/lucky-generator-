<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 { text-align: center; color: var(--primary); }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }

        .results-container {
            margin-top: 30px;
            overflow-x: auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        .no { font-weight: bold; color: var(--accent); width: 40px; }
        .score { font-weight: bold; color: #e74c3c; white-space: nowrap; }
        .iy { color: #7f8c8d; font-size: 12px; }

        /* Mobil Görünüm */
        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
            th:nth-child(4), td:nth-child(4) { display: none; } /* Lig adını mobilde gizle (opsiyonel) */
            td { padding: 8px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Maç Sonuç Eşleştirme Sistemi</h2>

    <div class="input-grid">
        <div>
            <label>1. Fikstür Programı:</label>
            <textarea id="fixtureInput" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
        </div>
        <div>
            <label>2. Maç Sonuçları:</label>
            <textarea id="resultInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        </div>
    </div>

    <button onclick="processData()">VERİLERİ EŞLEŞTİR VE LİSTELE</button>

    <div class="results-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Maç</th>
                    <th>MS</th>
                    <th>İY</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
function processData() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultText = document.getElementById('resultInput').value;
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = "";

    // 1. Fikstür Analizi
    // Boşlukları temizle ve satırlara böl
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    let fixtures = [];
    
    // Basit bir regex ile takımları ayır (Format: Takim A - Takim B)
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes(' - ')) {
            const teams = fixtureLines[i].split(' - ');
            fixtures.push({
                home: teams[0].trim(),
                away: teams[1].trim()
            });
        }
    }

    // 2. Sonuç Analizi
    const resultsRaw = resultText.split('Bitti').join('---').split('90\'').join('---').split('PENMS').join('---').split('UZMS').join('---');
    const resultBlocks = resultsRaw.split('---').filter(b => b.trim().length > 5);
    
    let scoresMap = {};

    resultBlocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        // Takım isimlerini ve skorları bulmaya çalış
        let currentHome = "";
        let currentScore = "-";
        let currentIY = "-";

        for (let j = 0; j < lines.length; j++) {
            // Skor tespiti (sayı - sayı formatı)
            if (/\d+\s*-\s*\d+/.test(lines[j])) {
                if (lines[j].includes('İ.Y')) {
                    currentIY = lines[j].replace('İ.Y', '').trim();
                } else {
                    currentScore = lines[j].trim();
                    if (j > 0) currentHome = lines[j-1].trim();
                }
            }
        }
        if (currentHome) scoresMap[currentHome.toLowerCase()] = { ms: currentScore, iy: currentIY };
    });

    // 3. Eşleştirme ve Numaralandırma (En alttan başla)
    // Fikstür listesini ters çeviriyoruz ki en alttaki 1 olsun
    const reversedFixtures = [...fixtures].reverse();

    reversedFixtures.forEach((match, index) => {
        const homeKey = match.home.toLowerCase();
        const scoreInfo = scoresMap[homeKey] || { ms: "- / -", iy: "- / -" };

        const row = `
            <tr>
                <td class="no">${index + 1}</td>
                <td>${match.home} - ${match.away}</td>
                <td class="score">${scoreInfo.ms}</td>
                <td class="iy">${scoreInfo.iy}</td>
            </tr>
        `;
        // Tablonun en üstüne ekle (Böylece numara 1 olan en altta görünür kurgusunu tablo akışında koruruz)
        tableBody.insertAdjacentHTML('afterbegin', row);
    });
}
</script>

</body>
</html>
