<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Skor Analiz & Fikstür</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .match-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .match-card:hover { border-left-color: #3b82f6; background-color: #1e293b; }
        .number-badge { min-width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #334155; border-radius: 50%; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Skor Eşleştirme Sistemi</h1>
            <p class="text-gray-400 mt-2">Metinleri yapıştırın, sonuçları anında bağlayın.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <textarea id="fixtureInput" class="w-full h-48 p-4 bg-slate-800 rounded-lg border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Fikstür listesini buraya yapıştırın..."></textarea>
            <textarea id="resultsInput" class="w-full h-48 p-4 bg-slate-800 rounded-lg border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Sonuçlar listesini buraya yapıştırın..."></textarea>
        </div>

        <div class="flex justify-center mb-10">
            <button onclick="processData()" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-full font-bold shadow-lg transform active:scale-95 transition-all">
                VERİLERİ ANALİZ ET VE EŞLEŞTİR
            </button>
        </div>

        <div id="output" class="space-y-3">
            </div>
    </div>

    <script>
        function processData() {
            const fixtureText = document.getElementById('fixtureInput').value;
            const resultsText = document.getElementById('resultsInput').value;
            const output = document.getElementById('output');
            output.innerHTML = '';

            // 1. Fikstür Parçalama (Saat ve Takımları Al)
            const fixtureLines = fixtureText.split('\n').filter(l => l.trim() !== '');
            let fixtures = [];
            
            for (let i = 0; i < fixtureLines.length; i++) {
                if (fixtureLines[i].includes(':') && fixtureLines[i+1] && fixtureLines[i+1].includes('-')) {
                    const time = fixtureLines[i].trim();
                    const teams = fixtureLines[i+1].split('-').map(t => t.trim());
                    fixtures.push({ time, home: teams[0], away: teams[1] });
                }
            }

            // 2. Sonuç Parçalama
            const resultBlocks = resultsText.split('Bitti').filter(b => b.trim().length > 10);
            let scoreMap = {};

            resultBlocks.forEach(block => {
                const lines = block.split('\n').filter(l => l.trim() !== '');
                // Takım ve skor tespiti
                let homeTeam = "", awayTeam = "", score = "v", iy = "";
                
                for(let j=0; j<lines.length; j++) {
                    if (lines[j].includes(' - ')) {
                        score = lines[j].trim();
                        homeTeam = lines[j-1]?.trim();
                        awayTeam = lines[j+1]?.trim();
                    }
                    if (lines[j].includes('İ.Y')) {
                        iy = lines[j].trim();
                    }
                }
                if (homeTeam) {
                    scoreMap[homeTeam] = { score, iy };
                }
            });

            // 3. Eşleştirme ve Numaralandırma (Alttan Yukarı)
            const matchedData = fixtures.map(f => {
                const result = scoreMap[f.home] || { score: "- / -", iy: "İ.Y - / -" };
                return { ...f, ...result };
            });

            // En alttaki maç 1 olacak şekilde numaralandır
            matchedData.reverse().forEach((item, index) => {
                const rowNum = index + 1;
                const html = `
                    <div class="match-card bg-slate-900 p-4 rounded-lg flex flex-col md:flex-row items-center justify-between gap-4 border border-slate-800">
                        <div class="flex items-center gap-4 w-full md:w-1/3">
                            <span class="number-badge text-blue-400">${rowNum}</span>
                            <span class="text-xs font-mono text-gray-500 bg-slate-800 px-2 py-1 rounded">${item.time}</span>
                            <div class="text-sm font-semibold truncate text-gray-200">${item.home}</div>
                        </div>
                        
                        <div class="flex flex-col items-center justify-center w-full md:w-1/3">
                            <div class="text-xl font-black text-white tracking-widest">${item.score}</div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase mt-1">${item.iy}</div>
                        </div>

                        <div class="flex items-center justify-end gap-4 w-full md:w-1/3 text-right">
                            <div class="text-sm font-semibold truncate text-gray-200">${item.away}</div>
                        </div>
                    </div>
                `;
                output.innerHTML += html;
            });
        }
    </script>
</body>
</html>
