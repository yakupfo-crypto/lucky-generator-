<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Eşleştirici PRO v2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        textarea { width: 100%; height: 200px; background: #1a1a1a; color: #00ff00; border: 1px solid #333; border-radius: 8px; padding: 10px; font-family: monospace; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-run { background: #4caf50; color: white; }
        .btn-copy { background: #2196f3; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1a1a; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { background: #252525; color: #888; text-transform: uppercase; font-size: 12px; }
        .row-num { color: #555; font-weight: bold; width: 40px; }
        .match-name { color: #fff; font-weight: 500; }
        .score-ms { color: #ffeb3b; font-weight: bold; text-align: center; background: #333; border-radius: 4px; display: inline-block; min-width: 45px; }
        .score-iy { color: #888; font-size: 13px; text-align: center; }
        .status { font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid; }
        .status-ms { color: #4caf50; border-color: #4caf50; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="rawInput" placeholder="Tüm maç listesini ve skorları buraya karışık halde yapıştırın..."></textarea>
    
    <div class="controls">
        <button class="btn-run" onclick="processData()">VERİLERİ EŞLEŞTİR VE NUMARALANDIR</button>
        <button class="btn-copy" onclick="copyTable()">LİSTEYİ KOPYALA</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>#</th>
                <th>DURUM</th>
                <th>MAÇ</th>
                <th style="text-align:center">MS</th>
                <th style="text-align:center">İY</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function normalize(text) {
    return text.toLowerCase()
        .replace(/[^a-z0-9]/g, '')
        .replace(/\s/g, '');
}

function processData() {
    const input = document.getElementById('rawInput').value;
    const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = '';

    let matchesToFind = [];
    let scoreDatabase = {};

    // 1. Aşama: Maçları ve Skorları Ayıkla
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        
        // Eğer satırda "-" varsa ve skor değilse bu bir maç eşleşmesidir
        if (line.includes(' - ') && !/\d+ - \d+/.test(line)) {
            let teams = line.split(' - ');
            matchesToFind.push({
                full: line,
                home: teams[0].trim(),
                away: teams[1].trim(),
                norm: normalize(line)
            });
        }
        
        // Eğer satırda skor varsa veritabanına ekle
        if (/\d+ - \d+/.test(line)) {
            let score = line.match(/\d+ - \d+/)[0];
            let prevLine = lines[i-1] || "";
            if (prevLine && prevLine.includes(' - ') && !/\d+ - \d+/.test(prevLine)) {
                let iy = "-";
                if (lines[i+1] && lines[i+1].includes('İ.Y')) {
                    iy = lines[i+1].replace('İ.Y', '').trim();
                }
                scoreDatabase[normalize(prevLine)] = { ms: score, iy: iy };
            }
        }
    }

    // 2. Aşama: Eşleştirme ve Tablo Oluşturma
    matchesToFind.forEach((match, index) => {
        let scoreData = scoreDatabase[match.norm] || { ms: "-", iy: "-" };
        
        let row = `<tr>
            <td class="row-num">${index + 1}</td>
            <td><span class="status status-ms">MS</span></td>
            <td class="match-name">${match.full}</td>
            <td style="text-align:center"><span class="score-ms">${scoreData.ms}</span></td>
            <td class="score-iy">${scoreData.iy}</td>
        </tr>`;
        tableBody.innerHTML += row;
    });
}

function copyTable() {
    let text = "";
    document.querySelectorAll("#tableBody tr").forEach(row => {
        let cols = row.querySelectorAll("td");
        text += `${cols[0].innerText}. ${cols[2].innerText} | MS: ${cols[3].innerText} | İY: ${cols[4].innerText}\n`;
    });
    navigator.clipboard.writeText(text).then(() => alert("Liste kopyalandı!"));
}
</script>

</body>
</html>
