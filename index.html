<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Takip Paneli</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        #resultArea {
            margin-top: 20px;
        }

        .match-row {
            display: grid;
            grid-template-columns: 40px 1fr 120px;
            align-items: center;
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            font-size: 14px;
            gap: 10px;
        }

        .match-id {
            font-weight: bold;
            color: #7f8c8d;
        }

        .match-teams {
            font-weight: 600;
        }

        .match-score-box {
            text-align: right;
        }

        .ms-score {
            display: block;
            font-weight: 800;
            color: var(--secondary);
            font-size: 16px;
        }

        .iy-score {
            display: block;
            font-size: 11px;
            color: #e67e22;
        }

        .no-score {
            color: #bdc3c7;
            font-style: italic;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .match-row {
                grid-template-columns: 30px 1fr 90px;
                font-size: 13px;
            }
            .ms-score { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Canlı Fikstür & Skor Eşleştirici</h1>

    <div class="card">
        <label>Fikstür Programı:</label>
        <textarea id="fixtureInput" placeholder="Fikstürü buraya yapıştırın..."></textarea>
        
        <label>Sonuçlar Kısmı:</label>
        <textarea id="resultsInput" placeholder="Sonuçları buraya yapıştırın..."></textarea>
        
        <button onclick="processMatches()">VERİLERİ EŞLEŞTİR VE LİSTELE</button>
    </div>

    <div id="resultArea"></div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const resultArea = document.getElementById('resultArea');
    
    if(!fixtureText) { alert("Lütfen fikstür girin!"); return; }

    resultArea.innerHTML = ""; // Temizle

    // 1. Sonuçları bir Map'e al (Hızlı erişim için)
    const scoresMap = new Map();
    const resultBlocks = resultsText.split(/(?=Bitti|\d+'|PENMS|UZMS|ERT)/);

    resultBlocks.forEach(block => {
        const lines = block.trim().split('\n').map(l => l.trim()).filter(l => l !== "");
        if(lines.length >= 3) {
            // Takımları birleştirerek anahtar oluştur (Örn: "CD Victoria - Juticalpa FC")
            let teamA = "", teamB = "", ms = "", iy = "";
            
            for(let i=0; i<lines.length; i++) {
                if(lines[i].includes(' - ') && /\d/.test(lines[i])) {
                    ms = lines[i];
                    teamA = lines[i-1];
                    teamB = lines[i+1];
                }
                if(lines[i].startsWith('İ.Y')) {
                    iy = lines[i];
                }
            }
            if(teamA && teamB) {
                const key = (teamA + teamB).replace(/\s+/g, '').toLowerCase();
                scoresMap.set(key, { ms, iy });
            }
        }
    });

    // 2. Fikstürü işle ve eşleştir
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l !== "");
    let matchCount = 0;
    
    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes(' - ')) {
            matchCount++;
            const teamLine = fixtureLines[i];
            const [tA, tB] = teamLine.split(' - ');
            const searchKey = (tA.trim() + tB.trim()).replace(/\s+/g, '').toLowerCase();
            
            const scoreData = scoresMap.get(searchKey);
            
            // HTML Oluşturma
            const row = document.createElement('div');
            row.className = 'match-row';
            
            row.innerHTML = `
                <div class="match-id">${matchCount}</div>
                <div class="match-teams">${tA} - ${tB}</div>
                <div class="match-score-box">
                    ${scoreData ? `
                        <span class="ms-score">${scoreData.ms}</span>
                        <span class="iy-score">${scoreData.iy || 'İ.Y -'}</span>
                    ` : `<span class="no-score">Oynanmadı</span>`}
                </div>
            `;
            resultArea.appendChild(row);
        }
    }
}
</script>

</body>
</html>
