<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Skor & Fikstür Eşleştirici</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            grid-column: span 2;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #219150;
        }

        #results {
            margin-top: 20px;
        }

        .match-card {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--secondary);
        }

        .match-id {
            background: var(--primary);
            color: white;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 12px;
            flex-shrink: 0;
        }

        .match-info {
            flex-grow: 1;
            padding: 0 15px;
        }

        .teams {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .score-box {
            text-align: right;
            min-width: 100px;
        }

        .ms-score {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent);
            display: block;
        }

        .iy-score {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        @media (max-width: 600px) {
            .input-section { grid-template-columns: 1fr; }
            button { grid-column: span 1; }
            .match-card { flex-wrap: wrap; }
            .score-box { width: 100%; text-align: left; margin-top: 10px; padding-left: 45px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Maç Sonuç Eşleştirici</h1>
    
    <div class="input-section">
        <textarea id="fixtureInput" placeholder="Fikstür programını buraya yapıştırın..."></textarea>
        <textarea id="resultsInput" placeholder="Sonuçlar kısmını buraya yapıştırın..."></textarea>
        <button onclick="processMatches()">VERİLERİ EŞLEŞTİR VE SIRALA</button>
    </div>

    <div id="results"></div>
</div>

<script>
function processMatches() {
    const fixtureText = document.getElementById('fixtureInput').value;
    const resultsText = document.getElementById('resultsInput').value;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    // 1. Fikstürü ayrıştır (Satır bazlı takımları bul)
    const fixtureLines = fixtureText.split('\n').map(l => l.trim()).filter(l => l.length > 3);
    let matches = [];

    for (let i = 0; i < fixtureLines.length; i++) {
        if (fixtureLines[i].includes('-')) {
            const teams = fixtureLines[i].split('-').map(t => t.trim());
            if (teams.length === 2) {
                matches.push({ team1: teams[0], team2: teams[1] });
            }
        }
    }

    // 2. Sonuçları ayrıştır
    const resultBlocks = resultsText.split(/Bitti|90'|PENMS|UZMS|ERT/i).filter(b => b.trim().length > 10);
    const resultsData = resultBlocks.map(block => {
        const lines = block.split('\n').map(l => l.trim()).filter(l => l !== '');
        return {
            raw: block,
            teams: lines.join(' '),
            score: lines.find(l => /\d\s*-\s*\d/.test(l)) || "-",
            iy: lines.find(l => l.includes('İ.Y')) || "İ.Y - "
        };
    });

    // 3. Eşleştirme (Alttan yukarı numaralandırma için reverse kullanacağız)
    let finalData = [];
    matches.forEach(match => {
        // Basit bir arama algoritması: Her iki takım ismi de sonuç bloğunda geçiyor mu?
        const found = resultsData.find(r => 
            (r.teams.toLowerCase().includes(match.team1.toLowerCase()) || 
             r.teams.toLowerCase().includes(match.team2.toLowerCase()))
        );

        if (found) {
            finalData.push({
                teams: `${match.team1} - ${match.team2}`,
                score: found.score,
                iy: found.iy
            });
        }
    });

    // En alttan 1 numara olacak şekilde ters çevirip yazdır
    finalData.reverse().forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-id">${index + 1}</div>
            <div class="match-info">
                <div class="teams">${item.teams}</div>
            </div>
            <div class="score-box">
                <span class="ms-score">${item.score}</span>
                <span class="iy-score">${item.iy}</span>
            </div>
        `;
        resultsDiv.prepend(card); // En üste ekleyerek görsel sırayı sağlar
    });
}
</script>

</body>
</html>
