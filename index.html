<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Fikstür & Sonuç Paneli</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --text: #333;
            --border: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        .status-bar {
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .match-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: 50px 1fr 100px 80px;
            align-items: center;
            gap: 10px;
            border-left: 5px solid var(--accent);
        }

        .match-no { font-weight: bold; color: #888; }
        .match-info { font-size: 0.95rem; }
        .match-teams { font-weight: 600; display: block; margin-top: 3px; }
        .match-score { 
            background: #eef2f3; 
            padding: 5px 10px; 
            border-radius: 5px; 
            text-align: center; 
            font-weight: bold;
            color: #d35400;
        }
        .match-half { font-size: 0.8rem; color: #666; text-align: center; }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            .match-card {
                grid-template-columns: 40px 1fr 70px;
                grid-template-rows: auto auto;
                font-size: 0.85rem;
            }
            .match-half {
                grid-column: 3;
                grid-row: 2;
                margin-top: -10px;
            }
            .match-score { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Maç Sonuçları Paneli</h1>
    <div id="matchList">
        </div>
</div>

<script>
// Kullanıcının sağladığı metin blokları (Değişse bile kod çalışır)
const fixtureData = `[FİKSTÜR METNİ BURAYA]`;
const resultsData = `[SONUÇ METNİ BURAYA]`;

// Örnek veriyi senin paylaştığın metinden simüle ediyoruz
const rawFixture = document.body.innerText; // Sayfadaki ham metni baz alabilir

function parseData() {
    const text = document.body.innerText;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    
    let matches = [];
    let resultsMap = new Map();

    // 1. Adım: Sonuçları Haritala (Map)
    // Maç isimlerini anahtar, skorları değer olarak saklar
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes(' - ') && (lines[i-1] === 'Bitti' || lines[i-1].includes("'") || lines[i-1] === 'PENMS')) {
            let teams = lines[i].toLowerCase().replace(/\s+/g, '');
            let score = lines[i+1] || "-";
            let halfTime = "";
            if (lines[i+2] && lines[i+2].includes("İ.Y")) {
                halfTime = lines[i+2];
            }
            resultsMap.set(teams, { score, halfTime });
        }
    }

    // 2. Adım: Fikstürü Oku ve Eşleştir
    let fixtureMatches = [];
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes(' - ') && !lines[i-1].includes('Bitti') && lines[i].split('-').length === 2) {
            let teamsRaw = lines[i];
            let teamsKey = teamsRaw.toLowerCase().replace(/\s+/g, '');
            
            fixtureMatches.push({
                name: teamsRaw,
                time: lines[i-1] || "",
                league: lines[i-2] || ""
            });
        }
    }

    // 3. Adım: Ters Numaralandır ve Render Et
    const listContainer = document.getElementById('matchList');
    listContainer.innerHTML = "";
    
    // En alttaki maç 1 olacak şekilde ters çeviriyoruz
    const total = fixtureMatches.length;
    
    fixtureMatches.reverse().forEach((match, index) => {
        const teamsKey = match.name.toLowerCase().replace(/\s+/g, '');
        const result = resultsMap.get(teamsKey) || { score: "- / -", halfTime: "İ.Y - / -" };
        
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-no">#${index + 1}</div>
            <div class="match-info">
                <small>${match.league} (${match.time})</small>
                <span class="match-teams">${match.name}</span>
            </div>
            <div class="match-score">${result.score}</div>
            <div class="match-half">${result.halfTime}</div>
        `;
        listContainer.appendChild(card);
    });
}

// Sayfa yüklendiğinde çalıştır
window.onload = parseData;
</script>

</body>
</html>
